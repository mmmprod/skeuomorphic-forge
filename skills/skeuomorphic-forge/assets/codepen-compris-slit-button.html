<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>COMPRIS</title>

    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">

    <style>

        body {

            background: #0c0b0a;

            font-family: 'Inter', sans-serif;

            display: flex;

            justify-content: center;

            align-items: center;

            min-height: 100vh;

            margin: 0;

        }



        /* ═══ CONTAINER (chassis: #1a1d1a → #0d0f0d) ═══ */

        .button-container {

            position: relative;

            width: 180px;

            height: 72px;

            border-radius: 16px;

            background: linear-gradient(145deg, #1a1d1a, #0d0f0d);

            box-shadow:

                -3px -3px 18px #1e211e,

                -2px -2px 4px #1e211e44,

                4px 4px 4px #05060544,

                4px 4px 18px #050605;

            transition: box-shadow 0.6s ease;

        }

        .button-container.active {

            box-shadow:

                -3px -3px 18px #1e211e,

                -2px -2px 4px #1e211e44,

                4px 4px 4px #05060544,

                4px 4px 18px #050605,

                0 2px 12px rgba(37,99,235,0.08),

                0 4px 24px rgba(37,99,235,0.05),

                0 8px 40px rgba(37,99,235,0.025);

        }



        /* ═══ DARK GAP (#1a1a19) ═══ */

        .button-gap {

            position: absolute;

            top: 2%; left: 2%;

            width: 96%; height: 96%;

            border-radius: 13px;

            background: #1a1a19;

            box-shadow:

                inset 0 2px 4px rgba(0,0,0,0.6),

                inset 0 -1px 0 rgba(255,255,255,0.02);

            transition: box-shadow 0.6s ease;

        }

        .button-gap.active {

            box-shadow:

                inset 0 2px 4px rgba(0,0,0,0.6),

                inset 0 -1px 0 rgba(255,255,255,0.02),

                inset 0 -3px 10px rgba(37,99,235,0.08),

                inset 0 -6px 18px rgba(37,99,235,0.04),

                inset 2px 0 8px rgba(37,99,235,0.02),

                inset -2px 0 8px rgba(37,99,235,0.02);

        }



        /* ═══ CENTER BUTTON (#232322) ═══ */

        .button-center {

            position: absolute;

            top: 4%; left: 4%;

            width: 92%; height: 92%;

            border-radius: 10px;

            background: linear-gradient(180deg, #232322, #282827);

            box-shadow:

                4px 4px 8px #0a0a09,

                -4px -4px 8px #2e2e2d44;

            cursor: pointer;

            transition: all 0.15s ease, background 0.5s ease, box-shadow 0.5s ease;

            border: none; outline: none;

            display: flex; align-items: center; justify-content: center;

            overflow: visible;

        }

        .button-center::after {

            content: '';

            position: absolute;

            top: 1%; left: 1%; width: 98%; height: 98%;

            border-radius: 9px;

            background: radial-gradient(circle at 30% 30%,

                rgba(0,0,0,0.1) 0%, rgba(255,255,255,0.04) 100%);

            pointer-events: none;

            transition: background 0.5s ease;

        }

        .button-center:hover {

            background: linear-gradient(180deg, #282827, #2d2d2c);

        }

        .button-center:active { transform: scale(0.98); }

        .button-center:active::after {

            background: radial-gradient(circle at 30% 30%,

                rgba(0,0,0,0.2) 0%, rgba(255,255,255,0.02) 100%);

        }



        /* ═══ LATCHED ON (#161615) ═══ */

        .button-center.pressed {

            background: linear-gradient(180deg, #161615, #171716);

            box-shadow:

                inset 2px 2px 6px #0a0a09,

                inset -2px -2px 6px #1e1e1d22,

                inset 0 0 8px rgba(37,99,235,0.04),

                inset 0 0 16px rgba(37,99,235,0.02);

        }

        .button-center.pressed::after {

            background:

                radial-gradient(circle at 50% 50%,

                    rgba(37,99,235,0.06) 0%, rgba(37,99,235,0.01) 40%, transparent 65%),

                radial-gradient(circle at 30% 30%,

                    rgba(0,0,0,0.15) 0%, rgba(255,255,255,0.02) 100%);

        }



        /* ═══ LABEL ═══ */

        .btn-label {

            position: relative; z-index: 12;

            font-size: 14px; font-weight: 700; letter-spacing: 3px;

            color: rgba(160,165,158,0.35);

            text-shadow: 0 -1px 0 rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.02);

            user-select: none;

            transition: all 0.5s ease;

        }

        .btn-label.on {

            color: rgba(170,210,255,0.92);

            text-shadow:

                0 0 3px rgba(96,165,250,0.7),

                0 0 6px rgba(59,130,246,0.5),

                0 0 12px rgba(37,99,235,0.35),

                0 0 24px rgba(37,99,235,0.15),

                0 0 40px rgba(37,99,235,0.06),

                0 -1px 0 rgba(0,0,0,0.3);

        }



        /* ═══════════════════════════════════════════════════════════

           SLIT — 7-layer glow + breathing pulse

           ═══════════════════════════════════════════════════════════ */

        .slit {

            position: absolute;

            bottom: 9px; left: 50%; transform: translateX(-50%);

            width: 42px; height: 3.5px;

            background: #0d0d0c;

            border-radius: 4px;

            z-index: 10;

            box-shadow:

                inset 0 1.5px 3px rgba(0,0,0,1),

                inset 0 -0.5px 0 rgba(255,255,255,0.02),

                inset 1px 0 2px rgba(0,0,0,0.5),

                inset -1px 0 2px rgba(0,0,0,0.5);

        }

        .slit-core {

            width: 80%; height: 100%;

            margin: 0 auto;

            border-radius: 3px;

            transition: all 0.4s ease;

            position: relative;

        }

        .slit-off { background: #080908; }

        .slit-on {

            background: linear-gradient(90deg, #1e40af, #3b82f6, #60a5fa, #3b82f6, #1e40af);

            box-shadow:

                /* 1. white-hot core */

                0 0 1px #bfdbfe,

                /* 2. bright inner halo */

                0 0 2px #93c5fd,

                /* 3. saturated ring */

                0 0 5px rgba(96,165,250,0.95),

                /* 4. primary glow */

                0 0 10px rgba(59,130,246,0.8),

                /* 5. mid spread */

                0 0 18px rgba(37,99,235,0.5),

                /* 6. bloom */

                0 0 32px rgba(37,99,235,0.25),

                /* 7. atmosphere */

                0 0 52px rgba(37,99,235,0.1);

            animation: slit-breathe 2.2s ease-in-out infinite;

        }

        @keyframes slit-breathe {

            0%, 100% {

                box-shadow:

                    0 0 1px #bfdbfe,

                    0 0 2px #93c5fd,

                    0 0 5px rgba(96,165,250,0.9),

                    0 0 10px rgba(59,130,246,0.7),

                    0 0 18px rgba(37,99,235,0.4),

                    0 0 32px rgba(37,99,235,0.2),

                    0 0 52px rgba(37,99,235,0.07);

            }

            50% {

                box-shadow:

                    0 0 2px #dbeafe,

                    0 0 4px #bfdbfe,

                    0 0 8px rgba(96,165,250,1),

                    0 0 14px rgba(59,130,246,0.9),

                    0 0 24px rgba(37,99,235,0.6),

                    0 0 40px rgba(37,99,235,0.3),

                    0 0 64px rgba(37,99,235,0.12);

            }

        }



        /* ═══════════════════════════════════════════════════════════

           BLOOM LAYERS — projected from slit upward onto surface

           ═══════════════════════════════════════════════════════════ */



        /* L1: Tight core bloom (right above slit) */

        .bloom-core {

            position: absolute;

            bottom: 4px; left: 50%; transform: translateX(-50%);

            width: 65px; height: 22px;

            border-radius: 50%;

            pointer-events: none; z-index: 9;

            opacity: 0;

            transition: opacity 0.4s ease;

            background: radial-gradient(ellipse at 50% 85%,

                rgba(147,197,253,0.3) 0%,

                rgba(96,165,250,0.12) 40%,

                transparent 65%);

            filter: blur(2px);

        }

        .bloom-core.on { opacity: 1; }



        /* L2: Mid bloom (wider halo) */

        .bloom-mid {

            position: absolute;

            bottom: -4px; left: 50%; transform: translateX(-50%);

            width: 110px; height: 40px;

            border-radius: 50%;

            pointer-events: none; z-index: 8;

            opacity: 0;

            transition: opacity 0.5s ease;

            background: radial-gradient(ellipse at 50% 90%,

                rgba(59,130,246,0.18) 0%,

                rgba(37,99,235,0.06) 45%,

                transparent 68%);

            filter: blur(6px);

        }

        .bloom-mid.on { opacity: 1; }



        /* L3: Atmospheric bloom (large, very soft) */

        .bloom-atmo {

            position: absolute;

            bottom: -10px; left: 50%; transform: translateX(-50%);

            width: 160px; height: 55px;

            border-radius: 50%;

            pointer-events: none; z-index: 7;

            opacity: 0;

            transition: opacity 0.6s ease;

            background: radial-gradient(ellipse at 50% 80%,

                rgba(37,99,235,0.1) 0%,

                rgba(30,64,175,0.03) 45%,

                transparent 65%);

            filter: blur(12px);

        }

        .bloom-atmo.on { opacity: 1; animation: bloom-pulse 2.2s ease-in-out infinite; }

        @keyframes bloom-pulse {

            0%, 100% { opacity: 0.7; }

            50% { opacity: 1; }

        }



        /* L4: Surface wash (gradient flooding bottom half) */

        .light-wash {

            position: absolute;

            bottom: 0; left: 0; right: 0;

            height: 60%;

            border-radius: 0 0 10px 10px;

            pointer-events: none; z-index: 6;

            opacity: 0;

            transition: opacity 0.6s ease;

            background: linear-gradient(to top,

                rgba(37,99,235,0.06) 0%,

                rgba(37,99,235,0.02) 35%,

                transparent 100%);

        }

        .light-wash.on { opacity: 1; }



        /* L5: Vertical light column */

        .light-column {

            position: absolute;

            bottom: 6px; left: 50%; transform: translateX(-50%);

            width: 44px; height: 48px;

            pointer-events: none; z-index: 7;

            opacity: 0;

            transition: opacity 0.5s ease;

            background: radial-gradient(ellipse 40% 85% at 50% 100%,

                rgba(96,165,250,0.12) 0%,

                rgba(59,130,246,0.035) 45%,

                transparent 70%);

            filter: blur(3px);

        }

        .light-column.on { opacity: 1; }



        /* L6: Bottom edge rim catch (slit light hits button rim) */

        .rim-catch {

            position: absolute;

            bottom: 0; left: 15%; right: 15%;

            height: 1px;

            pointer-events: none; z-index: 11;

            opacity: 0;

            transition: opacity 0.5s ease;

            background: linear-gradient(90deg,

                transparent 0%,

                rgba(96,165,250,0.2) 20%,

                rgba(96,165,250,0.35) 50%,

                rgba(96,165,250,0.2) 80%,

                transparent 100%);

            box-shadow:

                0 0 3px rgba(96,165,250,0.35),

                0 0 6px rgba(59,130,246,0.2),

                0 1px 4px rgba(37,99,235,0.15);

        }

        .rim-catch.on { opacity: 1; }



        /* ═══ PROJECTED INTO GAP (below button) ═══ */

        .gap-proj {

            position: absolute;

            bottom: -7px; left: 50%; transform: translateX(-50%);

            width: 90px; height: 14px;

            border-radius: 50%;

            pointer-events: none; z-index: 3;

            opacity: 0;

            transition: opacity 0.6s ease;

            background: radial-gradient(ellipse at 50% 0%,

                rgba(59,130,246,0.22) 0%,

                rgba(37,99,235,0.07) 45%,

                transparent 70%);

            filter: blur(3px);

        }

        .gap-proj.on { opacity: 1; }



        /* ═══ DESK GLOW ═══ */

        .desk-glow {

            position: absolute;

            bottom: -18px; left: 50%; transform: translateX(-50%);

            width: 130px; height: 36px;

            border-radius: 50%;

            pointer-events: none;

            opacity: 0;

            transition: opacity 0.6s ease;

        }

        .desk-glow.on {

            opacity: 1;

            background: radial-gradient(ellipse at 50% 0%,

                rgba(59,130,246,0.14) 0%,

                rgba(37,99,235,0.05) 40%,

                transparent 70%);

            filter: blur(10px);

            animation: desk-breathe 2.2s ease-in-out infinite;

        }

        @keyframes desk-breathe {

            0%, 100% { opacity: 0.75; }

            50% { opacity: 1; }

        }

    </style>

</head>

<body>

    <div id="root"></div>



    <script type="text/babel">

        const { useState } = React;



        const ComprisButton = () => {

            const [pressed, setPressed] = useState(false);

            const on = pressed ? 'on' : '';



            return (

                <div style={{ position: 'relative' }}>

                    <div className={`button-container ${pressed ? 'active' : ''}`}>

                        <div className={`button-gap ${pressed ? 'active' : ''}`}></div>

                        <button

                            className={`button-center ${pressed ? 'pressed' : ''}`}

                            onClick={() => setPressed(!pressed)}

                        >

                            <span className={`btn-label ${on}`}>COMPRIS</span>



                            {/* 6 light projection layers */}

                            <div className={`light-wash ${on}`}></div>

                            <div className={`light-column ${on}`}></div>

                            <div className={`bloom-atmo ${on}`}></div>

                            <div className={`bloom-mid ${on}`}></div>

                            <div className={`bloom-core ${on}`}></div>

                            <div className={`rim-catch ${on}`}></div>



                            {/* Slit */}

                            <div className="slit">

                                <div className={`slit-core ${pressed ? 'slit-on' : 'slit-off'}`}></div>

                            </div>



                            {/* Gap projection */}

                            <div className={`gap-proj ${on}`}></div>

                        </button>

                    </div>

                    <div className={`desk-glow ${on}`}></div>

                </div>

            );

        };



        ReactDOM.createRoot(document.getElementById('root')).render(<ComprisButton />);

    </script>

</body>

</html>
