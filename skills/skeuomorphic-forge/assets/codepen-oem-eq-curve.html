<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OEM EQ Curve - Factory Signal</title>

    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {

            background-color: #070809;

            display: flex; justify-content: center; align-items: center;

            min-height: 100vh;

            font-family: 'Inter', sans-serif;

            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");

        }

        .chassis {

            background: linear-gradient(180deg, #2a2c31 0%, #15171a 100%);

            padding: 2px; border-radius: 16px;

            box-shadow: 0 60px 100px -20px rgba(0,0,0,1), 0 20px 40px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.05);

        }

        .chassis-inner {

            background: linear-gradient(135deg, #121316 0%, #08090a 100%);

            padding: 36px; border-radius: 15px;

            border-top: 1px solid rgba(255,255,255,0.08);

            border-bottom: 1px solid rgba(0,0,0,1);

            box-shadow: inset 0 6px 15px rgba(0,0,0,0.8);

        }

        .screen-bezel {

            position: relative; width: 750px; height: 400px;

            background-color: #020304; border-radius: 10px;

            box-shadow: inset 0 35px 60px -10px rgba(0,0,0,1), inset 0 0 30px 10px rgba(0,0,0,1), inset 0 2px 2px rgba(0,0,0,1), 0 1px 0 rgba(255,255,255,0.12);

            border-top: 3px solid #000; border-left: 3px solid #000;

            border-bottom: 1px solid #22252a; border-right: 1px solid #15181c;

            overflow: hidden;

        }

        .glass-reflection {

            position: absolute; inset: 0;

            background: linear-gradient(110deg, rgba(255,255,255,0.01) 0%, rgba(255,255,255,0.06) 30%, rgba(255,255,255,0) 31%), radial-gradient(150% 100% at 50% -25%, rgba(255,255,255,0.05) 0%, transparent 45%);

            pointer-events: none; z-index: 50; mix-blend-mode: screen;

        }

        .scanlines {

            position: absolute; inset: 0;

            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));

            background-size: 100% 4px; pointer-events: none; z-index: 40;

        }

        .screen-ambient-glow {

            position: absolute; inset: 0;

            background: radial-gradient(circle at 50% 50%, #061020 0%, #010203 100%); z-index: 0;

        }

    </style>

</head>

<body>

    <div id="root"></div>

    <script type="text/babel">

        const { useState, useEffect, useRef } = React;



        const LOG_MIN = Math.log10(20);

        const LOG_MAX = Math.log10(20000);

        const LOG_RANGE = LOG_MAX - LOG_MIN;

        const MARGIN_L = 55;

        const MARGIN_R = 960;

        const PLOT_W = MARGIN_R - MARGIN_L;



        const freqToX = (hz) => ((Math.log10(hz) - LOG_MIN) / LOG_RANGE) * PLOT_W + MARGIN_L;

        const xToFreq = (x) => Math.pow(10, ((x - MARGIN_L) / PLOT_W) * LOG_RANGE + LOG_MIN);



        /*

         * Typical OEM EQ shape (factory head unit compensation):

         * - Sub-bass rolloff below 40Hz (small speaker protection)

         * - Bass boost ~80-120Hz (+4 to +6dB, "loudness" compensation)

         * - Mid scoop ~400-800Hz (-3 to -5dB, masks cabin resonances)

         * - Presence peak ~2-3kHz (+2 to +3dB, voice clarity)

         * - Treble rolloff above 8kHz (-6 to -12dB, cheap tweeter protection)

         *

         * Modeled as sum of parametric bell filters + shelves

         */

        const parametricBell = (freq, fc, gainDb, Q) => {

            const ratio = freq / fc;

            const x2 = ratio * ratio;

            // Peaking EQ approximation

            const bw = 1 / Q;

            const denom = (1 - x2) * (1 - x2) + (bw * ratio) * (bw * ratio);

            const response = (bw * ratio) * (bw * ratio) / denom;

            return gainDb * response;

        };



        const highShelf = (freq, fc, gainDb, slope) => {

            const ratio = freq / fc;

            const rn = Math.pow(ratio, slope);

            return gainDb * rn / (1 + rn);

        };



        const lowShelf = (freq, fc, gainDb, slope) => {

            const ratio = fc / freq;

            const rn = Math.pow(ratio, slope);

            return gainDb * (1 - rn / (1 + rn));

        };



        const getOemEqDb = (freq) => {

            let db = 0;

            // Sub-bass rolloff (HPF ~35Hz, gentle)

            const subRatio = freq / 35;

            const subR4 = Math.pow(subRatio, 4);

            db += 10 * Math.log10(subR4 / (1 + subR4));

            // Bass boost bell: +5.5dB at 100Hz, Q=1.2

            db += parametricBell(freq, 100, 5.5, 1.2);

            // Mid scoop: -4dB at 500Hz, Q=0.8

            db += parametricBell(freq, 500, -4.0, 0.8);

            // Presence peak: +3dB at 2500Hz, Q=1.5

            db += parametricBell(freq, 2500, 3.0, 1.5);

            // Treble rolloff shelf: -10dB above 8kHz

            db += highShelf(freq, 8000, -10, 3);

            return db;

        };



        const OEMAnalyzer = () => {

            const requestRef = useRef();

            const [, setTick] = useState(0);



            // FFT shaped by OEM curve

            const fftRef = useRef(Array.from({ length: 64 }, (_, i) => {

                const x = MARGIN_L + (i / 63) * PLOT_W;

                return { x, y: 280, target: 280 };

            }));



            const animate = () => {

                if (Math.random() > 0.85) {

                    fftRef.current.forEach(pt => {

                        const freq = xToFreq(pt.x);

                        const oemDb = getOemEqDb(freq);

                        // Map: 0dB baseline = y280, each dB shifts ~6px

                        const baseY = 280 - oemDb * 6;

                        pt.target = baseY + (Math.random() - 0.5) * 120;

                        pt.target = Math.max(80, Math.min(430, pt.target));

                    });

                }



                fftRef.current.forEach(pt => {

                    pt.y += (pt.target - pt.y) * 0.06;

                });



                setTick(t => t + 1);

                requestRef.current = requestAnimationFrame(animate);

            };



            useEffect(() => {

                requestRef.current = requestAnimationFrame(animate);

                return () => cancelAnimationFrame(requestRef.current);

            }, []);



            const zeroDbY = 190;

            const dbToY = (db) => zeroDbY - db * (50 / 6);



            // Build OEM EQ curve

            const buildOEM = () => {

                const pts = [];

                const steps = 250;

                for (let i = 0; i <= steps; i++) {

                    const x = MARGIN_L + (i / steps) * PLOT_W;

                    const freq = xToFreq(x);

                    const db = getOemEqDb(freq);

                    const y = Math.min(Math.max(dbToY(db), 50), 455);

                    pts.push(`${x.toFixed(1)} ${y.toFixed(1)}`);

                }

                return pts;

            };



            // Build flat reference

            const buildFlat = () => {

                const pts = [];

                const steps = 250;

                for (let i = 0; i <= steps; i++) {

                    const x = MARGIN_L + (i / steps) * PLOT_W;

                    pts.push(`${x.toFixed(1)} ${zeroDbY.toFixed(1)}`);

                }

                return pts;

            };



            const oemPts = buildOEM();

            const oemCurve = `M ${oemPts.join(' L ')}`;

            const oemFill = `${oemCurve} L ${MARGIN_R} 455 L ${MARGIN_R} 460 L ${MARGIN_L} 460 Z`;



            const fftPath = `M ${MARGIN_L} 440 ${fftRef.current.map(p => `L ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ')} L ${MARGIN_R} 440`;



            const gridFreqs = [20, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 20000];

            const gridLabels = ["20", "50", "100", "200", "500", "1k", "2k", "5k", "10k", "20k"];

            const dbMarks = [6, 0, -6, -12, -18, -24, -30, -36];



            // Annotation positions

            const bassBoostX = freqToX(100);

            const bassBoostY = dbToY(5.5);

            const midScoopX = freqToX(500);

            const midScoopY = dbToY(-4);

            const presenceX = freqToX(2500);

            const presenceY = dbToY(3);

            const trebleRollX = freqToX(12000);

            const trebleRollY = dbToY(-6);



            return (

                <div className="chassis">

                    <div className="chassis-inner">

                        <div className="screen-bezel">

                            <div className="screen-ambient-glow" />

                            <div className="scanlines" />

                            <div className="glass-reflection" />



                            {/* Grid layer */}

                            <svg style={{ position: "absolute", inset: 0, width: "100%", height: "100%", zIndex: 10 }}

                                viewBox="0 0 1000 500" preserveAspectRatio="none">



                                <g stroke="#1a2233" strokeWidth="1" strokeDasharray="4 4" opacity="0.5">

                                    {dbMarks.map((db, i) => {

                                        const y = dbToY(db);

                                        return y > 40 && y < 455 ? <line key={i} x1={MARGIN_L} y1={y} x2={MARGIN_R} y2={y} /> : null;

                                    })}

                                </g>



                                <line x1={MARGIN_L} y1={zeroDbY} x2={MARGIN_R} y2={zeroDbY}

                                    stroke="#2a3550" strokeWidth="1.5" opacity="0.6" />



                                <g stroke="#1a2233" strokeWidth="1" strokeDasharray="4 4" opacity="0.4">

                                    {gridFreqs.map((f, i) => (

                                        <line key={i} x1={freqToX(f)} y1="40" x2={freqToX(f)} y2="450" />

                                    ))}

                                </g>



                                <g fill="#3a4860" fontSize="11" fontWeight="600" fontFamily="Inter" textAnchor="end">

                                    {dbMarks.map((db, i) => {

                                        const y = dbToY(db);

                                        if (y < 45 || y > 450) return null;

                                        return <text key={i} x={MARGIN_L - 6} y={y + 4}>{db > 0 ? `+${db}` : db}</text>;

                                    })}

                                </g>



                                <g fill="#3a4860" fontSize="11" fontWeight="600" fontFamily="Inter" textAnchor="middle">

                                    {gridFreqs.map((f, i) => (

                                        <text key={i} x={freqToX(f)} y="470">{gridLabels[i]}</text>

                                    ))}

                                    <text x="500" y="492" fill="#2a3448" fontSize="9">Hz</text>

                                </g>



                                <text x="18" y="250" fill="#2a3448" fontSize="9" fontFamily="Inter"

                                    transform="rotate(-90, 18, 250)" textAnchor="middle">dB</text>

                            </svg>



                            {/* Curves layer */}

                            <svg style={{ position: "absolute", inset: 0, width: "100%", height: "100%", zIndex: 20 }}

                                viewBox="0 0 1000 500" preserveAspectRatio="none">

                                <defs>

                                    <linearGradient id="oemFill" x1="0" y1="0" x2="0" y2="1">

                                        <stop offset="0%" stopColor="#f59e0b" stopOpacity="0.2" />

                                        <stop offset="50%" stopColor="#92400e" stopOpacity="0.05" />

                                        <stop offset="100%" stopColor="#020617" stopOpacity="0" />

                                    </linearGradient>

                                    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">

                                        <feGaussianBlur stdDeviation="5" result="blur" />

                                        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>

                                    </filter>

                                    <filter id="softGlow">

                                        <feGaussianBlur stdDeviation="3" result="blur" />

                                        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>

                                    </filter>

                                    <filter id="annotGlow">

                                        <feGaussianBlur stdDeviation="2" result="blur" />

                                        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>

                                    </filter>

                                </defs>



                                {/* FFT shaped by OEM curve */}

                                <path d={fftPath} fill="none" stroke="#182638" strokeWidth="2" strokeLinejoin="round" />



                                {/* OEM fill under curve */}

                                <path d={oemFill} fill="url(#oemFill)" style={{ mixBlendMode: 'screen' }} />



                                {/* Flat 0dB reference (dimmed cyan dashed) */}

                                <rect x={MARGIN_L} y={zeroDbY - 1} width={PLOT_W} height="2"

                                    fill="#38bdf8" opacity="0.15" />



                                {/* OEM EQ curve (amber/orange) */}

                                <path d={oemCurve} fill="none" stroke="#f59e0b" strokeWidth="4"

                                    strokeLinecap="round" strokeLinejoin="round" filter="url(#neonGlow)" />



                                {/* OEM EQ DETECTED label */}

                                <text x="500" y="340"

                                    fill="#f59e0b" fontSize="36" fontWeight="700"

                                    fontFamily="Inter" textAnchor="middle"

                                    filter="url(#neonGlow)">

                                    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite" />

                                    OEM EQ DETECTED

                                </text>



                                {/* ====== ANNOTATIONS on curve features ====== */}



                                {/* Bass boost annotation */}

                                <g opacity="0.6">

                                    <circle cx={bassBoostX} cy={bassBoostY} r="5" fill="#f59e0b" filter="url(#annotGlow)" />

                                    <line x1={bassBoostX} y1={bassBoostY - 8} x2={bassBoostX} y2={bassBoostY - 35}

                                        stroke="#f59e0b" strokeWidth="1" strokeDasharray="3 2" />

                                    <text x={bassBoostX} y={bassBoostY - 40}

                                        fill="#f59e0b" fontSize="9" fontWeight="700" fontFamily="Inter"

                                        textAnchor="middle" filter="url(#annotGlow)">

                                        BASS BOOST

                                    </text>

                                    <text x={bassBoostX} y={bassBoostY - 28}

                                        fill="#b37a0a" fontSize="8" fontWeight="600" fontFamily="Inter"

                                        textAnchor="middle">

                                        +5.5 dB @ 100 Hz

                                    </text>

                                </g>



                                {/* Mid scoop annotation */}

                                <g opacity="0.6">

                                    <circle cx={midScoopX} cy={midScoopY} r="5" fill="#ef4444" filter="url(#annotGlow)" />

                                    <line x1={midScoopX} y1={midScoopY + 8} x2={midScoopX} y2={midScoopY + 35}

                                        stroke="#ef4444" strokeWidth="1" strokeDasharray="3 2" />

                                    <text x={midScoopX} y={midScoopY + 48}

                                        fill="#ef4444" fontSize="9" fontWeight="700" fontFamily="Inter"

                                        textAnchor="middle" filter="url(#annotGlow)">

                                        MID SCOOP

                                    </text>

                                    <text x={midScoopX} y={midScoopY + 60}

                                        fill="#b33a3a" fontSize="8" fontWeight="600" fontFamily="Inter"

                                        textAnchor="middle">

                                        -4 dB @ 500 Hz

                                    </text>

                                </g>



                                {/* Presence peak annotation */}

                                <g opacity="0.6">

                                    <circle cx={presenceX} cy={presenceY} r="5" fill="#f59e0b" filter="url(#annotGlow)" />

                                    <line x1={presenceX} y1={presenceY - 8} x2={presenceX} y2={presenceY - 35}

                                        stroke="#f59e0b" strokeWidth="1" strokeDasharray="3 2" />

                                    <text x={presenceX} y={presenceY - 40}

                                        fill="#f59e0b" fontSize="9" fontWeight="700" fontFamily="Inter"

                                        textAnchor="middle" filter="url(#annotGlow)">

                                        PRESENCE

                                    </text>

                                    <text x={presenceX} y={presenceY - 28}

                                        fill="#b37a0a" fontSize="8" fontWeight="600" fontFamily="Inter"

                                        textAnchor="middle">

                                        +3 dB @ 2.5 kHz

                                    </text>

                                </g>



                                {/* Treble rolloff annotation */}

                                <g opacity="0.6">

                                    <circle cx={trebleRollX} cy={trebleRollY} r="5" fill="#ef4444" filter="url(#annotGlow)" />

                                    <line x1={trebleRollX} y1={trebleRollY + 8} x2={trebleRollX} y2={trebleRollY + 30}

                                        stroke="#ef4444" strokeWidth="1" strokeDasharray="3 2" />

                                    <text x={trebleRollX} y={trebleRollY + 43}

                                        fill="#ef4444" fontSize="9" fontWeight="700" fontFamily="Inter"

                                        textAnchor="middle" filter="url(#annotGlow)">

                                        TREBLE ROLLOFF

                                    </text>

                                    <text x={trebleRollX} y={trebleRollY + 55}

                                        fill="#b33a3a" fontSize="8" fontWeight="600" fontFamily="Inter"

                                        textAnchor="middle">

                                        -10 dB shelf @ 8 kHz

                                    </text>

                                </g>



                                {/* ====== DSP-STYLE INFO PANEL (top-right) ====== */}

                                <g>

                                    <rect x="780" y="48" width="170" height="120" rx="4"

                                        fill="rgba(0,0,0,0.5)" stroke="rgba(245,158,11,0.15)" strokeWidth="1" />



                                    <text x="865" y="70" fill="#f59e0b" fontSize="20" fontWeight="700"

                                        fontFamily="Inter" textAnchor="middle"

                                        style={{ filter: 'drop-shadow(0 0 10px rgba(245,158,11,0.4))' }}>

                                        OEM EQ

                                    </text>

                                    <text x="865" y="86" fill="#6a5020" fontSize="10" fontWeight="600"

                                        fontFamily="Inter" textAnchor="middle">

                                        FACTORY SIGNAL

                                    </text>



                                    <line x1="790" y1="94" x2="940" y2="94" stroke="rgba(245,158,11,0.1)" strokeWidth="1" />



                                    <text x="795" y="110" fill="#4a5a78" fontSize="9" fontWeight="600" fontFamily="Inter">SOURCE</text>

                                    <text x="940" y="110" fill="#8898b8" fontSize="10" fontWeight="700" fontFamily="Inter" textAnchor="end">Head Unit</text>



                                    <text x="795" y="126" fill="#4a5a78" fontSize="9" fontWeight="600" fontFamily="Inter">OUTPUT</text>

                                    <text x="940" y="126" fill="#8898b8" fontSize="10" fontWeight="700" fontFamily="Inter" textAnchor="end">Speaker Level</text>



                                    <text x="795" y="142" fill="#4a5a78" fontSize="9" fontWeight="600" fontFamily="Inter">CORRECTION</text>

                                    <text x="940" y="142" fill="#ef4444" fontSize="10" fontWeight="700" fontFamily="Inter" textAnchor="end">REQUIRED</text>



                                    <text x="795" y="158" fill="#4a5a78" fontSize="9" fontWeight="600" fontFamily="Inter">DEVIATION</text>

                                    <text x="940" y="158" fill="#ef4444" fontSize="10" fontWeight="700" fontFamily="Inter" textAnchor="end">±6 dB</text>

                                </g>



                                {/* 0dB REF label */}

                                <text x={MARGIN_R - 5} y={zeroDbY - 5}

                                    fill="#38bdf8" fontSize="9" fontWeight="600" fontFamily="Inter"

                                    textAnchor="end" opacity="0.4">

                                    0 dB REF (FLAT)

                                </text>



                                {/* DSP CROSSOVER badge */}

                                <text x={MARGIN_L + 10} y="448" fill="#f59e0b" fontSize="9" fontWeight="600"

                                    fontFamily="Inter"

                                    style={{ filter: 'drop-shadow(0 0 5px rgba(245,158,11,0.3))' }}>

                                    DSP INPUT ANALYSIS

                                </text>

                            </svg>

                        </div>

                    </div>

                </div>

            );

        };



        const root = ReactDOM.createRoot(document.getElementById('root'));

        root.render(<OEMAnalyzer />);

    </script>

</body>

</html> \
