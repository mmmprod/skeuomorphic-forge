<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Full Range - No Crossover</title>

    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {

            background-color: #070809;

            display: flex; justify-content: center; align-items: center;

            min-height: 100vh;

            font-family: 'Inter', sans-serif;

            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");

        }

        .chassis {

            background: linear-gradient(180deg, #2a2c31 0%, #15171a 100%);

            padding: 2px; border-radius: 16px;

            box-shadow: 0 60px 100px -20px rgba(0,0,0,1), 0 20px 40px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.05);

        }

        .chassis-inner {

            background: linear-gradient(135deg, #121316 0%, #08090a 100%);

            padding: 36px; border-radius: 15px;

            border-top: 1px solid rgba(255,255,255,0.08);

            border-bottom: 1px solid rgba(0,0,0,1);

            box-shadow: inset 0 6px 15px rgba(0,0,0,0.8);

        }

        .screen-bezel {

            position: relative; width: 750px; height: 400px;

            background-color: #020304; border-radius: 10px;

            box-shadow: inset 0 35px 60px -10px rgba(0,0,0,1), inset 0 0 30px 10px rgba(0,0,0,1), inset 0 2px 2px rgba(0,0,0,1), 0 1px 0 rgba(255,255,255,0.12);

            border-top: 3px solid #000; border-left: 3px solid #000;

            border-bottom: 1px solid #22252a; border-right: 1px solid #15181c;

            overflow: hidden;

        }

        .glass-reflection {

            position: absolute; inset: 0;

            background: linear-gradient(110deg, rgba(255,255,255,0.01) 0%, rgba(255,255,255,0.06) 30%, rgba(255,255,255,0) 31%), radial-gradient(150% 100% at 50% -25%, rgba(255,255,255,0.05) 0%, transparent 45%);

            pointer-events: none; z-index: 50; mix-blend-mode: screen;

        }

        .scanlines {

            position: absolute; inset: 0;

            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));

            background-size: 100% 4px; pointer-events: none; z-index: 40;

        }

        .screen-ambient-glow {

            position: absolute; inset: 0;

            background: radial-gradient(circle at 50% 50%, #061020 0%, #010203 100%); z-index: 0;

        }

    </style>

</head>

<body>

    <div id="root"></div>

    <script type="text/babel">

        const { useState, useEffect, useRef } = React;



        const LOG_MIN = Math.log10(20);

        const LOG_MAX = Math.log10(20000);

        const LOG_RANGE = LOG_MAX - LOG_MIN;

        const MARGIN_L = 55;

        const MARGIN_R = 960;

        const PLOT_W = MARGIN_R - MARGIN_L;



        const freqToX = (hz) => ((Math.log10(hz) - LOG_MIN) / LOG_RANGE) * PLOT_W + MARGIN_L;



        const FullRangeAnalyzer = () => {

            const requestRef = useRef();

            const [, setTick] = useState(0);



            // FFT: full spectrum active

            const fftRef = useRef(Array.from({ length: 64 }, (_, i) => {

                const x = MARGIN_L + (i / 63) * PLOT_W;

                return { x, y: 280, target: 280 };

            }));



            const animate = () => {

                if (Math.random() > 0.85) {

                    fftRef.current.forEach(pt => {

                        // All frequencies active, slight natural rolloff at extremes

                        const normX = (pt.x - MARGIN_L) / PLOT_W;

                        const edgeFade = Math.min(normX * 5, 1) * Math.min((1 - normX) * 5, 1);

                        pt.target = 100 + Math.random() * 220 * edgeFade + (1 - edgeFade) * 60;

                    });

                }



                fftRef.current.forEach(pt => {

                    pt.y += (pt.target - pt.y) * 0.06;

                });



                setTick(t => t + 1);

                requestRef.current = requestAnimationFrame(animate);

            };



            useEffect(() => {

                requestRef.current = requestAnimationFrame(animate);

                return () => cancelAnimationFrame(requestRef.current);

            }, []);



            const zeroDbY = 150;

            const dbToY = (db) => zeroDbY - db * (50 / 6);



            // Flat response: 250 points at 0dB, same density as HPF/LPF curves

            const buildFlat = () => {

                const pts = [];

                const steps = 250;

                for (let i = 0; i <= steps; i++) {

                    const x = MARGIN_L + (i / steps) * PLOT_W;

                    pts.push(`${x.toFixed(1)} ${zeroDbY.toFixed(1)}`);

                }

                return pts;

            };



            const flatPts = buildFlat();

            const flatCurve = `M ${flatPts.join(' L ')}`;

            const flatFill = `${flatCurve} L ${MARGIN_R} 460 L ${MARGIN_L} 460 Z`;



            const fftPath = `M ${MARGIN_L} 440 ${fftRef.current.map(p => `L ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ')} L ${MARGIN_R} 440`;



            const gridFreqs = [20, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 20000];

            const gridLabels = ["20", "50", "100", "200", "500", "1k", "2k", "5k", "10k", "20k"];

            const dbMarks = [6, 0, -6, -12, -18, -24, -30, -36, -42];



            return (

                <div className="chassis">

                    <div className="chassis-inner">

                        <div className="screen-bezel">

                            <div className="screen-ambient-glow" />

                            <div className="scanlines" />

                            <div className="glass-reflection" />



                            {/* Grid layer */}

                            <svg style={{ position: "absolute", inset: 0, width: "100%", height: "100%", zIndex: 10 }}

                                viewBox="0 0 1000 500" preserveAspectRatio="none">



                                <g stroke="#1a2233" strokeWidth="1" strokeDasharray="4 4" opacity="0.5">

                                    {dbMarks.map((db, i) => {

                                        const y = dbToY(db);

                                        return y > 40 && y < 455 ? <line key={i} x1={MARGIN_L} y1={y} x2={MARGIN_R} y2={y} /> : null;

                                    })}

                                </g>



                                <line x1={MARGIN_L} y1={zeroDbY} x2={MARGIN_R} y2={zeroDbY}

                                    stroke="#2a3550" strokeWidth="1.5" opacity="0.6" />



                                <g stroke="#1a2233" strokeWidth="1" strokeDasharray="4 4" opacity="0.4">

                                    {gridFreqs.map((f, i) => (

                                        <line key={i} x1={freqToX(f)} y1="40" x2={freqToX(f)} y2="450" />

                                    ))}

                                </g>



                                <g fill="#3a4860" fontSize="11" fontWeight="600" fontFamily="Inter" textAnchor="end">

                                    {dbMarks.map((db, i) => {

                                        const y = dbToY(db);

                                        if (y < 45 || y > 450) return null;

                                        return <text key={i} x={MARGIN_L - 6} y={y + 4}>{db > 0 ? `+${db}` : db}</text>;

                                    })}

                                </g>



                                <g fill="#3a4860" fontSize="11" fontWeight="600" fontFamily="Inter" textAnchor="middle">

                                    {gridFreqs.map((f, i) => (

                                        <text key={i} x={freqToX(f)} y="470">{gridLabels[i]}</text>

                                    ))}

                                    <text x="500" y="492" fill="#2a3448" fontSize="9">Hz</text>

                                </g>



                                <text x="18" y="250" fill="#2a3448" fontSize="9" fontFamily="Inter"

                                    transform="rotate(-90, 18, 250)" textAnchor="middle">dB</text>

                            </svg>



                            {/* Curves layer */}

                            <svg style={{ position: "absolute", inset: 0, width: "100%", height: "100%", zIndex: 20 }}

                                viewBox="0 0 1000 500" preserveAspectRatio="none">

                                <defs>

                                    <linearGradient id="passFill" x1="0" y1="0" x2="0" y2="1">

                                        <stop offset="0%" stopColor="#0ea5e9" stopOpacity="0.3" />

                                        <stop offset="50%" stopColor="#0369a1" stopOpacity="0.06" />

                                        <stop offset="100%" stopColor="#020617" stopOpacity="0" />

                                    </linearGradient>

                                    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">

                                        <feGaussianBlur stdDeviation="5" result="blur" />

                                        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>

                                    </filter>

                                    <filter id="softGlow">

                                        <feGaussianBlur stdDeviation="3" result="blur" />

                                        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>

                                    </filter>

                                </defs>



                                {/* FFT full spectrum */}

                                <path d={fftPath} fill="none" stroke="#182638" strokeWidth="2" strokeLinejoin="round" />



                                {/* Entire range is passband (green tint) */}

                                <path d={flatFill} fill="url(#passFill)" style={{ mixBlendMode: 'screen' }} />



                                {/* Flat response curve - thick cyan line like HPF/LPF */}

                                {/* Rendered as rect because preserveAspectRatio="none" squishes horizontal stroke to invisible */}

                                <rect x={MARGIN_L} y={zeroDbY - 3} width={PLOT_W} height="6"

                                    rx="3" fill="#38bdf8" filter="url(#neonGlow)" />



                                {/* 0dB markers at both ends */}

                                <circle cx={MARGIN_L} cy={zeroDbY} r="4" fill="#38bdf8" filter="url(#softGlow)" />

                                <circle cx={MARGIN_R} cy={zeroDbY} r="4" fill="#38bdf8" filter="url(#softGlow)" />



                                {/* 0dB label */}

                                <text x="500" y={zeroDbY - 12}

                                    fill="#4ade80" fontSize="11" fontWeight="600" fontFamily="Inter"

                                    textAnchor="middle" opacity="0.5"

                                    filter="url(#softGlow)">

                                    0 dB FLAT

                                </text>



                                {/* Bandwidth indicator arrows */}

                                <g opacity="0.35">

                                    {/* Left arrow */}

                                    <line x1={MARGIN_L + 10} y1={zeroDbY + 20} x2={MARGIN_L + 60} y2={zeroDbY + 20}

                                        stroke="#4ade80" strokeWidth="1.5" />

                                    <line x1={MARGIN_L + 10} y1={zeroDbY + 16} x2={MARGIN_L + 10} y2={zeroDbY + 24}

                                        stroke="#4ade80" strokeWidth="1.5" />

                                    {/* Right arrow */}

                                    <line x1={MARGIN_R - 60} y1={zeroDbY + 20} x2={MARGIN_R - 10} y2={zeroDbY + 20}

                                        stroke="#4ade80" strokeWidth="1.5" />

                                    <line x1={MARGIN_R - 10} y1={zeroDbY + 16} x2={MARGIN_R - 10} y2={zeroDbY + 24}

                                        stroke="#4ade80" strokeWidth="1.5" />

                                    {/* Center label */}

                                    <text x="500" y={zeroDbY + 24}

                                        fill="#4ade80" fontSize="10" fontWeight="600" fontFamily="Inter"

                                        textAnchor="middle">

                                        20 Hz ~ 20 kHz

                                    </text>

                                </g>



                                {/* ====== DSP-STYLE INFO PANEL (bottom-right) ====== */}

                                <g>

                                    <rect x="780" y="300" width="170" height="105" rx="4"

                                        fill="rgba(0,0,0,0.5)" stroke="rgba(74,222,128,0.15)" strokeWidth="1" />



                                    <text x="865" y="322" fill="#4ade80" fontSize="20" fontWeight="700"

                                        fontFamily="Inter" textAnchor="middle"

                                        style={{ filter: 'drop-shadow(0 0 10px rgba(74,222,128,0.4))' }}>

                                        FULL RANGE

                                    </text>

                                    <text x="865" y="338" fill="#2a6545" fontSize="10" fontWeight="600"

                                        fontFamily="Inter" textAnchor="middle">

                                        NO CROSSOVER

                                    </text>



                                    <line x1="790" y1="346" x2="940" y2="346" stroke="rgba(74,222,128,0.1)" strokeWidth="1" />



                                    <text x="795" y="362" fill="#4a5a78" fontSize="9" fontWeight="600" fontFamily="Inter">HPF</text>

                                    <text x="940" y="362" fill="#5a6a4a" fontSize="10" fontWeight="700" fontFamily="Inter" textAnchor="end">BYPASS</text>



                                    <text x="795" y="378" fill="#4a5a78" fontSize="9" fontWeight="600" fontFamily="Inter">LPF</text>

                                    <text x="940" y="378" fill="#5a6a4a" fontSize="10" fontWeight="700" fontFamily="Inter" textAnchor="end">BYPASS</text>



                                    <text x="795" y="394" fill="#4a5a78" fontSize="9" fontWeight="600" fontFamily="Inter">BANDWIDTH</text>

                                    <text x="940" y="394" fill="#8898b8" fontSize="10" fontWeight="700" fontFamily="Inter" textAnchor="end">20 Hz ~ 20 kHz</text>

                                </g>



                                {/* Channel assignment */}

                                <g>

                                    <rect x="780" y="412" width="170" height="32" rx="4"

                                        fill="rgba(0,0,0,0.4)" stroke="rgba(255,170,0,0.12)" strokeWidth="1" />

                                    <text x="795" y="432" fill="#6a5530" fontSize="9" fontWeight="600" fontFamily="Inter">CH</text>

                                    <text x="940" y="432" fill="#cc8822" fontSize="11" fontWeight="700" fontFamily="Inter" textAnchor="end">FRONT / REAR</text>

                                </g>



                                {/* PASSBAND label across full width */}

                                <text x="500" y="430"

                                    fill="#1a5a3a" fontSize="13" fontWeight="700"

                                    fontFamily="Inter" textAnchor="middle" opacity="0.4">

                                    FULL PASSBAND

                                </text>



                                {/* DSP CROSSOVER badge */}

                                <text x={MARGIN_L + 10} y="448" fill="#4ade80" fontSize="9" fontWeight="600"

                                    fontFamily="Inter"

                                    style={{ filter: 'drop-shadow(0 0 5px rgba(74,222,128,0.3))' }}>

                                    DSP CROSSOVER

                                </text>

                            </svg>

                        </div>

                    </div>

                </div>

            );

        };



        const root = ReactDOM.createRoot(document.getElementById('root'));

        root.render(<FullRangeAnalyzer />);

    </script>

</body>

</html>
