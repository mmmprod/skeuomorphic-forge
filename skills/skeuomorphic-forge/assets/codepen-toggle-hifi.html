<html lang="fr">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Toggle UI High Fidelity</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>

    body {

      font-family: 'Inter', sans-serif;

      background: radial-gradient(circle at center, #3d4651 0%, #2b3138 100%);

      margin: 0;

      height: 100vh;

      display: flex;

      align-items: center;

      justify-content: center;

      overflow: hidden;

    }



    /* Le boitier extérieur qui contient le bouton */

    .toggle-outer {

      position: relative;

      width: 480px;

      height: 110px;

      padding: 3px;

      border-radius: 100px;

      background: linear-gradient(180deg, #14181c 0%, #242a31 100%);

      box-shadow: 

        0 20px 40px rgba(0,0,0,0.5),

        0 2px 3px rgba(255,255,255,0.1);

      display: flex;

      align-items: center;

      cursor: pointer;

      user-select: none;

    }



    /* La gorge creusée où glisse le bouton - plus serrée */

    .toggle-trench {

      position: relative;

      width: 100%;

      height: 100%;

      background: #0d0f12;

      border-radius: 100px;

      box-shadow: 

        inset 0 12px 20px rgba(0,0,0,0.9),

        inset 0 -4px 8px rgba(255,255,255,0.05);

      overflow: hidden;

      display: flex;

      align-items: center;

    }



    /* Le bouton lui-même - affleurant (padding réduit) */

    .thumb {

      position: absolute;

      top: 2px;

      bottom: 2px;

      left: 2px;

      width: calc(50% - 4px);

      border-radius: 100px;

      display: flex;

      align-items: center;

      justify-content: center;

      transition: transform 0.4s cubic-bezier(0.65, 0, 0.35, 1);

      z-index: 10;

      

      /* Bevel supérieur et rebord */

      border-top: 1px solid rgba(255,255,255,0.2);

      border-left: 1px solid rgba(255,255,255,0.1);

      border-right: 1px solid rgba(0,0,0,0.3);

      border-bottom: 2px solid rgba(0,0,0,0.5);

      

      box-shadow: 

        0 10px 20px rgba(0,0,0,0.6),

        inset 0 1px 1px rgba(255,255,255,0.15);

    }



    .thumb.left {

      background: linear-gradient(165deg, #586170 0%, #3a424b 48%, #22272e 100%);

    }



    .thumb.right {

      background: linear-gradient(165deg, #4c5560 0%, #303740 50%, #1b1f25 100%);

      transform: translateX(100%);

    }



    /* Labels de fond */

    .labels-bg {

      position: absolute;

      inset: 0;

      display: flex;

      z-index: 1;

    }



    .label-bg {

      flex: 1;

      display: flex;

      align-items: center;

      justify-content: center;

      font-size: 1.1rem;

      font-weight: 500;

      letter-spacing: 0.1em;

      color: #1e242b;

    }



    /* Texte sur le bouton */

    .thumb-text {

      font-size: 1.1rem;

      font-weight: 500;

      letter-spacing: 0.1em;

      transition: all 0.3s ease;

    }



    .glow-cyan {

      color: #cffafe;

      text-shadow: 0 0 10px rgba(103,232,249,0.7), 0 0 20px rgba(103,232,249,0.4);

    }



    .glow-amber {

      color: #ffedd5;

      text-shadow: 0 0 10px rgba(251,191,36,0.6), 0 0 20px rgba(251,191,36,0.3);

    }



    .dot {

      position: absolute;

      right: 25px;

      top: 50%;

      transform: translateY(-50%);

      width: 10px;

      height: 10px;

      border-radius: 50%;

      background: #111418;

      box-shadow: inset 1px 1px 3px rgba(0,0,0,0.8);

      display: flex;

      align-items: center;

      justify-content: center;

    }

    

    .dot-active {

      width: 4px;

      height: 4px;

      border-radius: 50%;

      background: rgba(103,232,249,0.8);

      box-shadow: 0 0 6px rgba(103,232,249,1);

    }



    body::after {

      content: "";

      position: fixed;

      inset: 0;

      opacity: 0.04;

      pointer-events: none;

      background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');

      z-index: 100;

    }

  </style>

</head>

<body>

  <div id="root"></div>



  <script type="text/babel">

    const { useState } = React;



    const App = () => {

      const [isLeft, setIsLeft] = useState(true);



      const toggle = () => setIsLeft(!isLeft);



      return (

        <div className="toggle-outer" onClick={toggle}>

          <div className="toggle-trench">

            <div className="labels-bg">

              <div className="label-bg">CHAN MAP</div>

              <div className="label-bg">CLASS AB/D</div>

            </div>



            <div className={`thumb ${isLeft ? 'left' : 'right'}`}>

              <span className={`thumb-text ${isLeft ? 'glow-cyan' : 'glow-amber'}`}>

                {isLeft ? 'CHAN MAP' : 'CLASS AB/D'}

              </span>

              <div className="dot">

                <div className="dot-active" style={{ background: isLeft ? '#67e8f9' : '#fbbf24', boxShadow: isLeft ? '0 0 6px #67e8f9' : '0 0 6px #fbbf24' }}></div>

              </div>

            </div>

          </div>

        </div>

      );

    };



    const root = ReactDOM.createRoot(document.getElementById('root'));

    root.render(<App />);

  </script>

</body>

</html> \
