<html lang="fr">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Bouton Skeuomorphique</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    body {

      background: radial-gradient(120% 120% at 20% 10%, #2a2f38 0%, #1a1d24 60%, #14161b 100%);

      margin: 0;

      height: 100vh;

      display: flex;

      align-items: center;

      justify-content: center;

      overflow: hidden;

      font-family: "Inter", system-ui, -apple-system, sans-serif;

    }

  </style>

</head>

<body>



  <!-- Group wrapper to coordinate states across shell and button -->

  <div class="relative group w-full max-w-[380px]">



    <!-- Outer Shell (The casing) -->

    <div class="relative p-[14px] md:p-[18px] rounded-[60px] bg-[#1b1f26] shadow-[inset_0_2px_2px_rgba(255,255,255,0.08),inset_0_-6px_10px_rgba(0,0,0,0.6),0_30px_60px_rgba(0,0,0,0.55)]">



      <!-- Projected Light (Glow on the shell when pressed) -->

      <div class="absolute inset-[14px] md:inset-[18px] rounded-[60px] bg-green-500/0 shadow-[0_0_0px_rgba(34,197,94,0)] group-active:bg-green-500/20 group-active:shadow-[0_0_40px_15px_rgba(34,197,94,0.4)] transition-all duration-150 pointer-events-none translate-y-[2px]"></div>



      <!-- The Button -->

      <button class="relative w-full h-[90px] md:h-[120px] rounded-[60px] border-none cursor-pointer text-[#cfd3da] text-xl md:text-2xl font-bold tracking-[0.15em] uppercase bg-gradient-to-b from-[#3a3f47] via-[#2b2f36] to-[#23262c] shadow-[inset_0_1px_1px_rgba(255,255,255,0.35),inset_0_-12px_20px_rgba(0,0,0,0.55),0_12px_24px_rgba(0,0,0,0.5)] transition-all duration-150 overflow-hidden active:translate-y-[2px] active:shadow-[inset_0_1px_1px_rgba(255,255,255,0.2),inset_0_-8px_14px_rgba(0,0,0,0.55),0_6px_16px_rgba(0,0,0,0.55)] flex items-center justify-center">



        <!-- Internal Colored LED Glow (Active ONLY) -->

        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(34,197,94,0.9)_0%,rgba(21,128,61,0.5)_60%,transparent_100%)] opacity-0 group-active:opacity-100 transition-opacity duration-150 pointer-events-none"></div>



        <!-- Glassy Top Reflection (Brillance) -->

        <div class="absolute top-[4px] md:top-[6px] left-[8px] md:left-[12px] right-[8px] md:right-[12px] h-[35px] md:h-[46px] rounded-[40px] bg-gradient-to-b from-white/60 to-transparent opacity-80 pointer-events-none group-active:opacity-90 group-active:from-green-100/80 transition-all duration-150"></div>



        <!-- Bottom Glass Reflection (Bounce light) -->

        <div class="absolute bottom-[4px] md:bottom-[6px] left-[15%] right-[15%] h-[15px] md:h-[20px] rounded-[40px] bg-gradient-to-t from-white/10 to-transparent opacity-50 pointer-events-none group-active:from-green-200/30 transition-all duration-150"></div>



        <!-- Rim Light (Crisp edge highlights) -->

        <div class="absolute inset-0 rounded-[60px] border-[1.5px] border-white/10 border-t-white/50 border-b-black/80 pointer-events-none mix-blend-overlay group-active:border-t-green-300/70 transition-colors duration-150"></div>

        <div class="absolute inset-[2px] rounded-[58px] border border-white/5 border-t-white/20 pointer-events-none group-active:border-t-green-200/40 transition-colors duration-150"></div>



        <!-- Text -->

        <span class="relative z-10 drop-shadow-[0_2px_2px_rgba(0,0,0,0.5)] group-hover:text-white group-active:text-white group-active:drop-shadow-[0_0_15px_rgba(255,255,255,0.9)] transition-all duration-150">

          Accepter

        </span>



      </button>

    </div>

  </div>



</body>

</html>
