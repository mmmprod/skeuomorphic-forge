<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Futuristic Toggle Interface — Advanced</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {

            font-family: 'Inter', sans-serif;

            background-color: #0b0c10;

            margin: 0;

            display: flex;

            align-items: center;

            justify-content: center;

            min-height: 100vh;

            color: white;

            overflow: hidden;

        }

        .ambient-bg {

            position: fixed; inset: 0;

            pointer-events: none; z-index: -1;

            background: radial-gradient(circle at 50% 50%, #1a1c23 0%, #0a0b0f 100%);

        }

        .particle {

            position: absolute;

            background: rgba(255,255,255,0.05);

            border-radius: 50%;

            pointer-events: none;

        }

        .ui-container {

            position: relative;

            background:

                url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"),

                linear-gradient(152deg, #1e2028 0%, #16181e 30%, #111318 55%, #15171e 80%, #1a1c22 100%);

            background-blend-mode: overlay, normal;

            padding: 16px;

            border-radius: 60px;

            border: 1px solid rgba(255,255,255,0.04);

            transition: box-shadow 0.3s ease;

        }

        .ui-container::before {

            content: '';

            position: absolute; inset: 0; border-radius: 60px;

            background:

                radial-gradient(ellipse 30% 16% at 18% 6%, rgba(255,255,255,0.06) 0%, transparent 50%),

                radial-gradient(ellipse 20% 10% at 82% 94%, rgba(255,255,255,0.015) 0%, transparent 50%);

            pointer-events: none; z-index: 1;

        }

        .ui-blue {

            box-shadow:

                inset 0 1px 0 rgba(255,255,255,0.08),

                inset 0 2px 3px rgba(255,255,255,0.025),

                inset 1px 0 0 rgba(255,255,255,0.04),

                inset 0 -1px 0 rgba(0,0,0,0.5),

                inset -1px 0 0 rgba(0,0,0,0.2),

                inset 0 0 20px rgba(0,0,0,0.08),

                0 4px 8px rgba(0,0,0,0.45),

                0 8px 16px rgba(0,0,0,0.4),

                0 16px 32px rgba(0,0,0,0.35),

                0 28px 56px rgba(0,0,0,0.25),

                0 40px 80px rgba(0,0,0,0.15),

                0 0 100px rgba(0,0,0,0.5),

                0 12px 40px rgba(58,117,209,0.07),

                0 24px 70px rgba(58,117,209,0.035);

        }

        .ui-red {

            box-shadow:

                inset 0 1px 0 rgba(255,255,255,0.08),

                inset 0 2px 3px rgba(255,255,255,0.025),

                inset 1px 0 0 rgba(255,255,255,0.04),

                inset 0 -1px 0 rgba(0,0,0,0.5),

                inset -1px 0 0 rgba(0,0,0,0.2),

                inset 0 0 20px rgba(0,0,0,0.08),

                0 4px 8px rgba(0,0,0,0.45),

                0 8px 16px rgba(0,0,0,0.4),

                0 16px 32px rgba(0,0,0,0.35),

                0 28px 56px rgba(0,0,0,0.25),

                0 40px 80px rgba(0,0,0,0.15),

                0 0 100px rgba(0,0,0,0.5),

                0 12px 40px rgba(209,58,58,0.07),

                0 24px 70px rgba(209,58,58,0.035);

        }

        .bevel-ring {

            background: linear-gradient(154deg,

                #3a3a42 0%, #28282e 18%, #44444c 36%, #222228 52%,

                #3c3c44 68%, #2a2a30 84%, #343438 100%);

            border-radius: 52px;

            padding: 6px;

            box-shadow:

                inset 0 1px 0 rgba(255,255,255,0.28),

                inset 0 2px 2px rgba(255,255,255,0.1),

                inset 0 3px 4px rgba(255,255,255,0.03),

                inset 1px 0 0 rgba(255,255,255,0.14),

                inset 0 -1px 0 rgba(0,0,0,0.7),

                inset 0 -2px 3px rgba(0,0,0,0.4),

                inset 0 -3px 6px rgba(0,0,0,0.15),

                inset -1px 0 0 rgba(0,0,0,0.35),

                0 2px 4px rgba(0,0,0,0.5),

                0 4px 8px rgba(0,0,0,0.35),

                0 0 1px rgba(255,255,255,0.2);

        }

        .bevel-ring::before {

            content: '';

            position: absolute; inset: 16px; border-radius: 52px;

            background:

                radial-gradient(ellipse 35% 18% at 20% 8%, rgba(255,255,255,0.2) 0%, transparent 50%),

                radial-gradient(ellipse 22% 10% at 80% 92%, rgba(255,255,255,0.04) 0%, transparent 45%);

            pointer-events: none; z-index: 2;

        }

        .button-track {

            display: flex;

            background: #000000;

            padding: 5px;

            border-radius: 48px;

            gap: 6px;

            border: 1px solid #0a0c10;

            position: relative;

            box-shadow:

                inset 0 5px 14px rgba(0,0,0,0.95),

                inset 0 2px 6px rgba(0,0,0,0.85),

                inset 0 1px 2px rgba(0,0,0,0.7),

                inset 0 -1px 0 rgba(255,255,255,0.03),

                inset 0 -2px 4px rgba(255,255,255,0.01),

                inset 3px 0 8px rgba(0,0,0,0.5),

                inset -3px 0 8px rgba(0,0,0,0.5),

                inset 0 0 24px rgba(0,0,0,0.3),

                0 1px 0 rgba(255,255,255,0.03);

        }

        .track-glow {

            position: absolute; inset: 0;

            border-radius: 48px;

            pointer-events: none; z-index: 0;

            transition: box-shadow 0.3s ease;

        }

        .tg-blue {

            box-shadow:

                inset 0 -2px 14px rgba(58,117,209,0.06),

                inset 3px 0 10px rgba(58,117,209,0.025),

                inset -3px 0 10px rgba(58,117,209,0.025);

        }

        .tg-red {

            box-shadow:

                inset 0 -2px 14px rgba(209,58,58,0.06),

                inset 3px 0 10px rgba(209,58,58,0.025),

                inset -3px 0 10px rgba(209,58,58,0.025);

        }

        .custom-button {

            position: relative;

            width: 320px;

            height: 84px;

            border-radius: 42px;

            border: none;

            cursor: pointer;

            display: flex;

            align-items: center;

            justify-content: center;

            font-size: 30px;

            font-weight: 400;

            letter-spacing: 1.5px;

            transition: all 0.2s ease-out;

            overflow: hidden;

            outline: none;

            user-select: none;

        }

        .custom-button:active { transform: scale(0.98); }

        .mesh-pattern {

            position: absolute; inset: 0;

            opacity: 0.35;

            background-image: radial-gradient(circle, rgba(255,255,255,0.15) 0.5px, transparent 0.5px);

            background-size: 4px 4px;

            pointer-events: none;

            mix-blend-mode: overlay;

            z-index: 2;

        }

        .btn-glass {

            position: absolute; inset: 0;

            border-radius: 42px;

            pointer-events: none; z-index: 3;

            background:

                radial-gradient(ellipse 40% 22% at 25% 14%, rgba(255,255,255,0.09) 0%, transparent 48%),

                radial-gradient(ellipse 22% 12% at 78% 86%, rgba(255,255,255,0.025) 0%, transparent 45%),

                linear-gradient(155deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.015) 25%, transparent 45%, rgba(0,0,0,0.025) 70%, rgba(0,0,0,0.06) 100%);

        }

        .btn-rim {

            position: absolute; inset: 0;

            border-radius: 42px;

            pointer-events: none; z-index: 4;

            transition: box-shadow 0.25s ease;

        }

        .btn-noise {

            position: absolute; inset: 0;

            border-radius: 42px;

            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");

            opacity: 0.03;

            mix-blend-mode: overlay;

            pointer-events: none; z-index: 1;

        }

        .cross-light {

            position: absolute;

            top: 8%; bottom: 8%;

            width: 80px;

            pointer-events: none;

            z-index: 0;

            filter: blur(12px);

            transition: opacity 0.3s ease, background 0.3s ease;

        }

        .btn-inactive {

            background:

                radial-gradient(ellipse 50% 35% at 35% 18%, rgba(255,255,255,0.03) 0%, transparent 50%),

                linear-gradient(150deg, #282c36 0%, #20232c 35%, #1a1d24 65%, #16181e 100%);

            color: #9ca3af;

            box-shadow:

                inset 0 1px 0 rgba(255,255,255,0.06),

                inset 0 2px 2px rgba(255,255,255,0.02),

                inset 1px 0 0 rgba(255,255,255,0.03),

                inset 0 -1px 0 rgba(0,0,0,0.45),

                inset 0 -2px 4px rgba(0,0,0,0.18),

                inset -1px 0 0 rgba(0,0,0,0.15),

                0 2px 4px rgba(0,0,0,0.4),

                0 4px 8px rgba(0,0,0,0.25),

                0 6px 14px rgba(0,0,0,0.12);

            text-shadow: 0 1px 2px rgba(0,0,0,0.5), 0 -1px 0 rgba(255,255,255,0.03);

        }

        .btn-inactive.receiving-blue {

            box-shadow:

                inset 0 1px 0 rgba(255,255,255,0.06),

                inset 0 2px 2px rgba(255,255,255,0.02),

                inset 1px 0 0 rgba(255,255,255,0.03),

                inset 0 -1px 0 rgba(0,0,0,0.45),

                inset 0 -2px 4px rgba(0,0,0,0.18),

                inset -1px 0 0 rgba(0,0,0,0.15),

                inset 6px 0 20px rgba(58,117,209,0.14),

                inset 3px 0 10px rgba(58,117,209,0.1),

                0 2px 4px rgba(0,0,0,0.4),

                0 4px 8px rgba(0,0,0,0.25),

                0 6px 14px rgba(0,0,0,0.12);

        }

        .btn-inactive.receiving-red {

            box-shadow:

                inset 0 1px 0 rgba(255,255,255,0.06),

                inset 0 2px 2px rgba(255,255,255,0.02),

                inset 1px 0 0 rgba(255,255,255,0.03),

                inset 0 -1px 0 rgba(0,0,0,0.45),

                inset 0 -2px 4px rgba(0,0,0,0.18),

                inset -1px 0 0 rgba(0,0,0,0.15),

                inset -6px 0 20px rgba(209,58,58,0.14),

                inset -3px 0 10px rgba(209,58,58,0.1),

                0 2px 4px rgba(0,0,0,0.4),

                0 4px 8px rgba(0,0,0,0.25),

                0 6px 14px rgba(0,0,0,0.12);

        }

        .btn-active-smooth {

            background:

                radial-gradient(ellipse 45% 30% at 35% 18%, rgba(255,255,255,0.22) 0%, transparent 48%),

                radial-gradient(ellipse 70% 40% at 50% 25%, rgba(180,210,255,0.08) 0%, transparent 55%),

                radial-gradient(circle at 50% 50%, #76b4ff 0%, #3a75d1 50%, #152d56 100%);

            color: #0b0c10;

            font-weight: 500;

            box-shadow:

                inset 0 1px 0 rgba(255,255,255,0.5),

                inset 0 2px 2px rgba(255,255,255,0.2),

                inset 0 3px 5px rgba(255,255,255,0.06),

                inset 1px 0 0 rgba(255,255,255,0.22),

                inset 0 -1px 0 rgba(0,0,0,0.35),

                inset 0 -2px 4px rgba(0,0,0,0.25),

                inset 0 -4px 10px rgba(0,0,0,0.12),

                inset -1px 0 0 rgba(0,0,0,0.12),

                0 0 12px rgba(58,117,209,0.28),

                0 4px 20px rgba(58,117,209,0.22),

                0 8px 36px rgba(58,117,209,0.14),

                0 14px 56px rgba(58,117,209,0.06);

            text-shadow: 0 -1px 0 rgba(255,255,255,0.3), 0 1px 2px rgba(0,15,40,0.5);

        }

        .btn-active-heat {

            background:

                radial-gradient(ellipse 45% 30% at 35% 18%, rgba(255,255,255,0.22) 0%, transparent 48%),

                radial-gradient(ellipse 70% 40% at 50% 25%, rgba(255,200,180,0.08) 0%, transparent 55%),

                radial-gradient(circle at 50% 50%, #ff7676 0%, #d13a3a 50%, #561515 100%);

            color: #0b0c10;

            font-weight: 500;

            box-shadow:

                inset 0 1px 0 rgba(255,255,255,0.5),

                inset 0 2px 2px rgba(255,255,255,0.2),

                inset 0 3px 5px rgba(255,255,255,0.06),

                inset 1px 0 0 rgba(255,255,255,0.22),

                inset 0 -1px 0 rgba(0,0,0,0.35),

                inset 0 -2px 4px rgba(0,0,0,0.25),

                inset 0 -4px 10px rgba(0,0,0,0.12),

                inset -1px 0 0 rgba(0,0,0,0.12),

                0 0 12px rgba(209,58,58,0.28),

                0 4px 20px rgba(209,58,58,0.22),

                0 8px 36px rgba(209,58,58,0.14),

                0 14px 56px rgba(209,58,58,0.06);

            text-shadow: 0 -1px 0 rgba(255,255,255,0.3), 0 1px 2px rgba(40,0,0,0.5);

        }

        .color-spill {

            position: absolute; inset: 0;

            border-radius: 42px;

            pointer-events: none;

            z-index: 5;

            transition: opacity 0.3s ease;

        }

        .spill-blue-left {

            background: linear-gradient(90deg,

                rgba(58,117,209,0.45) 0%, rgba(70,140,230,0.3) 6%,

                rgba(58,117,209,0.18) 15%, rgba(58,117,209,0.08) 28%,

                rgba(58,117,209,0.02) 42%, transparent 55%);

        }

        .spill-red-right {

            background: linear-gradient(270deg,

                rgba(209,58,58,0.45) 0%, rgba(230,80,70,0.3) 6%,

                rgba(209,58,58,0.18) 15%, rgba(209,58,58,0.08) 28%,

                rgba(209,58,58,0.02) 42%, transparent 55%);

        }

        .ambient-glow {

            position: absolute;

            width: 80%; height: 4px;

            bottom: -6px; left: 50%; transform: translateX(-50%);

            z-index: 10; pointer-events: none;

            transition: all 0.3s ease;

        }

        .glow-blue {

            background: rgba(115,169,255,0.5);

            filter: blur(22px);

            box-shadow: 0 0 20px rgba(58,117,209,0.3), 0 0 40px rgba(58,117,209,0.12);

        }

        .glow-red {

            background: rgba(255,115,115,0.5);

            filter: blur(22px);

            box-shadow: 0 0 20px rgba(209,58,58,0.3), 0 0 40px rgba(209,58,58,0.12);

        }

        .desk-light {

            position: absolute;

            bottom: -30px; left: 50%; transform: translateX(-50%);

            width: 60%; height: 60px;

            filter: blur(20px);

            pointer-events: none; z-index: -1;

            transition: background 0.3s ease;

        }

        .desk-blue { background: radial-gradient(ellipse at 50% 0%, rgba(58,117,209,0.1) 0%, transparent 65%); }

        .desk-red { background: radial-gradient(ellipse at 50% 0%, rgba(209,58,58,0.1) 0%, transparent 65%); }

    </style>

</head>

<body>

    <div id="root"></div>

    <script type="text/babel">

        const { useState } = React;

        const App = () => {

            const [activeTab, setActiveTab] = useState('SMOOTH');

            const isSmooth = activeTab === 'SMOOTH';

            return (

                <div className="flex flex-col items-center justify-center min-h-screen w-full relative">

                    <div className="ambient-bg">

                        {[...Array(20)].map((_, i) => (

                            <div key={i} className="particle" style={{

                                top: `${Math.random()*100}%`, left: `${Math.random()*100}%`,

                                width: `${Math.random()*2+1}px`, height: `${Math.random()*2+1}px`,

                                opacity: Math.random()*0.3

                            }} />

                        ))}

                    </div>

                    <div style={{ position: 'relative' }}>

                        <div className={`ui-container ${isSmooth ? 'ui-blue' : 'ui-red'}`}>

                            {isSmooth && <div className="ambient-glow glow-blue" />}

                            {!isSmooth && <div className="ambient-glow glow-red" />}

                            <div className="bevel-ring">

                                <div className="button-track">

                                    <div className={`track-glow ${isSmooth ? 'tg-blue' : 'tg-red'}`} />

                                    {isSmooth && (

                                        <div className="cross-light" style={{

                                            right: '46%',

                                            background: 'radial-gradient(ellipse 100% 80% at 0% 50%, rgba(58,117,209,0.28) 0%, rgba(58,117,209,0.08) 40%, transparent 70%)'

                                        }} />

                                    )}

                                    {!isSmooth && (

                                        <div className="cross-light" style={{

                                            left: '46%',

                                            background: 'radial-gradient(ellipse 100% 80% at 100% 50%, rgba(209,58,58,0.28) 0%, rgba(209,58,58,0.08) 40%, transparent 70%)'

                                        }} />

                                    )}

                                    <button onClick={() => setActiveTab('SMOOTH')}

                                        className={`custom-button ${isSmooth ? 'btn-active-smooth' : 'btn-inactive smooth-identity receiving-red'}`}>

                                        <div className="btn-noise" />

                                        <div className="mesh-pattern" />

                                        <div className="btn-glass" />

                                        <div className="btn-rim" />

                                        {!isSmooth && <div className="color-spill spill-red-right" />}

                                        <span className="relative z-10">SMOOTH</span>

                                    </button>

                                    <button onClick={() => setActiveTab('HEAT')}

                                        className={`custom-button ${!isSmooth ? 'btn-active-heat' : 'btn-inactive heat-identity receiving-blue'}`}>

                                        <div className="btn-noise" />

                                        <div className="mesh-pattern" />

                                        <div className="btn-glass" />

                                        <div className="btn-rim" />

                                        {isSmooth && <div className="color-spill spill-blue-left" />}

                                        <span className="relative z-10">HEAT</span>

                                    </button>

                                </div>

                            </div>

                        </div>

                        <div className={`desk-light ${isSmooth ? 'desk-blue' : 'desk-red'}`} />

                    </div>

                </div>

            );

        };

        const root = ReactDOM.createRoot(document.getElementById('root'));

        root.render(<App />);

    </script>

</body>

</html>
