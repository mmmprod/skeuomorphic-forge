<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Skeuomorphic Synth LCD - Deep 3D</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,500;0,700;1,600&display=swap" rel="stylesheet">

    <style>

        body {

            background-color: #0c0d11;

            display: flex;

            align-items: center;

            justify-content: center;

            min-height: 100vh;

            margin: 0;

            font-family: 'Chakra Petch', sans-serif;

            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");

        }



        .hardware-panel {

            background: linear-gradient(135deg, #3a3f4a 0%, #22252b 50%, #15171a 100%);

            border-radius: 24px;

            padding: 50px;

            position: relative;

            box-shadow: 

                0 50px 80px -20px rgba(0,0,0,1),

                inset 1px 1px 2px rgba(255,255,255,0.1),

                inset -2px -2px 5px rgba(0,0,0,0.8),

                0 0 0 1px #000;

        }



        /* Le gouffre encastrant l'écran */

        .screen-cutout {

            background: #020304;

            padding: 14px; /* Augmente la distance entre le bord métal et l'écran */

            border-radius: 14px;

            box-shadow: 

                inset 0 25px 35px -10px rgba(0,0,0,1), /* Ombre portée du cadre haut */

                inset 0 4px 10px rgba(0,0,0,1), /* Profondeur immédiate */

                0 1px 1px rgba(255,255,255,0.1); /* Highlight du bord inférieur découpé */

            position: relative;

        }



        .lcd-display {

            background: radial-gradient(circle at 50% 50%, #8ae0ff 0%, #3a8ebd 50%, #102a3d 100%);

            border-radius: 4px;

            width: 580px;

            height: 280px;

            display: flex;

            flex-direction: column;

            justify-content: space-between;

            padding: 30px 40px;

            position: relative;

            overflow: hidden;

            

            /* Ombre interne de la dalle sous la vitre */

            box-shadow: 

                inset 0 10px 20px rgba(0,0,0,0.8),

                inset 0 -5px 15px rgba(0,0,0,0.5);

        }



        .lcd-grid {

            position: absolute;

            inset: 0;

            background-image: 

                linear-gradient(rgba(0, 0, 0, 0.1) 1px, transparent 1px),

                linear-gradient(90deg, rgba(0, 0, 0, 0.1) 1px, transparent 1px);

            background-size: 3px 3px;

            pointer-events: none;

            z-index: 15; /* La grille est AU-DESSUS du texte pour simuler les pixels physiques */

        }



        .glass-overlay {

            position: absolute;

            inset: 0;

            border-radius: 4px;

            /* Reflet studio brutal et highlight de la tranche en verre */

            background: linear-gradient(110deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.02) 35%, transparent 36%);

            box-shadow: 

                inset 0 2px 2px rgba(255,255,255,0.3), /* Biseau haut */

                inset 0 -2px 5px rgba(0,0,0,0.6); /* Biseau bas */

            pointer-events: none;

            z-index: 20;

        }



        /* Cristaux standards (Sombre) */

        .lcd-text {

            color: #06121c;

            /* Bleed optique sous la vitre */

            text-shadow: 

                0 0 10px rgba(180, 230, 255, 0.5),

                0 1px 0 rgba(255,255,255,0.2);

            position: relative;

            z-index: 10;

        }



        /* Cristaux inversés (Bloc actif) */

        .lcd-inverted-block {

            background: #06121c; /* Cristaux fermés (Bloquent le backlight) */

            color: #8ae0ff; /* Laissent passer la lumière pure */

            padding: 4px 12px;

            border-radius: 2px;

            border: 1px solid #06121c;

            /* Lueur projetée par le bloc entier */

            box-shadow: 0 0 15px rgba(138, 224, 255, 0.3);

            text-shadow: 0 0 5px rgba(138, 224, 255, 0.8);

            position: relative;

            z-index: 10;

        }



        /* Vis industrielles */

        .screw {

            position: absolute;

            width: 16px; height: 16px;

            border-radius: 50%;

            background: linear-gradient(135deg, #2a2c31, #15171a);

            box-shadow: 

                inset 0 1px 2px rgba(255,255,255,0.2), 

                0 3px 5px rgba(0,0,0,0.9),

                0 0 0 1px #050505;

        }

        .screw::after { 

            content: ''; position: absolute;

            top: 25%; left: 25%; right: 25%; bottom: 25%;

            border-radius: 50%;

            border: 1.5px solid #000;

            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);

        }

        .screw-tl { top: 16px; left: 16px; transform: rotate(12deg); }

        .screw-tr { top: 16px; right: 16px; transform: rotate(-45deg); }

        .screw-bl { bottom: 16px; left: 16px; transform: rotate(78deg); }

        .screw-br { bottom: 16px; right: 16px; transform: rotate(105deg); }



    </style>

</head>

<body>

    <div id="root"></div>



    <script type="text/babel">

        const { useState } = React;



        const SynthScreen = () => {

            return (

                <div className="hardware-panel">

                    <div className="screw screw-tl"></div>

                    <div className="screw screw-tr"></div>

                    <div className="screw screw-bl"></div>

                    <div className="screw screw-br"></div>



                    <div className="screen-cutout">

                        <div className="lcd-display">

                            {/* Texture des pixels par-dessus le texte */}

                            <div className="lcd-grid"></div>

                            {/* Épaisseur en verre au-dessus de tout */}

                            <div className="glass-overlay"></div>

                            

                            {/* Top Row */}

                            <div className="flex justify-between items-start w-full">

                                <div className="flex flex-col">

                                    <span className="text-8xl font-bold leading-none tracking-tighter lcd-text">01</span>

                                    <span className="text-2xl font-bold mt-2 uppercase tracking-widest lcd-text">Memory 01</span>

                                </div>

                                <div className="flex flex-col items-end pt-2">

                                    <div className="flex items-center gap-2 lcd-text">

                                        <span className="text-3xl font-bold">♩=</span>

                                        <span className="text-5xl font-bold tracking-tighter">120</span>

                                    </div>

                                    <span className="text-sm font-bold tracking-[0.3em] uppercase mt-1 lcd-text opacity-70">INT CLOCK</span>

                                </div>

                            </div>



                            {/* Middle Row (Song Title) */}

                            <div className="flex justify-end pr-2 w-full mt-4">

                                <span className="text-3xl font-semibold italic tracking-wide lcd-text">"Master of Puppets"</span>

                            </div>



                            {/* Bottom Row */}

                            <div className="flex justify-between items-end w-full mt-auto">

                                <div className="flex gap-4">

                                    <span className="text-lg font-bold tracking-[0.2em] uppercase lcd-text border-b-2 border-[#06121c] pb-1">PATCH</span>

                                    <span className="text-lg font-bold tracking-[0.2em] uppercase lcd-text opacity-50">SEQ</span>

                                </div>

                                

                                {/* Bloc Inversé Corrigé */}

                                <span className="text-lg font-bold tracking-[0.1em] uppercase lcd-inverted-block">

                                    MFX: REVERB

                                </span>

                            </div>

                        </div>

                    </div>

                </div>

            );

        };



        const App = () => {

            return (

                <div className="p-8">

                    <SynthScreen />

                </div>

            );

        };



        const root = ReactDOM.createRoot(document.getElementById('root'));

        root.render(<App />);

    </script>

</body>

</html>
