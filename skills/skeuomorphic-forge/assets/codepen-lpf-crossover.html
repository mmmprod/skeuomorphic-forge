<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LPF Crossover - Subwoofer Channel</title>

    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {

            background-color: #070809;

            display: flex; justify-content: center; align-items: center;

            min-height: 100vh;

            font-family: 'Inter', sans-serif;

            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");

        }

        .chassis {

            background: linear-gradient(180deg, #2a2c31 0%, #15171a 100%);

            padding: 2px; border-radius: 16px;

            box-shadow: 0 60px 100px -20px rgba(0,0,0,1), 0 20px 40px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.05);

        }

        .chassis-inner {

            background: linear-gradient(135deg, #121316 0%, #08090a 100%);

            padding: 36px; border-radius: 15px;

            border-top: 1px solid rgba(255,255,255,0.08);

            border-bottom: 1px solid rgba(0,0,0,1);

            box-shadow: inset 0 6px 15px rgba(0,0,0,0.8);

        }

        .screen-bezel {

            position: relative; width: 750px; height: 400px;

            background-color: #020304; border-radius: 10px;

            box-shadow: inset 0 35px 60px -10px rgba(0,0,0,1), inset 0 0 30px 10px rgba(0,0,0,1), inset 0 2px 2px rgba(0,0,0,1), 0 1px 0 rgba(255,255,255,0.12);

            border-top: 3px solid #000; border-left: 3px solid #000;

            border-bottom: 1px solid #22252a; border-right: 1px solid #15181c;

            overflow: hidden;

        }

        .glass-reflection {

            position: absolute; inset: 0;

            background: linear-gradient(110deg, rgba(255,255,255,0.01) 0%, rgba(255,255,255,0.06) 30%, rgba(255,255,255,0) 31%), radial-gradient(150% 100% at 50% -25%, rgba(255,255,255,0.05) 0%, transparent 45%);

            pointer-events: none; z-index: 50; mix-blend-mode: screen;

        }

        .scanlines {

            position: absolute; inset: 0;

            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));

            background-size: 100% 4px; pointer-events: none; z-index: 40;

        }

        .screen-ambient-glow {

            position: absolute; inset: 0;

            background: radial-gradient(circle at 50% 50%, #061020 0%, #010203 100%); z-index: 0;

        }

        @keyframes cutoff-pulse {

            0%, 100% { opacity: 1; }

            50% { opacity: 0.6; }

        }

    </style>

</head>

<body>

    <div id="root"></div>

    <script type="text/babel">

        const { useState, useEffect, useRef } = React;



        const LOG_MIN = Math.log10(20);

        const LOG_MAX = Math.log10(20000);

        const LOG_RANGE = LOG_MAX - LOG_MIN;

        const MARGIN_L = 55;

        const MARGIN_R = 960;

        const PLOT_W = MARGIN_R - MARGIN_L;



        const freqToX = (hz) => ((Math.log10(hz) - LOG_MIN) / LOG_RANGE) * PLOT_W + MARGIN_L;

        const xToFreq = (x) => Math.pow(10, ((x - MARGIN_L) / PLOT_W) * LOG_RANGE + LOG_MIN);



        const LPFAnalyzer = () => {

            const requestRef = useRef();

            const [, setTick] = useState(0);



            // Subwoofer LPF: 80Hz default, drift 60-120Hz

            const cutoffHzRef = useRef({ hz: 80, target: 80 });



            const fftRef = useRef(Array.from({ length: 64 }, (_, i) => {

                const x = MARGIN_L + (i / 63) * PLOT_W;

                return { x, y: 360, target: 360 };

            }));



            const animate = () => {

                if (Math.random() > 0.97) {

                    cutoffHzRef.current.target = 60 + Math.random() * 60;

                }

                cutoffHzRef.current.hz += (cutoffHzRef.current.target - cutoffHzRef.current.hz) * 0.02;



                const cxSvg = freqToX(cutoffHzRef.current.hz);



                if (Math.random() > 0.85) {

                    fftRef.current.forEach(pt => {

                        if (pt.x < cxSvg - 30) {

                            // Passband (below cutoff): active bass

                            pt.target = 100 + Math.random() * 220;

                        } else if (pt.x < cxSvg + 80) {

                            // Transition

                            const r = (pt.x - (cxSvg - 30)) / 110;

                            pt.target = (100 + Math.random() * 220) * (1 - r) + (400 + Math.random() * 25) * r;

                        } else {

                            // Stopband (above cutoff): attenuated

                            pt.target = 405 + Math.random() * 25;

                        }

                    });

                }



                fftRef.current.forEach(pt => {

                    pt.y += (pt.target - pt.y) * 0.06;

                });



                setTick(t => t + 1);

                requestRef.current = requestAnimationFrame(animate);

            };



            useEffect(() => {

                requestRef.current = requestAnimationFrame(animate);

                return () => cancelAnimationFrame(requestRef.current);

            }, []);



            const cutoffHz = cutoffHzRef.current.hz;

            const cx = freqToX(cutoffHz);



            const zeroDbY = 150;

            const dbToY = (db) => zeroDbY - db * (50 / 6);

            const minus3Y = dbToY(-3);



            // Butterworth 4th order (24dB/oct) LPF

            // |H(f)|² = 1 / (1 + (f/fc)^(2n)), n=4

            const buildLPF = () => {

                const pts = [];

                const steps = 250;

                for (let i = 0; i <= steps; i++) {

                    const x = MARGIN_L + (i / steps) * PLOT_W;

                    const freq = xToFreq(x);

                    const ratio = freq / cutoffHz;

                    const r4 = Math.pow(ratio, 4);

                    const magLin = 1 / (1 + r4);

                    const magDb = 10 * Math.log10(Math.max(magLin, 1e-10));

                    const y = Math.min(dbToY(magDb), 455);

                    pts.push(`${x.toFixed(1)} ${y.toFixed(1)}`);

                }

                return pts;

            };



            const lpfPts = buildLPF();

            const lpfCurve = `M ${lpfPts.join(' L ')}`;

            const lpfFill = `${lpfCurve} L ${MARGIN_R} 455 L ${MARGIN_R} 460 L ${MARGIN_L} 460 Z`;



            const fftPath = `M ${MARGIN_L} 440 ${fftRef.current.map(p => `L ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ')} L ${MARGIN_R} 440`;



            const gridFreqs = [20, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 20000];

            const gridLabels = ["20", "50", "100", "200", "500", "1k", "2k", "5k", "10k", "20k"];

            const dbMarks = [6, 0, -6, -12, -18, -24, -30, -36, -42];



            const cutoffLabel = cutoffHz < 1000

                ? `${Math.round(cutoffHz)} Hz`

                : `${(cutoffHz / 1000).toFixed(1)} kHz`;



            return (

                <div className="chassis">

                    <div className="chassis-inner">

                        <div className="screen-bezel">

                            <div className="screen-ambient-glow" />

                            <div className="scanlines" />

                            <div className="glass-reflection" />



                            {/* Grid layer */}

                            <svg style={{ position: "absolute", inset: 0, width: "100%", height: "100%", zIndex: 10 }}

                                viewBox="0 0 1000 500" preserveAspectRatio="none">



                                <g stroke="#1a2233" strokeWidth="1" strokeDasharray="4 4" opacity="0.5">

                                    {dbMarks.map((db, i) => {

                                        const y = dbToY(db);

                                        return y > 40 && y < 455 ? <line key={i} x1={MARGIN_L} y1={y} x2={MARGIN_R} y2={y} /> : null;

                                    })}

                                </g>



                                <line x1={MARGIN_L} y1={zeroDbY} x2={MARGIN_R} y2={zeroDbY}

                                    stroke="#2a3550" strokeWidth="1.5" opacity="0.6" />



                                <g stroke="#1a2233" strokeWidth="1" strokeDasharray="4 4" opacity="0.4">

                                    {gridFreqs.map((f, i) => (

                                        <line key={i} x1={freqToX(f)} y1="40" x2={freqToX(f)} y2="450" />

                                    ))}

                                </g>



                                <g fill="#3a4860" fontSize="11" fontWeight="600" fontFamily="Inter" textAnchor="end">

                                    {dbMarks.map((db, i) => {

                                        const y = dbToY(db);

                                        if (y < 45 || y > 450) return null;

                                        return <text key={i} x={MARGIN_L - 6} y={y + 4}>{db > 0 ? `+${db}` : db}</text>;

                                    })}

                                </g>



                                <g fill="#3a4860" fontSize="11" fontWeight="600" fontFamily="Inter" textAnchor="middle">

                                    {gridFreqs.map((f, i) => (

                                        <text key={i} x={freqToX(f)} y="470">{gridLabels[i]}</text>

                                    ))}

                                    <text x="500" y="492" fill="#2a3448" fontSize="9">Hz</text>

                                </g>



                                <text x="18" y="250" fill="#2a3448" fontSize="9" fontFamily="Inter"

                                    transform="rotate(-90, 18, 250)" textAnchor="middle">dB</text>

                            </svg>



                            {/* Curves layer */}

                            <svg style={{ position: "absolute", inset: 0, width: "100%", height: "100%", zIndex: 20 }}

                                viewBox="0 0 1000 500" preserveAspectRatio="none">

                                <defs>

                                    <linearGradient id="passFill" x1="0" y1="0" x2="0" y2="1">

                                        <stop offset="0%" stopColor="#0ea5e9" stopOpacity="0.3" />

                                        <stop offset="50%" stopColor="#0369a1" stopOpacity="0.06" />

                                        <stop offset="100%" stopColor="#020617" stopOpacity="0" />

                                    </linearGradient>

                                    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">

                                        <feGaussianBlur stdDeviation="5" result="blur" />

                                        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>

                                    </filter>

                                    <filter id="cutoffGlow" x="-50%" y="-50%" width="200%" height="200%">

                                        <feGaussianBlur stdDeviation="8" result="b1" />

                                        <feGaussianBlur stdDeviation="22" result="b2" />

                                        <feMerge><feMergeNode in="b2" /><feMergeNode in="b1" /><feMergeNode in="SourceGraphic" /></feMerge>

                                    </filter>

                                    <filter id="softGlow">

                                        <feGaussianBlur stdDeviation="3" result="blur" />

                                        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>

                                    </filter>

                                </defs>



                                {/* FFT */}

                                <path d={fftPath} fill="none" stroke="#182638" strokeWidth="2" strokeLinejoin="round" />



                                {/* Stopband zone (right of cutoff = hautes fréquences coupées) */}

                                <rect x={cx} y="40" width={Math.max(MARGIN_R - cx, 0)} height="415"

                                    fill="rgba(255,20,0,0.03)" />



                                {/* LPF fill */}

                                <path d={lpfFill} fill="url(#passFill)" style={{ mixBlendMode: 'screen' }} />



                                {/* LPF curve */}

                                <path d={lpfCurve} fill="none" stroke="#38bdf8" strokeWidth="4"

                                    strokeLinecap="round" strokeLinejoin="round" filter="url(#neonGlow)" />



                                {/* Cutoff vertical */}

                                <line x1={cx} y1="45" x2={cx} y2="450"

                                    stroke="#ff4400" strokeWidth="2" strokeDasharray="6 4"

                                    opacity="0.5" filter="url(#softGlow)" />



                                {/* -3dB ref from left to cutoff */}

                                <line x1={MARGIN_L} y1={minus3Y} x2={cx + 20} y2={minus3Y}

                                    stroke="#ff8800" strokeWidth="1" strokeDasharray="3 3" opacity="0.3" />



                                {/* -6dB ref dimmer */}

                                <line x1={cx - 15} y1={dbToY(-6)} x2={cx + 15} y2={dbToY(-6)}

                                    stroke="#ff6600" strokeWidth="1" strokeDasharray="2 3" opacity="0.2" />



                                {/* Cutoff dot */}

                                <circle cx={cx} cy={minus3Y} r="7" fill="#ff4400"

                                    filter="url(#cutoffGlow)"

                                    style={{ animation: "cutoff-pulse 2s ease-in-out infinite" }} />



                                {/* -3dB label */}

                                <text x={cx + 14} y={minus3Y - 10}

                                    fill="#ff8800" fontSize="12" fontWeight="700" fontFamily="Inter"

                                    filter="url(#softGlow)">-3 dB</text>



                                {/* Slope indicator along rolloff */}

                                <g opacity="0.4">

                                    <line x1={cx + 30} y1={minus3Y + 25} x2={cx + 140} y2={minus3Y + 140}

                                        stroke="#ff6644" strokeWidth="1.5" strokeDasharray="4 2" />

                                    <text x={cx + 145} y={minus3Y + 148}

                                        fill="#ff6644" fontSize="11" fontWeight="600" fontFamily="Inter">

                                        24 dB/oct

                                    </text>

                                </g>



                                {/* ====== DSP-STYLE INFO PANEL (RIGHT = stopband side) ====== */}

                                <g>

                                    <rect x="820" y="48" width="135" height="105" rx="4"

                                        fill="rgba(0,0,0,0.5)" stroke="rgba(56,189,248,0.15)" strokeWidth="1" />



                                    <text x="887" y="68" fill="#38bdf8" fontSize="22" fontWeight="700"

                                        fontFamily="Inter" textAnchor="middle"

                                        style={{ filter: 'drop-shadow(0 0 10px rgba(56,189,248,0.4))' }}>

                                        LPF

                                    </text>

                                    <text x="887" y="84" fill="#2a4a65" fontSize="10" fontWeight="600"

                                        fontFamily="Inter" textAnchor="middle">

                                        LOW-PASS FILTER

                                    </text>



                                    <line x1="830" y1="92" x2="945" y2="92" stroke="rgba(56,189,248,0.1)" strokeWidth="1" />



                                    <text x="835" y="108" fill="#4a5a78" fontSize="9" fontWeight="600" fontFamily="Inter">TYPE</text>

                                    <text x="945" y="108" fill="#8898b8" fontSize="10" fontWeight="700" fontFamily="Inter" textAnchor="end">Butterworth</text>



                                    <text x="835" y="124" fill="#4a5a78" fontSize="9" fontWeight="600" fontFamily="Inter">SLOPE</text>

                                    <text x="945" y="124" fill="#8898b8" fontSize="10" fontWeight="700" fontFamily="Inter" textAnchor="end">24 dB/oct</text>



                                    <text x="835" y="140" fill="#4a5a78" fontSize="9" fontWeight="600" fontFamily="Inter">ORDER</text>

                                    <text x="945" y="140" fill="#8898b8" fontSize="10" fontWeight="700" fontFamily="Inter" textAnchor="end">4th</text>

                                </g>



                                {/* Channel assignment */}

                                <g>

                                    <rect x="820" y="160" width="135" height="32" rx="4"

                                        fill="rgba(0,0,0,0.4)" stroke="rgba(255,170,0,0.12)" strokeWidth="1" />

                                    <text x="835" y="180" fill="#6a5530" fontSize="9" fontWeight="600" fontFamily="Inter">CH</text>

                                    <text x="945" y="180" fill="#cc8822" fontSize="11" fontWeight="700" fontFamily="Inter" textAnchor="end">SUBWOOFER</text>

                                </g>



                                {/* fc label above dot */}

                                <text x={cx} y="42" fill="#ff4400" fontSize="12" fontWeight="700"

                                    fontFamily="Inter" textAnchor="middle"

                                    style={{ filter: 'drop-shadow(0 0 6px rgba(255,68,0,0.5))' }}>

                                    fc

                                </text>



                                {/* fc frequency badge */}

                                <g>

                                    <rect x={cx - 40} y="448" width="80" height="22" rx="3"

                                        fill="rgba(0,0,0,0.6)" stroke="rgba(255,68,0,0.2)" strokeWidth="1" />

                                    <text x={cx} y="464" fill="#ff6633" fontSize="13" fontWeight="700"

                                        fontFamily="Inter" textAnchor="middle">

                                        {cutoffLabel}

                                    </text>

                                </g>



                                {/* Zone labels */}

                                <text x={Math.max((MARGIN_L + cx) / 2, 80)} y="430"

                                    fill="#1a4a6a" fontSize="12" fontWeight="700"

                                    fontFamily="Inter" textAnchor="middle" opacity="0.5">

                                    PASSBAND

                                </text>

                                <text x={Math.min(cx + (MARGIN_R - cx) / 2, 880)} y="430"

                                    fill="#4a2020" fontSize="12" fontWeight="700"

                                    fontFamily="Inter" textAnchor="middle" opacity="0.5">

                                    REJECTED

                                </text>



                                {/* DSP CROSSOVER badge */}

                                <text x={MARGIN_L + 10} y="448" fill="#38bdf8" fontSize="9" fontWeight="600"

                                    fontFamily="Inter"

                                    style={{ filter: 'drop-shadow(0 0 5px rgba(56,189,248,0.3))' }}>

                                    DSP CROSSOVER

                                </text>

                            </svg>

                   </div>

                    </div>

                </div>

            );

        };



        const root = ReactDOM.createRoot(document.getElementById('root'));

        root.render(<LPFAnalyzer />);

    </script>

</body>

</html>
