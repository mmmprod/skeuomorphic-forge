<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Skeuomorphic FX Button</title>

    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

    <style>

        @property --glow-o { syntax: '<number>'; inherits: false; initial-value: 0.4; }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {

            background:

                radial-gradient(ellipse 70% 60% at 50% 45%, #2a3040 0%, #181c24 55%, #0c0e12 100%);

            min-height: 100vh;

            display: flex;

            align-items: center;

            justify-content: center;

            font-family: 'Inter', sans-serif;

        }

        .backplate {

            position: relative;

            background:

                url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"),

                linear-gradient(140deg, #2a2a30 0%, #1e1e24 30%, #161618 55%, #1c1c22 80%, #222228 100%);

            background-blend-mode: overlay, normal;

            border-radius: 36px;

            padding: 24px 28px;

            box-shadow:

                inset 0 1px 0 rgba(255,255,255,0.12),

                inset 0 2px 3px rgba(255,255,255,0.04),

                inset 1px 0 0 rgba(255,255,255,0.07),

                inset 0 -1px 0 rgba(0,0,0,0.6),

                inset -1px 0 0 rgba(0,0,0,0.3),

                inset 0 0 25px rgba(0,0,0,0.12),

                0 2px 4px rgba(0,0,0,0.5),

                0 4px 8px rgba(0,0,0,0.45),

                0 8px 16px rgba(0,0,0,0.4),

                0 16px 32px rgba(0,0,0,0.35),

                0 24px 48px rgba(0,0,0,0.25),

                0 32px 64px rgba(0,0,0,0.15),

                0 0 80px rgba(0,0,0,0.4),

                0 30px 60px rgba(79,209,217,0.04);

        }

        .screw {

            position: absolute;

            width: 13px; height: 13px;

            border-radius: 50%;

            background: radial-gradient(circle at 33% 27%, #777 0%, #555 18%, #383838 50%, #1c1c1c 80%, #111 100%);

            box-shadow:

                inset 0 2.5px 5px rgba(0,0,0,0.95),

                inset 0 -0.5px 0 rgba(255,255,255,0.18),

                inset 0.5px 0 0 rgba(255,255,255,0.08),

                0 1px 1px rgba(0,0,0,0.9),

                0 2px 3px rgba(0,0,0,0.8),

                0 3px 5px rgba(0,0,0,0.6),

                0 4px 8px rgba(0,0,0,0.4),

                0 6px 12px rgba(0,0,0,0.2),

                0 0.5px 0 rgba(255,255,255,0.09),

                0 0 0 0.5px rgba(0,0,0,0.75);

        }

        .screw::before {

            content: '';

            position: absolute; top: 50%; left: 15%; right: 15%; height: 1.4px;

            background: linear-gradient(90deg, rgba(10,10,10,0.5), #080808, rgba(10,10,10,0.5));

            border-radius: 1px;

            transform: translateY(-50%) rotate(var(--a, 30deg));

            box-shadow: 0 0.5px 0 rgba(255,255,255,0.12);

        }

        .screw::after {

            content: '';

            position: absolute; top: 15%; bottom: 15%; left: 50%; width: 1.4px;

            background: linear-gradient(180deg, rgba(10,10,10,0.5), #080808, rgba(10,10,10,0.5));

            border-radius: 1px;

            transform: translateX(-50%) rotate(var(--a, 30deg));

            box-shadow: 0.5px 0 0 rgba(255,255,255,0.12);

        }

        .s-tl { top: 12px; left: 12px; --a: 20deg; }

        .s-tr { top: 12px; right: 12px; --a: -12deg; }

        .s-bl { bottom: 12px; left: 12px; --a: 50deg; }

        .s-br { bottom: 12px; right: 12px; --a: 8deg; }

        .outer-bezel {

            position: relative;

            background: linear-gradient(150deg,

                #606068 0%, #3c3c44 15%, #6e6e76 33%,

                #2e2e36 50%, #5c5c66 67%, #343438 82%, #4c4c54 100%);

            border-radius: 28px;

            padding: 9px;

            box-shadow:

                inset 0 1px 0 rgba(255,255,255,0.38),

                inset 0 2px 2px rgba(255,255,255,0.14),

                inset 0 3px 5px rgba(255,255,255,0.05),

                inset 0 -1px 0 rgba(0,0,0,0.75),

                inset 0 -2px 3px rgba(0,0,0,0.45),

                inset 0 -3px 6px rgba(0,0,0,0.18),

                inset 1px 0 0 rgba(255,255,255,0.18),

                inset -1px 0 0 rgba(255,255,255,0.12),

                0 2px 4px rgba(0,0,0,0.55),

                0 4px 8px rgba(0,0,0,0.45),

                0 6px 14px rgba(0,0,0,0.3),

                0 0 1px rgba(255,255,255,0.28),

                0 -1px 0 rgba(0,0,0,0.8);

        }

        .outer-bezel::before {

            content: '';

            position: absolute; inset: 0; border-radius: 28px;

            background:

                radial-gradient(ellipse 48% 22% at 26% 9%, rgba(255,255,255,0.3) 0%, transparent 55%),

                radial-gradient(ellipse 32% 14% at 74% 91%, rgba(255,255,255,0.06) 0%, transparent 50%);

            pointer-events: none; z-index: 1;

        }

        .mid-bezel {

            background: linear-gradient(155deg, #4c4c54 0%, #28282e 38%, #3e3e46 68%, #222228 100%);

            border-radius: 21px;

            padding: 6px;

            box-shadow:

                inset 0 1px 0 rgba(255,255,255,0.2),

                inset 0 2px 3px rgba(255,255,255,0.05),

                inset 0 -1px 0 rgba(0,0,0,0.6),

                inset 0 -2px 4px rgba(0,0,0,0.3),

                inset 1px 0 0 rgba(255,255,255,0.1),

                inset -1px 0 0 rgba(255,255,255,0.07),

                0 1px 2px rgba(0,0,0,0.5),

                0 0 0 0.5px rgba(0,0,0,0.55);

        }

        .inner-gorge {

            background: linear-gradient(160deg, #06060a 0%, #0c0c10 30%, #050508 100%);

            border-radius: 17px;

            padding: 7px;

            box-shadow:

                inset 0 6px 16px rgba(0,0,0,0.98),

                inset 0 3px 8px rgba(0,0,0,0.95),

                inset 0 1px 3px rgba(0,0,0,0.9),

                inset 0 -1px 0 rgba(255,255,255,0.05),

                inset 0 -2px 3px rgba(255,255,255,0.02),

                inset 4px 0 8px rgba(0,0,0,0.7),

                inset -4px 0 8px rgba(0,0,0,0.7),

                inset 0 0 20px rgba(0,0,0,0.5),

                inset 0 0 12px rgba(79,209,217,0.03),

                0 1px 0 rgba(255,255,255,0.06),

                0 0 0 0.5px rgba(0,0,0,0.95);

        }

        .btn {

            position: relative;

            width: 220px;

            height: 96px;

            border-radius: 12px;

            cursor: pointer;

            user-select: none;

            background:

                radial-gradient(ellipse 60% 40% at 35% 18%, rgba(255,255,255,0.08) 0%, transparent 55%),

                radial-gradient(ellipse 90% 50% at 50% 25%, rgba(255,255,255,0.04) 0%, transparent 60%),

                linear-gradient(148deg, #444c5a 0%, #363e4c 18%, #2c3442 38%, #242c38 55%, #1e252f 72%, #181e26 100%);

            box-shadow:

                inset 0 1px 0 rgba(255,255,255,0.2),

                inset 0 2px 2px rgba(255,255,255,0.06),

                inset 1px 0 0 rgba(255,255,255,0.1),

                inset 0 -1px 0 rgba(0,0,0,0.55),

                inset 0 -2px 4px rgba(0,0,0,0.3),

                inset 0 -4px 8px rgba(0,0,0,0.12),

                inset -1px 0 0 rgba(0,0,0,0.25),

                inset 0 0 12px rgba(0,0,0,0.08),

                0 3px 6px rgba(0,0,0,0.5),

                0 6px 12px rgba(0,0,0,0.4),

                0 10px 20px rgba(0,0,0,0.3),

                0 14px 28px rgba(0,0,0,0.15),

                0 6px 20px rgba(79,209,217,0.12),

                0 10px 40px rgba(79,209,217,0.06);

            transition: transform 0.08s ease, box-shadow 0.08s ease;

            display: flex;

            align-items: center;

            justify-content: center;

            overflow: hidden;

        }

        .btn:active {

            transform: translateY(3px);

            background:

                radial-gradient(ellipse 60% 40% at 35% 18%, rgba(255,255,255,0.03) 0%, transparent 55%),

                radial-gradient(ellipse 90% 50% at 50% 25%, rgba(255,255,255,0.02) 0%, transparent 60%),

                linear-gradient(148deg, #2a3240 0%, #242c38 30%, #1e252f 55%, #181e26 75%, #141a22 100%);

            box-shadow:

                inset 0 3px 8px rgba(0,0,0,0.5),

                inset 0 6px 14px rgba(0,0,0,0.3),

                inset 0 1px 2px rgba(0,0,0,0.6),

                inset 0 -1px 0 rgba(255,255,255,0.04),

                0 1px 2px rgba(0,0,0,0.5),

                0 2px 12px rgba(79,209,217,0.2),

                0 4px 24px rgba(79,209,217,0.12);

        }

        .neon-ring {

            position: absolute;

            inset: 7px;

            border-radius: 7px;

            pointer-events: none;

            z-index: 3;

            border: 1.5px solid rgba(79,209,217,0.5);

            box-shadow:

                0 0 4px rgba(79,209,217,0.5),

                0 0 8px rgba(79,209,217,0.3),

                0 0 16px rgba(79,209,217,0.15),

                0 0 28px rgba(79,209,217,0.06),

                inset 0 0 4px rgba(79,209,217,0.35),

                inset 0 0 10px rgba(79,209,217,0.15),

                inset 0 0 20px rgba(79,209,217,0.06);

        }

        .btn:active .neon-ring {

            border-color: rgba(79,209,217,0.7);

            box-shadow:

                0 0 6px rgba(79,209,217,0.7),

                0 0 12px rgba(79,209,217,0.45),

                0 0 22px rgba(79,209,217,0.25),

                0 0 36px rgba(79,209,217,0.1),

                inset 0 0 6px rgba(79,209,217,0.5),

                inset 0 0 14px rgba(79,209,217,0.25),

                inset 0 0 28px rgba(79,209,217,0.1);

        }

        .btn-glass-fx {

            position: absolute; inset: 0;

            border-radius: 12px;

            pointer-events: none;

            z-index: 4;

            background:

                radial-gradient(ellipse 50% 28% at 24% 14%, rgba(255,255,255,0.1) 0%, transparent 50%),

                radial-gradient(ellipse 30% 16% at 78% 86%, rgba(255,255,255,0.03) 0%, transparent 50%),

                linear-gradient(150deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 25%, transparent 45%, rgba(0,0,0,0.04) 70%, rgba(0,0,0,0.08) 100%);

        }

        .btn-rim-fx {

            position: absolute; inset: 0;

            border-radius: 12px;

            pointer-events: none;

            z-index: 5;

            box-shadow:

                inset 0 1px 0 rgba(255,255,255,0.15),

                inset 1px 0 0 rgba(255,255,255,0.06),

                inset 0 -1px 0 rgba(0,0,0,0.35),

                inset -1px 0 0 rgba(0,0,0,0.15);

        }

        .btn-noise-fx {

            position: absolute; inset: 0;

            border-radius: 12px;

            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");

            opacity: 0.035;

            mix-blend-mode: overlay;

            pointer-events: none;

            z-index: 2;

        }

        .fx-text {

            font-family: 'Inter', sans-serif;

            font-weight: 900;

            font-size: 42px;

            letter-spacing: 3px;

            color: #4fd1d9;

            position: relative;

            z-index: 6;

            text-shadow:

                0 0 4px rgba(79,209,217,0.95),

                0 0 10px rgba(79,209,217,0.7),

                0 0 22px rgba(79,209,217,0.4),

                0 0 40px rgba(79,209,217,0.15),

                0 0 60px rgba(79,209,217,0.06),

                0 -1px 0 rgba(0,0,0,0.4),

                0 2px 3px rgba(0,0,0,0.6),

                0 4px 6px rgba(0,0,0,0.3);

        }

        .btn:active .fx-text {

            text-shadow:

                0 0 6px rgba(79,209,217,1),

                0 0 14px rgba(79,209,217,0.8),

                0 0 28px rgba(79,209,217,0.5),

                0 0 50px rgba(79,209,217,0.25),

                0 0 80px rgba(79,209,217,0.1),

                0 1px 1px rgba(0,0,0,0.6);

        }

        .projected-light {

            position: absolute;

            bottom: -20px;

            left: 50%;

            transform: translateX(-50%);

            width: 200px;

            height: 40px;

            background: radial-gradient(ellipse 100% 100% at 50% 0%,

                rgba(79,209,217,0.12) 0%, rgba(79,209,217,0.06) 30%, transparent 65%);

            filter: blur(8px);

            pointer-events: none;

            z-index: 0;

        }

        .silk-label {

            position: absolute;

            bottom: 8px;

            left: 50%; transform: translateX(-50%);

            font-family: 'Inter', sans-serif;

            font-size: 7px; font-weight: 700;

            letter-spacing: 4px; text-transform: uppercase;

            color: rgba(255,255,255,0.11);

            text-shadow: 0 -1px 0 rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.03);

            white-space: nowrap;

        }

    </style>

</head>

<body>

    <div id="root"></div>

    <script type="text/babel">

        const FXButton = () => (

            <div className="backplate">

                <div className="screw s-tl" />

                <div className="screw s-tr" />

                <div className="screw s-bl" />

                <div className="screw s-br" />

                <div className="outer-bezel">

                    <div className="mid-bezel">

                        <div className="inner-gorge">

                            <div className="btn">

                                <div className="btn-noise-fx" />

                                <div className="neon-ring" />

                                <div className="btn-glass-fx" />

                                <div className="btn-rim-fx" />

                                <span className="fx-text">FX</span>

                            </div>

                            <div className="projected-light" />

                        </div>

                    </div>

                </div>

                <div className="silk-label">Audio Control</div>

            </div>

        );

        ReactDOM.createRoot(document.getElementById('root')).render(<FXButton />);

    </script>

</body>

</html>
