<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Watt Meter — Forge Edition</title>

    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        :root {

            --flint-100: #5a5e68;

            --flint-200: #44474f;

            --flint-300: #353840;

            --flint-400: #282b32;

            --flint-500: #1e2028;

            --flint-600: #15171d;

            --flint-700: #0e1014;

            --flint-800: #08090c;

        }



        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }



        body {

            background: var(--flint-800);

            font-family: 'Exo 2', sans-serif;

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            overflow: hidden;

        }



        body::before {

            content: "";

            position: fixed; inset: 0;

            background:

                radial-gradient(ellipse at 50% 45%, rgba(14,16,20,0.85) 0%, rgba(8,9,12,1) 70%),

                url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");

            z-index: -1;

        }

        body::after {

            content: "";

            position: fixed; inset: 0;

            background: radial-gradient(ellipse, transparent 30%, rgba(0,0,0,0.55) 100%);

            pointer-events: none;

            z-index: 0;

        }



        .metal-chassis {

            position: relative;

            background:

                repeating-linear-gradient(90deg, transparent 0px, rgba(255,255,255,0.003) 1px, transparent 2px, transparent 3px),

                repeating-linear-gradient(0deg, transparent 0px, rgba(255,255,255,0.0015) 1px, transparent 2px, transparent 4px),

                linear-gradient(155deg, var(--flint-300) 0%, var(--flint-500) 40%, var(--flint-700) 100%);

            border-radius: 16px;

            padding: 70px;

            box-shadow:

                0 80px 140px -25px rgba(0,0,0,1),

                0 35px 55px rgba(0,0,0,0.8),

                0 12px 18px rgba(0,0,0,0.5),

                inset 1px 1px 2px rgba(255,255,255,0.07),

                inset 0 1px 0 rgba(255,255,255,0.04),

                inset -1px -1px 2px rgba(0,0,0,0.7),

                inset 0 -1px 0 rgba(0,0,0,0.5),

                0 0 0 1px rgba(255,255,255,0.03),

                0 0 0 2.5px var(--flint-800),

                0 0 0 3.5px rgba(255,255,255,0.012);

            transition: box-shadow 0.8s ease;

            animation: chassisReveal 0.7s cubic-bezier(0.16,1,0.3,1) both;

            z-index: 1;

        }

        .metal-chassis::before {

            content: "";

            position: absolute; inset: 0; border-radius: 16px;

            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");

            mix-blend-mode: overlay;

            pointer-events: none;

        }

        .metal-chassis::after {

            content: "";

            position: absolute; inset: 0; border-radius: 16px;

            background:

                radial-gradient(ellipse 80% 30% at 35% 8%, rgba(255,255,255,0.04) 0%, transparent 60%),

                radial-gradient(ellipse 40% 15% at 70% 95%, rgba(255,255,255,0.015) 0%, transparent 60%);

            pointer-events: none;

        }

        .metal-chassis.danger {

            box-shadow:

                0 80px 140px -25px rgba(0,0,0,1),

                0 35px 55px rgba(0,0,0,0.8),

                0 12px 18px rgba(0,0,0,0.5),

                inset 1px 1px 2px rgba(255,255,255,0.06),

                inset -1px -1px 2px rgba(0,0,0,0.7),

                0 0 0 1px rgba(255,30,40,0.08),

                0 0 0 2.5px var(--flint-800),

                0 0 0 3.5px rgba(255,20,30,0.04),

                0 0 100px -15px rgba(255,0,40,0.07),

                0 0 200px -30px rgba(255,0,30,0.035);

        }



        .torx {

            position: absolute;

            width: 16px; height: 16px;

            border-radius: 50%;

            background:

                radial-gradient(circle at 38% 32%, rgba(255,255,255,0.12) 0%, transparent 40%),

                radial-gradient(circle at 35% 35%, var(--flint-100), var(--flint-200) 30%, var(--flint-400) 55%, var(--flint-700) 85%, #000);

            box-shadow:

                inset 0 1.5px 1px rgba(255,255,255,0.22),

                inset 0 2px 3px rgba(255,255,255,0.06),

                inset 0 -1.5px 2px rgba(0,0,0,0.9),

                inset 0 -3px 4px rgba(0,0,0,0.5),

                inset 1px 0 1px rgba(255,255,255,0.08),

                inset -1px 0 1px rgba(0,0,0,0.5),

                0 2px 4px rgba(0,0,0,0.8),

                0 4px 8px rgba(0,0,0,0.5),

                0 6px 12px rgba(0,0,0,0.3),

                0 0 0 0.5px rgba(0,0,0,0.6);

            z-index: 30;

        }

        .torx::before, .torx::after {

            content: "";

            position: absolute;

            top: 50%; left: 50%;

            background: rgba(0,0,0,0.75);

            border-radius: 0.5px;

            box-shadow: 0 0.5px 0 rgba(255,255,255,0.06), inset 0 0.5px 0.5px rgba(0,0,0,0.9);

        }

        .torx::before { width: 7px; height: 1.6px; transform: translate(-50%,-50%); }

        .torx::after { width: 1.6px; height: 7px; transform: translate(-50%,-50%); }



        .silk {

            font-family: system-ui;

            font-size: 7px; font-weight: 600;

            letter-spacing: 2.5px; text-transform: uppercase;

            color: rgba(255,255,255,0.04);

            text-shadow: 0 0.5px 0 rgba(255,255,255,0.015), 0 -0.5px 0.5px rgba(0,0,0,0.5);

            position: absolute; pointer-events: none; z-index: 30;

        }



        .engrave {

            position: absolute; left: 20px; right: 20px; height: 1px;

            pointer-events: none; z-index: 30;

            background: rgba(0,0,0,0.4);

            box-shadow: 0 1px 0 rgba(255,255,255,0.025), 0 -0.5px 0 rgba(0,0,0,0.3);

        }



        .bezel-ring {

            background: conic-gradient(from 0deg, #3a3e48, #555960, #22252b, #4a4e56, #1a1d22, #585c65, #2e3238, #4a4e55, #1e2228, #555960, #3a3e48);

            border-radius: 50%; padding: 5px;

            box-shadow:

                0 40px 80px rgba(0,0,0,0.9), 0 15px 30px rgba(0,0,0,0.7), 0 6px 12px rgba(0,0,0,0.5),

                inset 0 2px 3px rgba(255,255,255,0.14), inset 0 1px 1px rgba(255,255,255,0.08),

                inset 0 -2px 4px rgba(0,0,0,0.9), inset 0 -1px 1px rgba(0,0,0,0.7),

                inset 0 0 0 1px rgba(255,255,255,0.03), 0 0 0 1px rgba(0,0,0,0.8);

            animation: gaugeReveal 0.5s 0.3s ease both;

            position: relative;

        }

        .bezel-ring::before {

            content: ""; position: absolute; inset: 0; border-radius: 50%;

            background: radial-gradient(ellipse 50% 20% at 30% 10%, rgba(255,255,255,0.1) 0%, transparent 60%);

            pointer-events: none; z-index: 5;

        }



        .bezel-screw {

            position: absolute; width: 12px; height: 12px; border-radius: 50%; z-index: 110;

            background: radial-gradient(circle at 36% 30%, rgba(255,255,255,0.1) 0%, transparent 35%),

                conic-gradient(from 0deg, #3e4248, #5a5e66, #2a2d32, #4e5258, #3e4248);

            box-shadow:

                inset 0 1.5px 1px rgba(255,255,255,0.25), inset 0 2px 2px rgba(255,255,255,0.06),

                inset 0 -1.5px 2px rgba(0,0,0,0.8), inset 0 -2px 3px rgba(0,0,0,0.4),

                0 2px 4px rgba(0,0,0,0.7), 0 3px 6px rgba(0,0,0,0.4);

        }

        .bezel-screw::before {

            content: ""; position: absolute; top: 50%; left: 50%;

            width: 6px; height: 1.2px; background: rgba(0,0,0,0.7); border-radius: 0.5px;

            transform: translate(-50%,-50%) rotate(var(--rot, 0deg));

            box-shadow: 0 0.5px 0 rgba(255,255,255,0.08);

        }



        .bezel-recess {

            background: var(--flint-800); border-radius: 50%; padding: 8px;

            box-shadow:

                inset 0 6px 16px rgba(0,0,0,1), inset 0 3px 6px rgba(0,0,0,0.8),

                inset 0 -3px 8px rgba(0,0,0,0.6), inset 4px 0 8px rgba(0,0,0,0.4),

                inset -4px 0 8px rgba(0,0,0,0.4), inset 0 0 2px rgba(0,0,0,0.9);

        }



        .gauge-face {

            background:

                radial-gradient(ellipse 70% 50% at 45% 35%, rgba(20,24,35,0.4) 0%, transparent 60%),

                radial-gradient(circle at 50% 38%, #0c0f15 0%, #050709 60%, #020305 100%);

            border-radius: 50%; position: relative;

            box-shadow:

                inset 0 40px 100px rgba(0,0,0,1), inset 0 20px 40px rgba(0,0,0,0.7),

                inset 0 -20px 60px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,0,0,0.8),

                inset 0 0 3px rgba(0,0,0,1), inset 0 0 80px rgba(0,0,0,0.4);

            width: 500px; height: 500px; overflow: hidden;

            display: flex; justify-content: center; align-items: center;

        }



        .glass-layer { position: absolute; inset: 0; border-radius: 50%; pointer-events: none; z-index: 100; }

        .glass-specular {

            background:

                radial-gradient(ellipse 80% 35% at 40% 15%, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.03) 40%, transparent 65%),

                radial-gradient(ellipse 60% 20% at 55% 88%, rgba(255,255,255,0.02) 0%, transparent 60%),

                radial-gradient(ellipse 15% 60% at 5% 45%, rgba(255,255,255,0.03) 0%, transparent 70%);

        }

        .glass-fresnel {

            box-shadow: inset 0 0 60px rgba(0,0,0,0.15), inset 0 2px 4px rgba(255,255,255,0.04), inset 0 -2px 4px rgba(0,0,0,0.2);

        }

        .glass-caustic {

            background: conic-gradient(from 200deg at 50% 50%, transparent 0deg, rgba(255,255,255,0.015) 20deg, transparent 40deg, transparent 360deg);

        }

        .glass-condensation {

            background:

                radial-gradient(ellipse 30% 25% at 65% 75%, rgba(255,255,255,0.025) 0%, transparent 60%),

                radial-gradient(ellipse 25% 20% at 25% 80%, rgba(255,255,255,0.02) 0%, transparent 55%),

                radial-gradient(ellipse 35% 15% at 80% 60%, rgba(255,255,255,0.015) 0%, transparent 50%),

                radial-gradient(circle 1.5px at 58% 72%, rgba(255,255,255,0.06) 0%, transparent 100%),

                radial-gradient(circle 1px at 62% 78%, rgba(255,255,255,0.05) 0%, transparent 100%),

                radial-gradient(circle 1.2px at 70% 68%, rgba(255,255,255,0.04) 0%, transparent 100%),

                radial-gradient(circle 0.8px at 55% 82%, rgba(255,255,255,0.05) 0%, transparent 100%),

                radial-gradient(circle 1px at 30% 76%, rgba(255,255,255,0.04) 0%, transparent 100%),

                radial-gradient(circle 0.7px at 75% 74%, rgba(255,255,255,0.045) 0%, transparent 100%);

            opacity: 0.8;

        }

        .glass-edge {

            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04), inset 0 0 0 2px rgba(0,0,0,0.2);

        }



        .vfd-glow { text-shadow: 0 0 20px rgba(255,255,255,0.3), 0 0 40px rgba(255,255,255,0.12), 0 0 80px rgba(255,255,255,0.05); }

        .needle-group { transform-origin: 250px 250px; transition: none; }



        .env-glow {

            position: fixed; top: 55%; left: 50%; width: 700px; height: 500px;

            transform: translate(-50%,-50%); border-radius: 50%;

            pointer-events: none; filter: blur(100px); z-index: -1;

            transition: opacity 0.8s ease; opacity: 0;

        }



        .light-spill {

            position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);

            border-radius: 50%; pointer-events: none; transition: opacity 0.5s ease; opacity: 0;

        }

        .light-spill-1 { width: 200px; height: 15px; filter: blur(8px); }

        .light-spill-2 { width: 350px; height: 25px; filter: blur(18px); bottom: -35px; }

        .light-spill-3 { width: 500px; height: 40px; filter: blur(35px); bottom: -55px; }



        .warn-lamp { position: absolute; z-index: 30; display: flex; align-items: center; gap: 12px; }

        .warn-housing {

            width: 44px; height: 20px; border-radius: 4px;

            background: linear-gradient(180deg, #3a3e48 0%, #22252b 50%, #2e3238 100%);

            padding: 2.5px; position: relative;

            box-shadow: 0 3px 8px rgba(0,0,0,0.7), 0 1px 3px rgba(0,0,0,0.5),

                inset 0 1px 0 rgba(255,255,255,0.12), inset 0 -1px 0 rgba(0,0,0,0.6),

                0 0 0 0.5px rgba(0,0,0,0.7);

        }

        .warn-housing::before {

            content: ""; position: absolute; top: 1px; left: 20%; right: 20%; height: 1px;

            border-radius: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);

        }

        .warn-recess {

            width: 100%; height: 100%; border-radius: 2px; background: #050506;

            display: flex; justify-content: center; align-items: center;

            transition: box-shadow 0.15s ease;

            box-shadow: inset 0 3px 6px rgba(0,0,0,0.95), inset 0 1px 2px rgba(0,0,0,0.8);

        }

        .warn-recess.lit {

            box-shadow: inset 0 3px 6px rgba(0,0,0,0.7), inset 0 0 10px rgba(255,0,0,0.4), inset 0 0 20px rgba(255,0,0,0.15);

        }

        .warn-lens {

            width: 36px; height: 12px; border-radius: 2px; position: relative;

            transition: all 0.15s ease;

            background: linear-gradient(180deg, rgba(40,8,10,0.6), rgba(15,3,5,0.9));

            box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);

        }

        .warn-lens::before {

            content: ""; position: absolute; top: 1px; left: 3px; right: 3px; height: 3px;

            border-radius: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);

            transition: all 0.15s ease;

        }

        .warn-lens.lit {

            background: linear-gradient(180deg, #ff4400, #ff0000 30%, #ee0000 50%, #ff0000 70%, #ff4400);

            filter: none !important;

            box-shadow:

                inset 0 0 10px rgba(255,255,255,0.8),

                inset 0 0 5px rgba(255,150,100,0.9),

                0 0 10px 2px #ff4400,

                0 0 20px 6px #ff1100,

                0 0 40px 12px rgba(255,0,0,0.9),

                0 0 80px 20px rgba(255,0,0,0.7),

                0 0 120px 30px rgba(255,0,0,0.5),

                0 0 200px 45px rgba(255,0,0,0.3),

                0 0 300px 60px rgba(255,0,0,0.15);

            animation: ledFlash 0.4s ease-in-out infinite alternate;

        }

        .warn-lens.lit::before {

            background: linear-gradient(90deg, transparent 5%, rgba(255,255,255,0.9) 20%, rgba(255,255,255,1) 50%, rgba(255,255,255,0.9) 80%, transparent 95%);

            height: 5px; top: 1px;

        }

        @keyframes ledFlash { 0% { opacity: 0.8; filter: brightness(1); } 100% { opacity: 1; filter: brightness(1.5); } }



        .warn-label.lit {

            color: #ff5522;

            text-shadow: 0 0 10px rgba(255,60,0,1), 0 0 25px rgba(255,0,0,1), 0 0 50px rgba(255,0,0,0.8);

            font-weight: 800;

        }



        .warn-spill {

            position: absolute; width: 240px; height: 120px; border-radius: 50%;

            pointer-events: none; z-index: 29; transition: opacity 0.4s ease; opacity: 0;

            filter: blur(35px);

            background: radial-gradient(ellipse, rgba(255,0,0,0.6) 0%, rgba(255,0,20,0.2) 50%, transparent 80%);

        }

        .warn-spill.lit { opacity: 1; animation: spillPulse 0.8s ease-in-out infinite alternate; }

        @keyframes spillPulse { 0% { opacity: 0.6; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1.05); } }



        .warn-bounce {

            position: absolute; width: 140px; height: 60px; border-radius: 50%;

            pointer-events: none; z-index: 29; transition: opacity 0.4s ease; opacity: 0;

            filter: blur(20px);

            background: radial-gradient(ellipse, rgba(255,20,30,0.4) 0%, transparent 75%);

        }

        .warn-bounce.lit { opacity: 1; }



        @keyframes chassisReveal { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

        @keyframes gaugeReveal { from { opacity: 0; } to { opacity: 1; } }

    </style>

</head>

<body>

    <div id="root"></div>



    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>



    <script type="text/babel">

        const { useState, useEffect, useRef, useCallback } = React;



        const useTickSound = () => {

            return useCallback((value) => {}, []);

        };



        const polarToCartesian = (cx, cy, r, deg) => {

            const rad = (deg - 90) * Math.PI / 180;

            return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };

        };

        const describeArc = (x, y, r, sa, ea) => {

            const s = polarToCartesian(x, y, r, ea);

            const e = polarToCartesian(x, y, r, sa);

            const large = ea - sa <= 180 ? "0" : "1";

            return `M ${s.x} ${s.y} A ${r} ${r} 0 ${large} 0 ${e.x} ${e.y}`;

        };



        const CX = 250, CY = 250, R = 165;



        const WattMeter = () => {

            const needleRef = useRef(null);

            const textRef = useRef(null);

            const redTrackRef = useRef(null);

            const [isHot, setIsHot] = useState(false);

            const [isDanger, setIsDanger] = useState(false);

            const playTick = useTickSound();

            const physics = useRef({ current: 0, target: 120, velocity: 0, k: 0.12, d: 0.16 });



            useEffect(() => {

                const interval = setInterval(() => { physics.current.target = 5 + Math.random() * 175; }, 2500);

                let booted = false;

                const bootTime = performance.now();

                let raf;

                const update = () => {

                    const p = physics.current;

                    const now = performance.now();

                    if (!booted && now - bootTime < 1200) {

                        const t = (now - bootTime) / 1200;

                        const sweep = t < 0.4 ? (t/0.4)*135 : t < 0.7 ? 135-((t-0.4)/0.3)*155 : -20+((t-0.7)/0.3)*20;

                        const angle = -135 + ((sweep+135)/270)*270;

                        if (needleRef.current) needleRef.current.style.transform = `rotate(${angle}deg)`;

                        raf = requestAnimationFrame(update); return;

                    }

                    booted = true;

                    p.velocity += (p.target - p.current) * p.k;

                    p.velocity *= (1 - p.d);

                    p.current += p.velocity;

                    const clamped = Math.max(0, Math.min(180, p.current));

                    const angle = -135 + (clamped/180)*270;

                    if (needleRef.current) needleRef.current.style.transform = `rotate(${angle}deg)`;

                    if (textRef.current) textRef.current.textContent = Math.round(clamped);

                    if (redTrackRef.current) redTrackRef.current.setAttribute("d", describeArc(CX,CY,R,-135,angle));

                    setIsHot(clamped > 100);

                    setIsDanger(clamped > 140);

                    playTick(clamped);

                    raf = requestAnimationFrame(update);

                };

                update();

                return () => { clearInterval(interval); cancelAnimationFrame(raf); };

            }, []);



            const ticks = [];

            for (let i = 0; i <= 180; i += 2) {

                const angle = -135 + (i/180)*270;

                const isMajor = i%20===0, isMedium = i%10===0;

                const len = isMajor ? 28 : (isMedium ? 14 : 5);

                const p1 = polarToCartesian(CX,CY,R-len,angle);

                const p2 = polarToCartesian(CX,CY,R+10,angle);

                const lp = polarToCartesian(CX,CY,R+48,angle);

                if (isMajor || isMedium || i%2===0) {

                    ticks.push({ x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,lx:lp.x,ly:lp.y,val:i,

                        type: isMajor?'major':(isMedium?'medium':'minor') });

                }

            }



            const hot = isHot, danger = isDanger;



            return (

                <div style={{ position:'relative' }}>

                    <div className="env-glow" style={{

                        opacity: danger?1:hot?0.6:0,

                        background: danger

                            ? 'radial-gradient(circle, rgba(255,0,40,0.07) 0%, rgba(255,0,30,0.02) 40%, transparent 60%)'

                            : 'radial-gradient(circle, rgba(255,0,60,0.04) 0%, transparent 60%)'

                    }} />



                    <div className={`metal-chassis ${danger?'danger':''}`}>

                        <div className="torx" style={{top:18,left:18}} />

                        <div className="torx" style={{top:18,right:18}} />

                        <div className="torx" style={{bottom:18,left:18}} />

                        <div className="torx" style={{bottom:18,right:18}} />



                        <div className="silk" style={{top:18,left:'50%',transform:'translateX(-50%)'}}>PWR-MON 4200</div>

                        <div className="engrave" style={{top:36}} />

                        <div className="silk" style={{bottom:18,right:22,fontSize:'6px',letterSpacing:'1.5px'}}>REV.04</div>

                        <div className="silk" style={{bottom:18,left:22,fontSize:'6px',letterSpacing:'1.5px'}}>SN:04-2025-A</div>



                        <div className="warn-lamp" style={{bottom:68,right:30}}>

                            <span className={`warn-label ${danger?'lit':''}`}>OVERLOAD</span>

                            <div className="warn-housing">

                                <div className={`warn-recess ${danger?'lit':''}`}>

                                    <div className={`warn-lens ${danger?'lit':''}`} />

                                </div>

                            </div>

                        </div>

                        <div className={`warn-spill ${danger?'lit':''}`} style={{bottom:50,right:15}} />

                        <div className={`warn-bounce ${danger?'lit':''}`} style={{bottom:40,right:40}} />



                        <div className="engrave" style={{bottom:36}} />



                        <div className="bezel-ring">

                            <div className="bezel-screw" style={{top:-2,left:'50%',transform:'translateX(-50%)','--rot':'25deg'}} />

                            <div className="bezel-screw" style={{bottom:-2,left:'50%',transform:'translateX(-50%)','--rot':'70deg'}} />

                            <div className="bezel-screw" style={{left:-2,top:'50%',transform:'translateY(-50%)','--rot':'10deg'}} />

                            <div className="bezel-screw" style={{right:-2,top:'50%',transform:'translateY(-50%)','--rot':'55deg'}} />



                            <div className="bezel-recess">

                                <div className="gauge-face">

                                    <div className="glass-layer glass-specular" />

                                    <div className="glass-layer glass-fresnel" />

                                    <div className="glass-layer glass-caustic" />

                                    <div className="glass-layer glass-condensation" />

                                    <div className="glass-layer glass-edge" />



                                    <svg width="500" height="500" viewBox="0 0 500 500" style={{position:'absolute'}}>

                                        <defs>

                                            <linearGradient id="redGrad" x1="0%" y1="100%" x2="100%" y2="0%">

                                                <stop offset="0%" stopColor="#ff0040" />

                                                <stop offset="100%" stopColor="#ff5a90" />

                                            </linearGradient>

                                            <linearGradient id="needleGrad" x1="0" y1="0" x2="0" y2="1">

                                                <stop offset="0%" stopColor="#ff4d8d" />

                                                <stop offset="100%" stopColor="#cc0035" />

                                            </linearGradient>

                                            <filter id="arcGlow" x="-50%" y="-50%" width="200%" height="200%">

                                                <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1" />

                                                <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur2" />

                                                <feMerge><feMergeNode in="blur2" /><feMergeNode in="blur1" /><feMergeNode in="SourceGraphic" /></feMerge>

                                            </filter>

                                            <filter id="needleShadow"><feDropShadow dx="2" dy="3" stdDeviation="3" floodColor="rgba(0,0,0,0.7)" /></filter>

                                            <filter id="tipGlow" x="-200%" y="-200%" width="500%" height="500%">

                                                <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b1" />

                                                <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b2" />

                                                <feMerge><feMergeNode in="b2" /><feMergeNode in="b1" /><feMergeNode in="SourceGraphic" /></feMerge>

                                            </filter>

                                            <filter id="zoneGlow" x="-30%" y="-30%" width="160%" height="160%">

                                                <feGaussianBlur in="SourceGraphic" stdDeviation="6" />

                                            </filter>

                                            <filter id="needleGlow" x="-100%" y="-100%" width="300%" height="300%">

                                                <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="g1" />

                                                <feMerge><feMergeNode in="g1" /><feMergeNode in="SourceGraphic" /></feMerge>

                                            </filter>

                                            <radialGradient id="pivotGrad" cx="40%" cy="35%">

                                                <stop offset="0%" stopColor="#555" />

                                                <stop offset="50%" stopColor="#2a2a2e" />

                                                <stop offset="100%" stopColor="#111" />

                                            </radialGradient>

                                        </defs>



                                        <path d={describeArc(CX,CY,R,-135,135)} fill="none" stroke="#060810" strokeWidth="28" strokeLinecap="round" />

                                        <path d={describeArc(CX,CY,R,-135,135)} fill="none" stroke="rgba(0,0,0,0.3)" strokeWidth="30" strokeLinecap="round" style={{filter:'blur(2px)'}} />

                                        <path ref={redTrackRef} d={describeArc(CX,CY,R,-135,-135)} fill="none" stroke="url(#redGrad)" strokeWidth="26" strokeLinecap="round" filter="url(#arcGlow)" />

                                        <path d={describeArc(CX,CY,R,-135+(140/180)*270,135)} fill="none" stroke="rgba(255,0,20,0.15)" strokeWidth="50" strokeLinecap="round" filter="url(#zoneGlow)" />

                                        <path d={describeArc(CX,CY,R,-135+(140/180)*270,135)} fill="none" stroke="rgba(255,0,30,0.25)" strokeWidth="28" strokeLinecap="round" />

                                        <path d={describeArc(CX,CY,R-14,-135+(140/180)*270,135)} fill="none" stroke="rgba(255,0,30,0.4)" strokeWidth="1" />

                                        <path d={describeArc(CX,CY,R+14,-135+(140/180)*270,135)} fill="none" stroke="rgba(255,0,30,0.3)" strokeWidth="1" />



                                        {Array.from({length:12},(_,i) => {

                                            const v=140+i*(40/12), a=-135+(v/180)*270;

                                            const p1=polarToCartesian(CX,CY,R-13,a), p2=polarToCartesian(CX,CY,R+13,a);

                                            return <line key={'hz'+i} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke="rgba(255,15,30,0.18)" strokeWidth="1" />;

                                        })}



                                        {[140,150,160,170,180].map((v,i) => {

                                            const a=-135+(v/180)*270;

                                            const p1=polarToCartesian(CX,CY,R-28,a), p2=polarToCartesian(CX,CY,R+10,a);

                                            return <line key={'rz'+i} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke="rgba(255,30,50,0.6)" strokeWidth={v%20===0?3:1.5} />;

                                        })}



                                        {(() => {

                                            const a=-135+(160/180)*270, p=polarToCartesian(CX,CY,R-42,a);

                                            return <text x={p.x} y={p.y} fill="rgba(255,30,50,0.35)" fontSize="9" fontWeight="800" fontFamily="Exo 2, sans-serif" fontStyle="italic" textAnchor="middle" dominantBaseline="middle" letterSpacing="3" transform={`rotate(${a},${p.x},${p.y})`}>DANGER</text>;

                                        })()}



                                        {ticks.map((t,i) => (

                                            <g key={i}>

                                                <line x1={t.x1} y1={t.y1} x2={t.x2} y2={t.y2}

                                                    stroke={t.type==='major'?'rgba(255,255,255,0.65)':(t.type==='medium'?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.08)')}

                                                    strokeWidth={t.type==='major'?2.5:(t.type==='medium'?1.2:0.6)} />

                                                {t.type==='major' && (

                                                    <text x={t.lx} y={t.ly} fill="rgba(255,255,255,0.5)" fontSize="24" fontWeight="700" fontFamily="Exo 2, sans-serif" fontStyle="italic" textAnchor="middle" dominantBaseline="middle">{t.val}</text>

                                                )}

                                            </g>

                                        ))}



                                        <text x={CX} y="175" fill="rgba(255,255,255,0.35)" fontSize="16" fontWeight="700" fontFamily="Exo 2, sans-serif" fontStyle="italic" textAnchor="middle" letterSpacing="8">WATTS</text>

                                        <text x={CX} y="350" fill="rgba(255,255,255,0.25)" fontSize="10" fontWeight="700" fontFamily="Exo 2, sans-serif" fontStyle="italic" textAnchor="middle" letterSpacing="5">RMS POWER</text>

                                        <text ref={textRef} x={CX} y="410" fill="white" fontSize="62" fontWeight="700" fontFamily="Exo 2, sans-serif" fontStyle="italic" textAnchor="middle" className="vfd-glow" style={{letterSpacing:'-1px'}}>0</text>



                                        <circle cx={CX} cy={CY} r="18" fill="url(#pivotGrad)" filter="url(#needleShadow)" />

                                        <circle cx={CX} cy={CY} r="14" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="0.5" />

                                        <circle cx={CX} cy={CY} r="6" fill="#0a0a0a" stroke="rgba(255,255,255,0.08)" strokeWidth="0.5" />

                                        <circle cx={CX-4} cy={CY-5} r="2.5" fill="rgba(255,255,255,0.12)" />



                                        <g ref={needleRef} className="needle-group" filter="url(#needleShadow)">

                                            <line x1={CX} y1="70" x2={CX} y2={CY+15} stroke="rgba(255,77,141,0.05)" strokeWidth="1.5" />

                                            <line x1={CX} y1={CY+5} x2={CX} y2={CY+40} stroke="#1a1a1e" strokeWidth="11" strokeLinecap="round" />

                                            <line x1={CX-1} y1={CY+8} x2={CX-1} y2={CY+36} stroke="rgba(255,255,255,0.05)" strokeWidth="1" />

                                            <line x1={CX} y1="38" x2={CX} y2={CY-20} stroke="url(#needleGrad)" strokeWidth="16" strokeLinecap="round" filter="url(#needleGlow)" />

                                            <line x1={CX} y1={CY-20} x2={CX} y2="80" stroke="url(#needleGrad)" strokeWidth="16" strokeLinecap="round" />

                                            <line x1={CX-2} y1="42" x2={CX-2} y2="85" stroke="rgba(255,255,255,0.28)" strokeWidth="2" strokeLinecap="round" />

                                            <line x1={CX+3} y1="50" x2={CX+3} y2="90" stroke="rgba(0,0,0,0.4)" strokeWidth="2" strokeLinecap="round" />

                                            <circle cx={CX} cy="34" r="8" fill="#ff4d8d" filter="url(#tipGlow)" />

                                            <circle cx={CX} cy="34" r="5" fill="#ffb0cc" />

                                            <circle cx={CX} cy="34" r="2.5" fill="rgba(255,255,255,0.8)" />

                                        </g>

                                    </svg>

                                </div>

                            </div>

                        </div>



                        <div className="light-spill light-spill-1" style={{

                            background:(hot||danger)?`radial-gradient(ellipse, rgba(255,0,60,${danger?0.22:0.15}) 0%, transparent 70%)`:'none',

                            opacity:(hot||danger)?1:0

                        }} />

                        <div className="light-spill light-spill-2" style={{

                            background:(hot||danger)?`radial-gradient(ellipse, rgba(255,0,50,${danger?0.1:0.06}) 0%, transparent 70%)`:'none',

                            opacity:(hot||danger)?1:0

                        }} />

                        <div className="light-spill light-spill-3" style={{

                            background:(hot||danger)?`radial-gradient(ellipse, rgba(255,0,40,${danger?0.05:0.025}) 0%, transparent 65%)`:'none',

                            opacity:(hot||danger)?1:0

                        }} />

                    </div>

                </div>

            );

        };



        ReactDOM.createRoot(document.getElementById('root')).render(<WattMeter />);

    </script>

</body>

</html>
