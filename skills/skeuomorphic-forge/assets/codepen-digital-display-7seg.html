<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Skeuomorphic Digital Display</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>

        @font-face {

            font-family: 'Digital-7';

            src: url('https://fonts.cdnfonts.com/s/14352/Digital7-rg88.woff') format('woff');

        }



        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }



        body {

            background-color: #0a0a0a;

            display: flex;

            justify-content: center;

            align-items: center;

            min-height: 100vh;

        }



        /* ═══════════════════════════════════════════

           LAYER 1 — BACKPLATE (brushed metal panel)

           ═══════════════════════════════════════════ */

        .backplate {

            position: relative;

            background:

                url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"),

                linear-gradient(135deg, #222228 0%, #18181c 40%, #1e1e24 100%);

            background-blend-mode: overlay, normal;

            border-radius: 28px;

            padding: 32px 36px;

            box-shadow:

                inset 0 1px 0 rgba(255,255,255,0.1),

                inset 0 2px 3px rgba(255,255,255,0.03),

                inset 0 -1px 0 rgba(0,0,0,0.5),

                inset 1px 0 0 rgba(255,255,255,0.05),

                inset -1px 0 0 rgba(255,255,255,0.04),

                0 4px 8px rgba(0,0,0,0.5),

                0 10px 20px rgba(0,0,0,0.4),

                0 20px 40px rgba(0,0,0,0.25),

                0 0 60px rgba(0,0,0,0.4);

        }



        /* ═══ SCREWS (4 corners, cruciform) ═══ */

        .screw {

            position: absolute;

            width: 12px; height: 12px;

            border-radius: 50%;

            background: radial-gradient(circle at 36% 30%, #666 0%, #444 30%, #2a2a2a 65%, #181818 100%);

            box-shadow:

                inset 0 2px 4px rgba(0,0,0,0.95),

                inset 0 -0.5px 0 rgba(255,255,255,0.15),

                inset 0.5px 0 0 rgba(255,255,255,0.06),

                0 1px 1px rgba(0,0,0,0.8),

                0 2px 3px rgba(0,0,0,0.7),

                0 3px 6px rgba(0,0,0,0.5),

                0 5px 10px rgba(0,0,0,0.3),

                0 0.5px 0 rgba(255,255,255,0.07),

                0 0 0 0.5px rgba(0,0,0,0.6);

        }

        .screw::before {

            content: '';

            position: absolute; top: 50%; left: 18%; right: 18%; height: 1.2px;

            background: #0a0a0a; border-radius: 0.5px;

            transform: translateY(-50%) rotate(var(--a, 30deg));

            box-shadow: 0 0.5px 0 rgba(255,255,255,0.08);

        }

        .screw::after {

            content: '';

            position: absolute; top: 18%; bottom: 18%; left: 50%; width: 1.2px;

            background: #0a0a0a; border-radius: 0.5px;

            transform: translateX(-50%) rotate(var(--a, 30deg));

            box-shadow: 0.5px 0 0 rgba(255,255,255,0.08);

        }

        .s-tl { top: 10px; left: 10px; --a: 25deg; }

        .s-tr { top: 10px; right: 10px; --a: -15deg; }

        .s-bl { bottom: 10px; left: 10px; --a: 55deg; }

        .s-br { bottom: 10px; right: 10px; --a: 8deg; }



        /* ═══════════════════════════════════════════

           LAYER 2 — OUTER BEZEL (machined chrome)

           ═══════════════════════════════════════════ */

        .outer-bezel {

            position: relative;

            background: linear-gradient(148deg, #555560 0%, #303038 22%, #606068 46%, #2a2a32 68%, #484850 100%);

            border-radius: 20px;

            padding: 6px;

            box-shadow:

                inset 0 1px 0 rgba(255,255,255,0.3),

                inset 0 2px 3px rgba(255,255,255,0.08),

                inset 0 -1px 0 rgba(0,0,0,0.6),

                inset 0 -2px 4px rgba(0,0,0,0.3),

                inset 1px 0 0 rgba(255,255,255,0.14),

                inset -1px 0 0 rgba(255,255,255,0.1),

                0 2px 4px rgba(0,0,0,0.5),

                0 4px 10px rgba(0,0,0,0.4),

                0 8px 20px rgba(0,0,0,0.25),

                0 0 1px rgba(255,255,255,0.2),

                0 1px 0 rgba(255,255,255,0.1),

                0 -1px 0 rgba(0,0,0,0.7);

        }

        /* specular sweep across chrome */

        .outer-bezel::before {

            content: '';

            position: absolute; inset: 0; border-radius: 20px;

            background: radial-gradient(ellipse 55% 25% at 28% 12%, rgba(255,255,255,0.22) 0%, transparent 60%);

            pointer-events: none; z-index: 1;

        }



        /* ═══════════════════════════════════════════

           LAYER 3 — INNER BEZEL (deep recess gorge)

           ═══════════════════════════════════════════ */

        .inner-bezel {

            background: linear-gradient(160deg, #08080c 0%, #101014 40%, #060608 100%);

            border-radius: 14px;

            padding: 5px;

            box-shadow:

                inset 0 4px 10px rgba(0,0,0,0.95),

                inset 0 2px 4px rgba(0,0,0,0.9),

                inset 0 -1px 0 rgba(255,255,255,0.04),

                inset 0 -2px 3px rgba(255,255,255,0.02),

                inset 2px 0 4px rgba(0,0,0,0.6),

                inset -2px 0 4px rgba(0,0,0,0.6),

                0 1px 0 rgba(255,255,255,0.06),

                0 0 0 0.5px rgba(0,0,0,0.9);

        }



        /* ═══════════════════════════════════════════

           LAYER 4 — SCREEN GLASS (gunmetal dark)

           ═══════════════════════════════════════════ */

        .screen {

            position: relative;

            background: #001a33;

            border-radius: 10px;

            padding: 24px 44px;

            overflow: hidden;

            display: flex;

            align-items: center;

            justify-content: center;

            box-shadow:

                inset 0 12px 30px rgba(0,0,0,0.95),

                inset 0 -12px 30px rgba(0,0,0,0.8),

                inset 4px 0 12px rgba(0,0,0,0.5),

                inset -4px 0 12px rgba(0,0,0,0.5),

                inset 0 0 40px rgba(0,0,0,0.4),

                0 0 0 1px rgba(0,0,0,0.9),

                0 1px 0 rgba(255,255,255,0.03);

        }



        /* ═══ LAYER 5 — SCANLINES ═══ */

        .screen::before {

            content: '';

            position: absolute; inset: 0;

            background: repeating-linear-gradient(0deg,

                transparent 0px, transparent 2px,

                rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 3px);

            z-index: 10;

            pointer-events: none;

            border-radius: 10px;

        }



        /* ═══ LAYER 6 — GLASS REFLECTION (specular + edge) ═══ */

        .screen::after {

            content: '';

            position: absolute; inset: 0;

            background:

                /* main specular glare */

                radial-gradient(ellipse 60% 35% at 25% 15%,

                    rgba(255,255,255,0.12) 0%, transparent 55%),

                /* secondary soft highlight */

                radial-gradient(ellipse 80% 40% at 40% 25%,

                    rgba(30,100,255,0.04) 0%, transparent 60%),

                /* edge catch bottom-right */

                radial-gradient(ellipse 30% 20% at 85% 90%,

                    rgba(255,255,255,0.03) 0%, transparent 50%),

                /* full-surface gradient (convex glass sim) */

                linear-gradient(155deg,

                    rgba(255,255,255,0.06) 0%,

                    rgba(255,255,255,0.02) 30%,

                    transparent 50%,

                    rgba(0,0,0,0.05) 80%,

                    rgba(0,0,0,0.1) 100%);

            z-index: 12;

            pointer-events: none;

            border-radius: 10px;

        }



        /* ═══ LAYER 7 — SCREEN AMBIENT GLOW ═══ */

        .screen-glow {

            position: absolute; inset: 0;

            background: radial-gradient(

                circle at 50% 50%,

                rgba(30, 100, 255, 0.2) 0%,

                rgba(0, 20, 60, 0.4) 100%);

            z-index: 4;

            pointer-events: none;

            border-radius: 10px;

        }



        /* ═══ LAYER 8 — NOISE TEXTURE ═══ */

        .screen-noise {

            position: absolute; inset: 0;

            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");

            opacity: 0.03;

            mix-blend-mode: overlay;

            pointer-events: none;

            z-index: 11;

            border-radius: 10px;

        }



        /* ═══ CONTENT LAYOUT ═══ */

        .content {

            position: relative;

            z-index: 8;

            display: flex;

            flex-direction: column;

            align-items: center;

            gap: 2px;

        }



        /* ligne titre */

        .line-title {

            font-family: 'Digital-7', 'Courier New', monospace;

            font-size: 48px;

            line-height: 1;

            letter-spacing: 8px;

            font-weight: 500;

            color: #b0e0ff;

            text-shadow:

                0 0 8px rgba(176,224,255,0.8),

                0 0 20px rgba(0,120,255,0.5),

                0 0 30px rgba(0,80,200,0.2),

                2px 2px 3px rgba(0,0,0,0.5);

        }



        /* ligne valeur principale */

        .line-value {

            font-family: 'Digital-7', 'Courier New', monospace;

            font-size: 126px;

            line-height: 1;

            letter-spacing: 6px;

            font-weight: 500;

            color: #ffe880;

            text-shadow:

                0 0 6px rgba(255,232,128,0.9),

                0 0 14px rgba(255,220,80,0.7),

                0 0 28px rgba(255,200,40,0.4),

                0 0 50px rgba(255,180,20,0.15),

                2px 2px 4px rgba(0,0,0,0.5);

        }



        /* ligne description */

        .line-desc {

            font-family: 'Digital-7', 'Courier New', monospace;

            font-size: 32px;

            line-height: 1;

            letter-spacing: 3px;

            font-weight: 500;

            color: #b0e0ff;

            text-shadow:

                0 0 6px rgba(176,224,255,0.7),

                0 0 14px rgba(0,120,255,0.4),

                0 0 22px rgba(0,80,200,0.15),

                1px 1px 2px rgba(0,0,0,0.5);

            margin-top: 4px;

        }



        /* ═══ GHOST SEGMENTS (unlit) ═══ */

        .ghost-layer {

            position: absolute;

            inset: 0;

            display: flex;

            flex-direction: column;

            align-items: center;

            justify-content: center;

            gap: 2px;

            pointer-events: none;

            z-index: 6;

        }

        .ghost-title {

            font-family: 'Digital-7', 'Courier New', monospace;

            font-size: 48px;

            line-height: 1;

            letter-spacing: 8px;

            color: rgba(40,80,150,0.15);

        }

        .ghost-value {

            font-family: 'Digital-7', 'Courier New', monospace;

            font-size: 126px;

            line-height: 1;

            letter-spacing: 6px;

            color: rgba(40,80,150,0.15);

        }

        .ghost-desc {

            font-family: 'Digital-7', 'Courier New', monospace;

            font-size: 32px;

            line-height: 1;

            letter-spacing: 3px;

            color: rgba(40,80,150,0.15);

            margin-top: 4px;

        }



        /* ═══ LED STATUS INDICATOR ═══ */

        .status-led {

            position: absolute;

            bottom: 8px; right: 12px;

            width: 5px; height: 5px;

            border-radius: 50%;

            background: radial-gradient(circle at 35% 30%, #a0c8ff 0%, #4080dd 60%, #2050aa 100%);

            box-shadow:

                inset 0 -0.5px 1px rgba(0,0,0,0.4),

                0 0 4px rgba(120,170,255,0.8),

                0 0 10px rgba(80,130,255,0.4),

                0 0 18px rgba(50,100,255,0.15);

            z-index: 15;

            animation: led-pulse 2.5s ease-in-out infinite;

        }

        @keyframes led-pulse {

            0%, 100% { opacity: 0.8; }

            50% { opacity: 1; }

        }



        /* ═══ BRAND LABEL (silkscreened on bezel) ═══ */

        .brand-label {

            position: absolute;

            bottom: 8px; left: 50%;

            transform: translateX(-50%);

            font-family: 'Inter', 'Orbitron', sans-serif;

            font-size: 7px;

            font-weight: 500;

            letter-spacing: 3px;

            text-transform: uppercase;

            color: rgba(255,255,255,0.12);

            text-shadow: 0 -1px 0 rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.03);

            z-index: 2;

        }

    </style>

</head>

<body>

    <div id="root"></div>



    <script type="text/babel">

        const { useState, useEffect } = React;



        const DigitalDisplay = () => {

            return (

                <div className="backplate">

                    {/* Corner screws */}

                    <div className="screw s-tl" />

                    <div className="screw s-tr" />

                    <div className="screw s-bl" />

                    <div className="screw s-br" />



                    {/* Bezel assembly */}

                    <div className="outer-bezel">

                        {/* Brand silkscreen */}

                        <div className="brand-label">Digital Instruments</div>



                        <div className="inner-bezel">

                            <div className="screen">

                                {/* Overlay layers */}

                                <div className="screen-glow" />

                                <div className="screen-noise" />



                                {/* Ghost segments (unlit) */}

                                <div className="ghost-layer">

                                    <span className="ghost-title">8888</span>

                                    <span className="ghost-value">8888</span>

                                    <span className="ghost-desc">888 888 888 8888888</span>

                                </div>



                                {/* Content */}

                                <div className="content">

                                    <div className="line-title">FUSE</div>

                                    <div className="line-value">175A</div>

                                    <div className="line-desc">ANL — at battery</div>

                                </div>



                                {/* Status LED */}

                                <div className="status-led" />

                            </div>

                        </div>

                    </div>

                </div>

            );

        };



        const root = ReactDOM.createRoot(document.getElementById('root'));

        root.render(<DigitalDisplay />);

    </script>

</body>

</html>
