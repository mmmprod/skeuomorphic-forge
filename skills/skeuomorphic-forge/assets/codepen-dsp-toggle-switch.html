<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DSPPro - Tuner Status</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>

        body {

            background-color: #050506;

            margin: 0;

            display: flex;

            justify-content: center;

            align-items: center;

            min-height: 100vh;

            font-family: 'Inter', sans-serif;

        }

        .neomorphic-card {

            background: linear-gradient(145deg, #323237, #0f0f11);

            box-shadow:

                0 70px 100px -20px rgba(0, 0, 0, 0.95),

                inset 0 2px 3px rgba(255, 255, 255, 0.1),

                inset 0 -10px 20px rgba(0, 0, 0, 0.7);

            border: 1px solid rgba(255, 255, 255, 0.08);

            border-radius: 80px;

            position: relative;

        }

        .neomorphic-card::after {

            content: '';

            position: absolute;

            inset: 0;

            border-radius: 80px;

            padding: 1px;

            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%, rgba(0,0,0,0.5) 100%);

            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);

            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);

            -webkit-mask-composite: xor;

            mask-composite: exclude;

            pointer-events: none;

        }

        .switch-container {

            background: linear-gradient(180deg, #050506, #121214);

            box-shadow:

                inset 0 15px 30px rgba(0, 0, 0, 0.9),

                0 1px 2px rgba(255, 255, 255, 0.05);

            border: 1px solid rgba(0, 0, 0, 1);

            position: relative;

        }

        .blue-rim-glow {

            position: absolute;

            inset: -2px;

            border-radius: 60px;

            padding: 2px;

            background: linear-gradient(135deg, rgba(0, 150, 255, 0.6), transparent, rgba(0, 80, 255, 0.4));

            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);

            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);

            -webkit-mask-composite: xor;

            mask-composite: exclude;

            opacity: 0;

            transition: opacity 0.5s ease;

        }

        .inner-glow-blue {

            position: absolute;

            inset: 0;

            border-radius: 60px;

            box-shadow: inset 0 0 25px rgba(0, 150, 255, 0.6), inset 0 0 10px rgba(0, 150, 255, 0.4);

            opacity: 0;

            transition: opacity 0.5s ease;

            pointer-events: none;

        }

        .active-glow .inner-glow-blue {

            opacity: 1;

        }

        .status-dot-off {

            background-color: #374151;

            box-shadow: none;

            filter: none;

        }

        .text-active-off {

            color: #374151;

        }



        .switch-handle {

            background: linear-gradient(135deg, #5a5a60 0%, #2a2a2e 45%, #141416 100%);

            box-shadow:

                0 8px 20px rgba(0, 0, 0, 0.9),

                0 15px 40px rgba(0, 0, 0, 0.7),

                0 25px 60px rgba(0, 0, 0, 0.4),

                0 3px 6px rgba(0, 0, 0, 0.95),

                inset 0 3px 6px rgba(255, 255, 255, 0.2),

                inset -4px -4px 10px rgba(0, 0, 0, 0.6);

            position: relative;

        }



        .active-glow .switch-handle {

            box-shadow:

                0 8px 20px rgba(0, 0, 0, 0.9),

                0 15px 40px rgba(0, 0, 0, 0.7),

                0 25px 60px rgba(0, 0, 0, 0.4),

                0 3px 6px rgba(0, 0, 0, 0.95),

                15px 5px 35px rgba(0, 0, 0, 0.85),

                inset 0 3px 6px rgba(255, 255, 255, 0.2),

                inset -4px -4px 10px rgba(0, 0, 0, 0.6);

        }



        .handle-floor-shadow {

            position: absolute;

            bottom: -4px;

            left: 10%;

            right: 10%;

            height: 12px;

            border-radius: 50%;

            background: radial-gradient(ellipse, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.3) 50%, transparent 80%);

            filter: blur(4px);

            z-index: -1;

            pointer-events: none;

        }



        .handle-blue-reflection {

            position: absolute;

            inset: 0;

            border-radius: 200px;

            background: radial-gradient(circle at 100% 50%, rgba(0, 150, 255, 0.3), transparent 60%);

            opacity: 0;

            transition: opacity 0.5s ease;

        }

        .active-glow .handle-blue-reflection {

            opacity: 1;

        }

        .metallic-shine {

            position: absolute;

            inset: 1;

            border-radius: 50px;

            background: linear-gradient(105deg,

                transparent 30%,

                rgba(255,255,255,0.08) 40%,

                rgba(255,255,255,0.15) 45%,

                rgba(255,255,255,0.08) 50%,

                transparent 60%

            );

            pointer-events: none;

        }

        .rim-light {

            position: absolute;

            top: 1px;

            left: 10%;

            right: 10%;

            height: 2px;

            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);

            filter: blur(0.5px);

        }

        .glow-text-blue {

            text-shadow:

                0 0 10px rgba(0, 150, 255, 1),

                0 0 25px rgba(0, 150, 255, 0.8),

                0 0 50px rgba(0, 100, 255, 0.5);

            color: #b3e5ff;

        }

        .on-background-glow-blue {

            background: radial-gradient(circle at center, rgba(0, 100, 255, 0.5) 0%, transparent 75%);

            filter: blur(25px);

        }

        .status-dot {

            box-shadow: 0 0 19px #4ade80, 0 0 30px #4ade80;

            filter: brightness(1.5);

        }

        .logo-font {

            font-family: 'Orbitron', sans-serif;

            letter-spacing: -1px;

        }

        .stats-font {

            font-family: 'Share Tech Mono', monospace;

        }

    </style>

</head>

<body>

    <div id="root"></div>



    <script type="text/babel">

        const { useState } = React;



        const App = () => {

            const [isOn, setIsOn] = useState(true);



            return (

                <div className="flex items-center justify-center p-4">

                    <div className="neomorphic-card w-[450px] h-[450px] flex flex-col items-center justify-between p-12 relative overflow-hidden">

                        {/* Header */}

                        <div className="w-full flex justify-between items-center mb-4 px-4">

                            <div className="flex flex-col leading-none">

                                <span className="logo-font text-gray-500 text-3xl font-bold">dsp</span>

                                <span className="logo-font text-gray-500 text-3xl font-bold -mt-2">tuner</span>

                            </div>

                            <div className="flex items-center gap-3">

                                <div className={`w-2.5 h-2.5 rounded-full transition-all duration-500 ${isOn ? 'bg-green-400 status-dot' : 'status-dot-off'}`}></div>

                                <span className={`font-bold tracking-[0.2em] text-sm mt-0.5 transition-colors duration-500 ${isOn ? 'text-gray-400' : 'text-active-off'}`}>ACTIVE</span>

                            </div>

                        </div>



                        {/* Switch */}

                        <div

                            className={`switch-container w-full h-32 rounded-[60px] relative flex items-center cursor-pointer p-2 overflow-hidden transition-all duration-300 ${isOn ? 'active-glow' : ''}`}

                            onClick={() => setIsOn(!isOn)}

                        >

                            <div className="blue-rim-glow"></div>

                            <div className="inner-glow-blue"></div>

                            <div

                                className={`absolute inset-0 on-background-glow-blue transition-opacity duration-500 ${isOn ? 'opacity-100' : 'opacity-0'}`}

                            ></div>



                            <div

                                className={`switch-handle w-1/2 h-full rounded-[50px] z-20 transition-transform duration-500 ease-in-out transform flex items-center justify-center border border-white/10 ${isOn ? 'translate-x-0' : 'translate-x-full'}`}

                            >

                                <div className="handle-floor-shadow"></div>

                                <div className="rim-light"></div>

                                <div className="handle-blue-reflection"></div>

                                <div className="metallic-shine"></div>

                                <div className="w-1.5 h-12 bg-black/60 rounded-full shadow-inner border-r border-white/10"></div>

                            </div>



                            <div className="absolute right-12 z-10 select-none">

                                <span className={`text-6xl font-bold tracking-widest transition-all duration-500 ${isOn ? 'glow-text-blue opacity-100 scale-110' : 'text-black opacity-40 scale-100'}`}>

                                    ON

                                </span>

                            </div>

                        </div>



                        {/* Footer */}

                        <div className="flex flex-col items-center gap-4">

                            <div className="stats-font text-gray-500 text-2xl tracking-wide opacity-80">

                                POWER / SOUND

                            </div>

                            <div className="flex gap-1.5 opacity-40">

                                <div className="w-1.5 h-1.5 bg-gray-600 rounded-full"></div>

                                <div className="w-1.5 h-1.5 bg-gray-600 rounded-full"></div>

                                <div className="w-1.5 h-1.5 bg-gray-600 rounded-full"></div>

                            </div>

                        </div>

                    </div>

                </div>

            );

        };



        const root = ReactDOM.createRoot(document.getElementById('root'));

        root.render(<App />);

    </script>

</body>

</html>
