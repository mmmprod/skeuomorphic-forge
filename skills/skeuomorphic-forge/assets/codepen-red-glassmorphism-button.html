<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Red Glassmorphism Button</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>

        body {

            font-family: 'Inter', sans-serif;

            margin: 0;

            background-color: #232322;

        }

    </style>

</head>

<body class="min-h-screen flex items-center justify-center relative overflow-hidden">



    <!-- Optionnel : Lueur rouge en arrière-plan pour accentuer l'effet de verre -->

    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(239,68,68,0.05)_0%,transparent_50%)] pointer-events-none"></div>



    <!-- Le Bouton -->

    <button class="relative flex items-center px-6 py-4 rounded-[90px] cursor-pointer group select-none min-w-[380px] bg-white/[0.03] backdrop-blur-2xl border border-white/[0.03] border-t-white/[0.12] border-l-white/[0.08] shadow-[0_20px_40px_-10px_rgba(0,0,0,0.5)] hover:bg-white/[0.06] hover:scale-[1.02] hover:border-t-red-500/40 hover:border-l-red-500/20 hover:shadow-[0_30px_50px_-10px_rgba(0,0,0,0.6),0_0_30px_rgba(239,68,68,0.15),inset_0_1px_2px_rgba(239,68,68,0.4)] active:scale-[0.98] active:bg-white/[0.02] active:shadow-[inset_4px_4px_15px_rgba(0,0,0,0.4),inset_-4px_-4px_15px_rgba(255,255,255,0.02)] active:border-t-red-500/20 transition-all duration-[600ms] ease-[cubic-bezier(0.34,1.56,0.64,1)]">



        <!-- Cercle Rouge avec Flèche -->

        <div class="w-20 h-20 rounded-full flex items-center justify-center bg-gradient-to-br from-red-500/90 to-red-700/90 shadow-[0_8px_20px_rgba(239,68,68,0.4),inset_2px_2px_4px_rgba(255,255,255,0.4)] group-hover:shadow-[0_12px_25px_rgba(239,68,68,0.6)] group-hover:scale-105 transition-all duration-[600ms] ease-[cubic-bezier(0.34,1.56,0.64,1)] shrink-0">

            <!-- SVG Flèche vers le bas -->

            <svg class="w-8 h-8 text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.2)] group-hover:translate-y-1 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">

                <path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3" />

            </svg>

        </div>



        <!-- Texte -->

        <div class="ml-8">

            <span class="text-white/90 text-3xl font-semibold tracking-tight drop-shadow-[0_0_15px_rgba(255,255,255,0.1)] group-hover:text-white group-hover:drop-shadow-[0_0_20px_rgba(239,68,68,0.4)] transition-all duration-500">

                Aller à l'étape

            </span>

        </div>

    </button>



</body>

</html>
