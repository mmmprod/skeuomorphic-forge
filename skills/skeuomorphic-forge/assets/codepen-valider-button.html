<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Valider</title>

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap');



        body {

            display: flex;

            justify-content: center;

            align-items: center;

            min-height: 100vh;

            background: #050505;

            margin: 0;

        }



        .btn {

            position: relative;

            padding: 22px 58px;

            border-radius: 10px;

            cursor: pointer;

            user-select: none;

            border: none;

            outline: none;



            /* 3-stop gradient for curvature */

            background: linear-gradient(180deg, #2e2e34 0%, #222226 35%, #161618 100%);



            /* Thick bevel borders */

            border-top: 2px solid rgba(255,255,255,0.11);

            border-left: 1px solid rgba(255,255,255,0.05);

            border-right: 1px solid rgba(0,0,0,0.4);

            border-bottom: 4px solid #050506;



            /* 14-layer shadow stack */

            box-shadow:

                /* === INNER DEPTH === */

                /* top edge catch */

                inset 0 1px 0 rgba(255,255,255,0.1),

                inset 0 2px 1px rgba(255,255,255,0.05),

                /* upper body sheen */

                inset 0 6px 8px rgba(255,255,255,0.02),

                /* bottom inner recess */

                inset 0 -2px 3px rgba(0,0,0,0.5),

                inset 0 -5px 10px rgba(0,0,0,0.3),

                inset 0 -8px 16px rgba(0,0,0,0.15),

                /* side walls */

                inset 3px 0 4px rgba(0,0,0,0.2),

                inset -3px 0 4px rgba(0,0,0,0.2),

                /* === EXTERNAL CAST === */

                /* close shadow (sharp edge) */

                0 2px 1px rgba(0,0,0,0.7),

                /* medium cast */

                0 4px 6px rgba(0,0,0,0.6),

                0 8px 16px rgba(0,0,0,0.5),

                /* deep cast */

                0 16px 32px rgba(0,0,0,0.4),

                0 24px 48px rgba(0,0,0,0.25),

                /* ultra far ambient */

                0 32px 64px rgba(0,0,0,0.15);



            transition: all 0.08s ease-out;

            transform: translateY(0);

        }



        /* Text default */

        .btn-text {

            font-family: 'Inter', sans-serif;

            font-size: 15px;

            font-weight: 800;

            letter-spacing: 0.18em;

            text-transform: uppercase;

            color: #555568;

            transition: all 0.08s ease-out;

            position: relative;

            z-index: 2;

        }



        /* ============ PRESSED ============ */

        .btn:active {

            transform: translateY(3px);

            border-bottom-width: 1px;



            background: linear-gradient(180deg, #1a1a1e 0%, #121214 35%, #0a0a0c 100%);



            box-shadow:

                inset 0 1px 0 rgba(255,255,255,0.04),

                inset 0 2px 1px rgba(255,255,255,0.02),

                inset 0 3px 6px rgba(0,0,0,0.4),

                inset 0 -1px 2px rgba(0,0,0,0.3),

                inset 0 -3px 6px rgba(0,0,0,0.15),

                inset 0 -5px 10px rgba(0,0,0,0.08),

                inset 3px 0 4px rgba(0,0,0,0.2),

                inset -3px 0 4px rgba(0,0,0,0.2),

                0 1px 1px rgba(0,0,0,0.6),

                0 2px 4px rgba(0,0,0,0.5),

                0 4px 8px rgba(0,0,0,0.4),

                0 8px 16px rgba(0,0,0,0.3),

                0 12px 24px rgba(0,0,0,0.2);

        }



        .btn:active .btn-text {

            color: #38bdf8;

            text-shadow:

                0 0 4px rgba(56,189,248,0.9),

                0 0 12px rgba(56,189,248,0.6),

                0 0 28px rgba(56,189,248,0.3),

                0 0 50px rgba(56,189,248,0.12);

        }



        /* Text stays lit after click (toggled via JS) */

        .btn-text.lit {

            color: #38bdf8;

            text-shadow:

                0 0 4px rgba(56,189,248,0.9),

                0 0 12px rgba(56,189,248,0.6),

                0 0 28px rgba(56,189,248,0.3),

                0 0 50px rgba(56,189,248,0.12);

        }



        /* Spring return */

        .btn {

            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1),

                        box-shadow 0.15s ease-out,

                        border-bottom-width 0.08s ease-out,

                        background 0.1s ease-out;

        }

    </style>

</head>

<body>

    <button class="btn" onclick="this.querySelector('.btn-text').classList.toggle('lit')">

        <span class="btn-text">Valider</span>

    </button>

</body>

</html> \
