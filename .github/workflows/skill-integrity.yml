name: Skill Integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-skill:
    name: Validate SKILL.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check YAML frontmatter
        run: |
          head -20 SKILL.md | grep -q "^name:" || { echo "::error::SKILL.md missing 'name' in frontmatter"; exit 1; }
          head -20 SKILL.md | grep -q "^description:" || { echo "::error::SKILL.md missing 'description' in frontmatter"; exit 1; }
          echo "Frontmatter OK"

      - name: Check file references exist
        run: |
          errors=0
          for f in assets/*.html; do
            basename=$(basename "$f")
            if ! grep -q "$basename" SKILL.md; then
              echo "::error::$basename exists in assets/ but is not referenced in SKILL.md"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "::error::$errors unreferenced asset files found"
            exit 1
          fi
          echo "All asset files referenced in SKILL.md"

      - name: Validate golden-examples references
        run: |
          # SKILL.md compresses duplicate content by pointing to canonical sections
          # in references/00-golden-examples.md. This step verifies that every
          # referenced heading still exists VERBATIM (exact line match) in the
          # golden file. Substring matching (grep -qF without -x) was insufficient
          # because partial headings like "## 2. COMPLETE BUTTON" would falsely
          # match the longer real heading "## 2. COMPLETE BUTTON — Rest / Hover /
          # Active". We use grep -Fxq for exact-line match so renames are caught
          # immediately. Update SKILL.md table AND this list together when a
          # golden heading is intentionally renamed.
          golden="references/00-golden-examples.md"
          if [ ! -f "$golden" ]; then
            echo "::error::$golden not found"
            exit 1
          fi
          errors=0
          headings=(
            "## 1. SHADOW STACKS BY TIER"
            "## 2. COMPLETE BUTTON — Rest / Hover / Active"
            "### Industrial Circuit Relay Button"
            "## 3. COMPLETE CARD WITH RIM LIGHT"
            "## 4. SCREW HEAD (5 layers + radial gradient)"
            "## 5. PHOSPHOR / CRT TEXT GLOW"
            "## 6. SILKSCREEN LABEL"
            "## 7. MATERIAL SURFACE GRADIENTS"
            "## 8. WARM INDUSTRIAL PALETTE"
            "## 9. TYPOGRAPHY"
          )
          for h in "${headings[@]}"; do
            if ! grep -Fxq "$h" "$golden"; then
              echo "::error::Heading not found (exact-line match) in $golden: $h"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "::error::$errors golden-examples heading reference(s) broken — update SKILL.md table or restore the headings."
            exit 1
          fi
          echo "All ${#headings[@]} golden-examples heading references resolve."

  search-engine:
    name: Search Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Verify FILE_MAP completeness
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, 'scripts')
          from search import FILE_MAP, HTML_MAP, REFS_DIR, ASSETS_DIR

          errors = 0

          for key, fname in FILE_MAP.items():
              fpath = REFS_DIR / fname
              if not fpath.exists():
                  print(f'::error::FILE_MAP[{key}] -> {fname} NOT FOUND')
                  errors += 1

          for key, fname in HTML_MAP.items():
              fpath = ASSETS_DIR / fname
              if not fpath.exists():
                  print(f'::error::HTML_MAP[{key}] -> {fname} NOT FOUND')
                  errors += 1

          ref_files = {f.name for f in REFS_DIR.iterdir() if f.suffix == '.md'}
          orphans = ref_files - set(FILE_MAP.values())
          for o in orphans:
              print(f'::warning::Orphan reference file: {o}')

          asset_files = {f.name for f in ASSETS_DIR.iterdir() if f.suffix == '.html'}
          orphan_assets = asset_files - set(HTML_MAP.values())
          for o in orphan_assets:
              print(f'::warning::Orphan asset file: {o}')

          total = len(FILE_MAP) + len(HTML_MAP)
          print(f'Maps OK: {len(FILE_MAP)} refs + {len(HTML_MAP)} assets = {total} sources')

          if errors > 0:
              sys.exit(1)
          "

      - name: Run unit tests
        run: python3 -m unittest discover -s scripts -p 'test_*.py' -v

      - name: Run search engine smoke test
        run: |
          output=$(python3 scripts/search.py "button shadow" -n 2)
          echo "$output"
          section_count=$(echo "$output" | grep -o 'sections scanned:.* [0-9]*' | grep -o '[0-9]\+' | head -1)
          if [ -z "$section_count" ] || [ "$section_count" -lt 1350 ]; then
            echo "::error::Expected 1350+ sections, got '${section_count:-EMPTY}'"
            exit 1
          fi
          echo "Search engine OK: $section_count sections indexed"

      - name: Test HTML filter keys
        run: |
          for key in gauge alert phosphor folding thermometer; do
            output=$(python3 scripts/search.py "test" --file "$key" -n 1)
            if echo "$output" | grep -q "Error:"; then
              echo "::error::File filter '$key' failed"
              exit 1
            fi
            echo "Filter '$key' OK"
          done

  prettier:
    name: Prettier Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install locked npm dependencies
        run: npm ci --ignore-scripts

      - name: Check formatting
        run: npx --no-install prettier --check --ignore-unknown ".coderabbit.yaml" ".github/**/*.yml"

  ruff:
    name: Python Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Lint Python
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          version: "0.15.12"
          checksum: "5e26a7811f7db364864ace00cced53003556a37b63f3c987e340b18207776f1c"
          args: check scripts/ fuzz/

      - name: Check formatting
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          version: "0.15.12"
          checksum: "5e26a7811f7db364864ace00cced53003556a37b63f3c987e340b18207776f1c"
          args: format --check scripts/ fuzz/

  guards:
    name: Size & Safety Guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: SKILL.md size cap (40KB max)
        run: |
          size=$(wc -c < SKILL.md)
          if [ "$size" -gt 40960 ]; then
            echo "::error::SKILL.md is ${size}B — exceeds 40KB context window budget. Split content to references/."
            exit 1
          fi
          echo "SKILL.md size OK: ${size}B (limit: 40960B)"

      - name: Skill directory structure
        run: |
          if [ ! -f "skills/skeuomorphic-forge/SKILL.md" ]; then
            echo "::error::skills/skeuomorphic-forge/SKILL.md not found — required for plugin auto-discovery"
            exit 1
          fi
          echo "Skill directory structure OK"

      - name: No files over 500KB
        run: |
          errors=0
          while IFS= read -r f; do
            size=$(wc -c < "$f")
            if [ "$size" -gt 512000 ]; then
              echo "::error::$f is ${size}B — exceeds 500KB limit"
              errors=$((errors + 1))
            fi
          done < <(find . -type f -not -path './.git/*')
          if [ $errors -gt 0 ]; then exit 1; fi
          echo "All files under 500KB"

      - name: No zip archives committed
        run: |
          zips=$(find . -name "*.zip" -not -path './.git/*' | head -5)
          if [ -n "$zips" ]; then
            echo "::error::Zip files found in repo — remove before merge:"
            echo "$zips"
            exit 1
          fi
          echo "No zip files"

  asset-validation:
    name: Asset HTML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check HTML assets are not empty
        run: |
          errors=0
          for f in assets/*.html; do
            size=$(wc -c < "$f")
            lines=$(wc -l < "$f")
            if [ "$size" -lt 500 ]; then
              echo "::error::$f is suspiciously small ($size bytes)"
              errors=$((errors + 1))
            fi
            echo "$f: ${lines}L, ${size}B"
          done
          if [ $errors -gt 0 ]; then exit 1; fi

      - name: Check HTML assets contain shadow stacks
        run: |
          warnings=0
          for f in assets/*.html; do
            shadow_count=$(grep -c "box-shadow" "$f" || true)
            if [ "$shadow_count" -lt 2 ]; then
              echo "::warning::$f has only $shadow_count box-shadow declarations (expected 2+)"
              warnings=$((warnings + 1))
            fi
          done
          echo "Shadow stack check done ($warnings warnings)"

  required-ci:
    name: required-ci
    runs-on: ubuntu-latest
    needs:
      - validate-skill
      - search-engine
      - prettier
      - ruff
      - guards
      - asset-validation
    if: always()
    steps:
      - name: Check required jobs
        run: |
          failed=0
          for result in \
            "${{ needs['validate-skill'].result }}" \
            "${{ needs['search-engine'].result }}" \
            "${{ needs.prettier.result }}" \
            "${{ needs.ruff.result }}" \
            "${{ needs.guards.result }}" \
            "${{ needs['asset-validation'].result }}"; do
            if [ "$result" != "success" ]; then
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "::error::One or more required jobs failed."
            exit 1
          fi
          echo "Required CI jobs passed."
