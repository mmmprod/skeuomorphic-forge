<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizontal Thermometer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0e0e11;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden;
      background-image:
        radial-gradient(circle at 50% 40%, #141418 0%, #0a0a0d 100%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    }
    .chassis {
      position: relative;
      display: flex; align-items: center;
      padding: 14px 20px 14px 14px;
      border-radius: 50px 24px 24px 50px;
      background:
        repeating-linear-gradient(90deg,
          rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px,
          transparent 1px, transparent 3px),
        linear-gradient(180deg,
          #22222a 0%, #1a1a22 15%, #141418 50%, #16161c 85%, #1e1e26 100%);
      box-shadow:
        0 -1px 0 rgba(255,255,255,0.07),
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 2px 3px rgba(255,255,255,0.03),
        0 1px 0 rgba(0,0,0,0.8),
        inset 0 -1px 0 rgba(0,0,0,0.5),
        inset 0 -2px 4px rgba(0,0,0,0.15),
        inset 3px 0 6px rgba(0,0,0,0.08),
        inset -3px 0 6px rgba(0,0,0,0.08),
        0 4px 8px rgba(0,0,0,0.4),
        0 8px 16px rgba(0,0,0,0.3),
        0 16px 40px rgba(0,0,0,0.25),
        0 24px 64px rgba(0,0,0,0.15);
      border-top: 1px solid rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(0,0,0,0.6);
      border-left: 1px solid rgba(255,255,255,0.05);
      border-right: 1px solid rgba(0,0,0,0.4);
    }
    .chassis::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      pointer-events: none; z-index: 20;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.025; mix-blend-mode: overlay;
    }
    .bulb-well {
      position: relative;
      width: 68px; height: 68px;
      border-radius: 50%;
      flex-shrink: 0; z-index: 10;
      background: radial-gradient(circle, #000 0%, #030303 60%, #0a0a0a 100%);
      box-shadow:
        inset 0 2px 3px rgba(0,0,0,1), inset 0 4px 8px rgba(0,0,0,0.95),
        inset 0 8px 14px rgba(0,0,0,0.7), inset 0 -2px 3px rgba(0,0,0,0.9),
        inset 0 -4px 8px rgba(0,0,0,0.7), inset 3px 0 6px rgba(0,0,0,0.9),
        inset -3px 0 6px rgba(0,0,0,0.9), inset 4px 4px 10px rgba(0,0,0,0.8),
        inset -4px 4px 10px rgba(0,0,0,0.8), inset 4px -4px 10px rgba(0,0,0,0.6),
        inset -4px -4px 10px rgba(0,0,0,0.6),
        0 0 0 1px #060608, 0 0 0 2px rgba(255,255,255,0.04);
    }
    .bulb {
      position: absolute; inset: 5px;
      border-radius: 50%; z-index: 12;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      background:
        radial-gradient(ellipse 50% 45% at 32% 22%, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.05) 50%, transparent 70%),
        radial-gradient(circle at 28% 18%, rgba(255,255,255,0.5) 0%, transparent 15%),
        radial-gradient(ellipse 60% 30% at 70% 85%, var(--glow) 0%, transparent 70%),
        radial-gradient(ellipse 20% 50% at 5% 50%, var(--glow-soft) 0%, transparent 70%),
        radial-gradient(circle at 50% 55%, var(--color-bright) 0%, var(--color-main) 30%, var(--color-dark) 65%, #0a0306 100%),
        radial-gradient(circle at 50% 50%, transparent 55%, rgba(0,0,0,0.4) 80%, rgba(0,0,0,0.7) 100%);
      box-shadow:
        inset 0 3px 4px rgba(255,255,255,0.1), inset 0 -3px 6px rgba(0,0,0,0.6),
        inset 3px 0 5px rgba(0,0,0,0.2), inset -3px 0 5px rgba(0,0,0,0.15),
        inset 0 6px 10px rgba(0,0,0,0.15),
        0 0 4px var(--glow), 0 0 10px var(--glow),
        0 0 20px var(--glow-soft), 0 0 35px var(--glow-soft),
        0 0 50px var(--glow-far), 0 0 80px var(--glow-far), 0 0 120px var(--glow-far);
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .bulb::after {
      content: '';
      position: absolute; top: 6%; left: 14%;
      width: 40%; height: 32%; border-radius: 50%;
      background: radial-gradient(ellipse at 50% 60%, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
      pointer-events: none; filter: blur(0.5px); transform: rotate(-15deg);
    }
    .bulb-value {
      font-family: 'Space Mono', monospace;
      font-size: 1rem; font-weight: 700; color: #fff;
      text-shadow: 0 0 2px rgba(255,255,255,1), 0 0 6px var(--glow), 0 0 14px var(--glow), 0 0 28px var(--glow-soft), 0 0 50px var(--glow-far);
      z-index: 14; letter-spacing: -1px; position: relative;
    }
    .track-well {
      position: relative;
      width: 620px; height: 28px;
      margin-left: -8px;
      border-radius: 0 14px 14px 0;
      background: radial-gradient(ellipse 100% 100% at 50% 50%, #000 0%, #020202 60%, #080808 100%);
      box-shadow:
        inset 0 1px 0 #000, inset 0 2px 2px rgba(0,0,0,1),
        inset 0 4px 6px rgba(0,0,0,0.95), inset 0 8px 12px rgba(0,0,0,0.8),
        inset 0 12px 20px rgba(0,0,0,0.5),
        inset 0 -1px 0 #000, inset 0 -2px 2px rgba(0,0,0,1),
        inset 0 -4px 6px rgba(0,0,0,0.95), inset 0 -8px 12px rgba(0,0,0,0.8),
        inset 0 -12px 20px rgba(0,0,0,0.5),
        inset 4px 0 6px rgba(0,0,0,0.95), inset 10px 0 12px rgba(0,0,0,0.6),
        inset -4px 0 6px rgba(0,0,0,0.95), inset -10px 0 12px rgba(0,0,0,0.6),
        inset 5px 5px 10px rgba(0,0,0,0.8), inset -5px 5px 10px rgba(0,0,0,0.8),
        inset 5px -5px 10px rgba(0,0,0,0.8), inset -5px -5px 10px rgba(0,0,0,0.8),
        0 1px 0 rgba(255,255,255,0.04), 0 -1px 0 rgba(0,0,0,0.9);
      border-top: 1px solid #000;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      z-index: 5; overflow: hidden;
    }
    .track-well::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      pointer-events: none; z-index: 2;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.2) 25%, transparent 45%, transparent 55%, rgba(0,0,0,0.2) 75%, rgba(0,0,0,0.7) 100%),
        linear-gradient(90deg, rgba(0,0,0,0.5) 0%, transparent 8%, transparent 92%, rgba(0,0,0,0.5) 100%);
    }
    .liquid {
      position: absolute;
      left: 0; top: 3px; bottom: 3px;
      border-radius: 0 10px 10px 0;
      z-index: 4;
      overflow: hidden;
      background:
        linear-gradient(180deg,
          rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.08) 15%, rgba(255,255,255,0.02) 28%,
          transparent 40%, transparent 65%, rgba(0,0,0,0.15) 82%, rgba(0,0,0,0.35) 100%),
        linear-gradient(90deg, var(--color-dark) 0%, var(--color-main) 40%, var(--color-bright) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.25), inset 0 2px 3px rgba(255,255,255,0.06),
        inset 0 -1px 0 rgba(0,0,0,0.4), inset 0 -2px 4px rgba(0,0,0,0.3),
        inset 0 0 8px var(--glow), inset 0 0 16px var(--glow-soft),
        0 0 4px var(--glow), 0 0 8px var(--glow),
        0 0 16px var(--glow-soft), 0 0 24px var(--glow-soft),
        0 0 40px var(--glow-far), 0 0 60px var(--glow-far);
    }
    .liquid::before {
      content: '';
      position: absolute; right: -1px; top: 0; bottom: 0; width: 6px;
      border-radius: 0 10px 10px 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.15) 30%, transparent 50%, rgba(0,0,0,0.2) 80%);
      box-shadow: 2px 0 8px var(--glow), 4px 0 16px var(--glow), 6px 0 30px var(--glow-soft), 8px 0 50px var(--glow-far);
    }
    .liquid::after {
      content: '';
      position: absolute; top: 2px; left: 10%; right: 15%; height: 3px;
      border-radius: 3px;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 20%, rgba(255,255,255,0.08) 80%, transparent 100%);
      filter: blur(0.5px);
    }
    .bubble {
      position: absolute; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.15) 40%, transparent 70%);
      box-shadow: inset 0 -1px 2px rgba(0,0,0,0.15), 0 0 3px rgba(255,255,255,0.1);
      animation: bubble-rise var(--dur) infinite ease-in-out;
      opacity: 0;
    }
    @keyframes bubble-rise {
      0% { transform: translate(0, 0) scale(1); opacity: 0; }
      10% { opacity: 0.7; }
      70% { opacity: 0.5; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0.4); opacity: 0; }
    }
    .glass-dome {
      position: absolute; inset: 1px;
      border-radius: inherit;
      z-index: 8; pointer-events: none;
      background:
        radial-gradient(ellipse 150% 80% at 50% -25%, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.05) 30%, transparent 50%),
        radial-gradient(ellipse 20% 40% at 12% 5%, rgba(255,255,255,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 12% 25% at 70% 8%, rgba(255,255,255,0.06) 0%, transparent 70%),
        linear-gradient(118deg, transparent 8%, rgba(255,255,255,0.012) 14%, rgba(255,255,255,0.04) 18%, rgba(255,255,255,0.08) 22%, rgba(255,255,255,0.04) 26%, rgba(255,255,255,0.012) 30%, transparent 36%),
        linear-gradient(112deg, transparent 33%, rgba(255,255,255,0.008) 38%, rgba(255,255,255,0.022) 42%, rgba(255,255,255,0.008) 46%, transparent 51%),
        radial-gradient(ellipse 80% 25% at 50% 110%, rgba(255,255,255,0.035) 0%, transparent 70%),
        linear-gradient(90deg, rgba(255,255,255,0.03) 0%, transparent 1.5%),
        linear-gradient(270deg, rgba(255,255,255,0.018) 0%, transparent 1.5%),
        radial-gradient(ellipse 90% 70% at 50% 42%, rgba(255,255,255,0.01) 0%, transparent 65%),
        linear-gradient(180deg, transparent 15%, rgba(0,0,0,0.04) 70%, rgba(0,0,0,0.1) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12), inset 0 2px 4px rgba(255,255,255,0.04),
        inset 0 -1px 0 rgba(255,255,255,0.025), inset 0 -2px 3px rgba(0,0,0,0.08);
    }
    .glass-edge {
      position: absolute; inset: 0px;
      border-radius: inherit;
      z-index: 9; pointer-events: none;
      padding: 1px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.04) 25%,
        rgba(255,255,255,0.01) 50%, rgba(255,255,255,0.03) 75%, rgba(255,255,255,0.06) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }
    .inner-rim-top { position: absolute; top: 1px; left: 0; height: 1px; z-index: 11; pointer-events: none; }
    .inner-rim-bot { position: absolute; bottom: 1px; left: 0; height: 1px; z-index: 11; pointer-events: none; }
    .metal-light-top, .metal-light-bot {
      position: absolute; left: 80px; height: 12px;
      pointer-events: none; z-index: 19; border-radius: 6px; filter: blur(8px);
    }
    .metal-light-top { top: 3px; }
    .metal-light-bot { bottom: 3px; }
    .ticks { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 6; pointer-events: none; }
    .tick-mark { position: absolute; top: 3px; bottom: 3px; width: 1px; background: rgba(255,255,255,0.04); }
    .tick-mark.major { background: rgba(255,255,255,0.08); }
    .screw {
      position: absolute; width: 10px; height: 10px;
      border-radius: 50%; z-index: 22;
      background:
        conic-gradient(from 35deg, #2a2a32, #1a1a22 90deg, #2a2a32 180deg, #1a1a22 270deg, #2a2a32),
        radial-gradient(circle at 38% 38%, #333340, #18181e);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), inset 0 -1px 1px rgba(0,0,0,0.7), 0 1px 3px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,0,0,0.5);
    }
    .screw::before {
      content: ''; position: absolute; top: 50%; left: 22%; right: 22%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,0,0,0.7) 20%, rgba(0,0,0,0.9) 50%, rgba(0,0,0,0.7) 80%, transparent);
      transform: translateY(-50%) rotate(30deg);
    }
    .screw::after {
      content: ''; position: absolute; top: 50%; left: 22%; right: 22%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06) 30%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.06) 70%, transparent);
      transform: translateY(0.5px) rotate(30deg);
    }
    .screw-top { right: 14px; top: 10px; }
    .screw-bot { right: 14px; bottom: 10px; }
    .ambient {
      position: absolute; width: 250%; height: 350%;
      top: 50%; left: 25%; transform: translate(-50%, -50%);
      border-radius: 50%; pointer-events: none; z-index: -1;
      filter: blur(100px); opacity: 0.12;
      transition: background 0.6s ease;
    }
    @keyframes breathe { 0%, 100% { opacity: 1; } 50% { opacity: 0.82; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const getColors = (t) => {
      let h, s, l;
      if (t < 35) { h = 0 + t * 0.3; s = 80; l = 42 + t * 0.15; }
      else if (t < 65) { const p = (t - 35) / 30; h = 10.5 + p * 25; s = 78; l = 47 + p * 5; }
      else { const p = (t - 65) / 35; h = 35.5 + p * 90; s = 70 + p * 10; l = 42 + p * 5; }
      const main = `hsl(${h}, ${s}%, ${l}%)`;
      const bright = `hsl(${h}, ${Math.min(s + 15, 100)}%, ${Math.min(l + 28, 85)}%)`;
      const dark = `hsl(${h}, ${s}%, ${Math.max(l - 22, 8)}%)`;
      const glow = `hsla(${h}, ${s + 15}%, ${l + 20}%, 0.7)`;
      const glowSoft = `hsla(${h}, ${s + 10}%, ${l + 15}%, 0.35)`;
      const glowFar = `hsla(${h}, ${s}%, ${l + 10}%, 0.15)`;
      const rimInner = `hsla(${h}, ${s + 10}%, ${l + 25}%, 0.75)`;
      const rimInnerSoft = `hsla(${h}, ${s}%, ${l + 18}%, 0.3)`;
      const metalLight = `hsla(${h}, ${s}%, ${l + 12}%, 0.2)`;
      return { main, bright, dark, glow, glowSoft, glowFar, rimInner, rimInnerSoft, metalLight,
        bg: `hsl(${h}, ${s}%, ${l + 5}%)` };
    };

    const Bubbles = React.memo(({ count }) => {
      const bubbles = React.useMemo(() =>
        Array.from({ length: count }, (_, i) => ({
          id: i, left: `${8 + Math.random() * 80}%`, bottom: `${Math.random() * 60}%`,
          size: 2 + Math.random() * 3.5, dur: 1.5 + Math.random() * 2.5,
          delay: Math.random() * 4, dx: (Math.random() - 0.5) * 16, dy: -(8 + Math.random() * 20),
        })), [count]);
      return bubbles.map(b => (
        <div key={b.id} className="bubble" style={{
          left: b.left, bottom: b.bottom, width: b.size, height: b.size,
          '--dur': `${b.dur}s`, '--dx': `${b.dx}px`, '--dy': `${b.dy}px`,
          animationDelay: `${b.delay}s`
        }} />
      ));
    });

    const App = () => {
      const [temp, setTemp] = React.useState(5);
      const [dir, setDir] = React.useState(1);
      React.useEffect(() => {
        const id = setInterval(() => {
          setTemp(prev => {
            const speed = 0.25 + Math.random() * 0.35;
            const next = prev + dir * speed;
            if (next >= 99) { setDir(-1); return 99; }
            if (next <= 1) { setDir(1); return 1; }
            return next;
          });
        }, 50);
        return () => clearInterval(id);
      }, [dir]);

      const c = getColors(temp);
      const pct = Math.max(1, Math.min(temp, 100));
      const trackPx = 620;
      const fillPx = (pct / 100) * trackPx;
      const rimGrad = `linear-gradient(90deg, ${c.rimInner} 0%, ${c.rimInner} ${Math.max(0, pct - 10)}%, ${c.rimInnerSoft} ${Math.max(0, pct - 3)}%, transparent ${pct}%)`;
      const metalGrad = `linear-gradient(90deg, ${c.metalLight} 0%, ${c.metalLight} 50%, transparent 100%)`;
      const style = {
        '--color-main': c.main, '--color-bright': c.bright, '--color-dark': c.dark,
        '--glow': c.glow, '--glow-soft': c.glowSoft, '--glow-far': c.glowFar,
      };
      const ticks = [];
      for (let i = 0; i <= 100; i += 5) {
        ticks.push(<div key={i} className={`tick-mark ${i % 25 === 0 ? 'major' : ''}`} style={{ left: `${i}%` }} />);
      }

      return (
        <div style={style} className="relative">
          <div className="ambient" style={{ background: c.bg }} />
          <div className="chassis">
            <div className="metal-light-top" style={{ width: fillPx, background: metalGrad }} />
            <div className="metal-light-bot" style={{ width: fillPx, background: metalGrad }} />
            <div className="bulb-well">
              <div className="bulb" style={{ animation: 'breathe 3.5s infinite ease-in-out' }}>
                <span className="bulb-value">{Math.round(temp)}</span>
              </div>
            </div>
            <div className="track-well">
              <div className="liquid" style={{ width: `${pct}%` }}>
                <Bubbles count={14} />
              </div>
              <div className="ticks">{ticks}</div>
              <div className="glass-dome" />
              <div className="glass-edge" />
              <div className="inner-rim-top" style={{ width: fillPx, background: rimGrad }} />
              <div className="inner-rim-bot" style={{ width: fillPx, background: rimGrad }} />
            </div>
            <div className="screw screw-top" />
            <div className="screw screw-bot" />
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
