<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynthScore Audio Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"Roboto Mono"', 'monospace'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        panel: { dark: '#0f1115', base: '#1a1c23', light: '#2a2d38' },
                        tech: { gray: '#6b7280', cyan: '#22d3ee', red: '#ef4444', orange: '#fb923c', line: '#3f4354' }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050505;
            color: #e5e7eb;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .text-glow-cyan { text-shadow: 0 0 20px rgba(34, 211, 238, 0.7), 0 0 40px rgba(34, 211, 238, 0.3); }
        .text-glow-red { text-shadow: 0 0 10px rgba(239, 68, 68, 0.8); }
        .glass-segment-active { box-shadow: inset 0 0 6px rgba(255, 255, 255, 0.4), 0 0 8px currentColor; }
        .glass-segment-inactive { background-color: #12141a; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), inset 0 -1px 1px rgba(255,255,255,0.05); }
        .metallic-border {
            background: linear-gradient(180deg, #4a4d5a 0%, #2a2c35 100%);
            padding: 2px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.2);
        }
        .inner-pit {
            background-color: #08090b;
            box-shadow: inset 0 4px 12px rgba(0,0,0,1), inset 0 1px 3px rgba(0,0,0,0.8);
        }
        .panel-texture {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const generateGradientColors = (count) => {
            const colors = [];
            for (let i = 0; i < count; i++) {
                const ratio = i / (count - 1);
                let r, g, b;
                if (ratio < 0.33) {
                    const p = ratio / 0.33;
                    r = Math.round(34 + p * (59 - 34));
                    g = Math.round(211 + p * (130 - 211));
                    b = Math.round(238 + p * (246 - 238));
                } else if (ratio < 0.66) {
                    const p = (ratio - 0.33) / 0.33;
                    r = Math.round(59 + p * (217 - 59));
                    g = Math.round(130 + p * (70 - 130));
                    b = Math.round(246 + p * (239 - 246));
                } else {
                    const p = (ratio - 0.66) / 0.34;
                    r = Math.round(217 + p * (249 - 217));
                    g = Math.round(70 + p * (115 - 70));
                    b = Math.round(239 + p * (22 - 239));
                }
                colors.push(`rgb(${r}, ${g}, ${b})`);
            }
            return colors;
        };

        const App = () => {
            const totalSegments = 38;
            const activeSegments = 29;
            const segmentColors = generateGradientColors(totalSegments);

            return (
                <div className="w-[900px] h-[340px] bg-panel-base rounded-lg border border-[#333] shadow-2xl overflow-hidden flex flex-col relative panel-texture font-mono select-none">
                    <div className="h-10 bg-[#121419] border-b border-[#22242d] flex items-center justify-between px-4 text-[10px] text-tech-gray tracking-widest shadow-md z-10">
                        <div className="flex items-center gap-2 w-1/3">
                            <div className="w-1.5 h-1.5 rounded-full bg-tech-gray opacity-50"></div>
                            <span>SYNTHSCORE APP</span>
                        </div>
                        <div className="w-1/3 text-center text-gray-400">GAUSS_ENGINE_ACTIVE</div>
                        <div className="flex items-center justify-end gap-4 w-1/3">
                            <span>AUDIO SIGNAL ANALYTICS</span>
                            <div className="flex flex-col gap-1 opacity-60 cursor-pointer">
                                <div className="w-4 h-[1px] bg-current"></div>
                                <div className="w-4 h-[1px] bg-current"></div>
                                <div className="w-4 h-[1px] bg-current"></div>
                            </div>
                        </div>
                    </div>
                    <div className="flex-1 relative bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-panel-light/20 to-panel-base p-6">
                        <div className="absolute left-6 top-6 bottom-10 w-12 opacity-80">
                            <div className="absolute top-0 left-0 w-full h-8 border-t border-l border-tech-line rounded-tl-xl"></div>
                            <div className="absolute top-8 left-0 w-2 border-t border-tech-line"></div>
                            <div className="absolute top-[38px] left-0 w-3 border-t border-tech-line"></div>
                            <div className="absolute top-[44px] left-0 w-1.5 border-t border-tech-line"></div>
                            <div className="absolute bottom-0 left-0 w-full h-8 border-b border-l border-tech-line rounded-bl-xl"></div>
                            <div className="absolute bottom-8 left-0 w-2 border-b border-tech-line"></div>
                        </div>
                        <div className="absolute right-6 top-6 bottom-10 w-12 opacity-80">
                            <div className="absolute top-0 right-0 w-full h-8 border-t border-r border-tech-line rounded-tr-xl"></div>
                            <div className="absolute top-8 right-0 w-2 border-t border-tech-line"></div>
                            <div className="absolute bottom-0 right-0 w-full h-8 border-b border-r border-tech-line rounded-br-xl"></div>
                            <div className="absolute bottom-8 right-0 w-2 border-b border-tech-line"></div>
                            <div className="absolute bottom-[38px] right-0 w-3 border-b border-tech-line"></div>
                        </div>
                        <div className="h-full px-16 flex flex-col items-center justify-between">
                            <div className="w-full flex justify-between items-start text-[10px] text-tech-gray tracking-wider mt-2">
                                <div className="flex flex-col gap-1">
                                    <span className="text-gray-400">DSP_CORE_v3.1</span>
                                    <div className="w-32 h-[1px] bg-tech-line"></div>
                                    <span>ANALYTICS_ENGINE</span>
                                </div>
                                <div className="flex flex-col gap-1 items-end">
                                    <div className="flex items-center gap-2">
                                        <span className="text-gray-400">LIMITER</span>
                                        <div className="w-2 h-2 rounded-full bg-tech-red shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
                                    </div>
                                    <div className="w-32 h-[1px] bg-tech-line"></div>
                                    <span>CLIP INDICATOR</span>
                                </div>
                            </div>
                            <div className="flex flex-col items-center -mt-6">
                                <div className="text-[80px] leading-none font-sans font-medium text-tech-cyan text-glow-cyan mb-2">78</div>
                                <div className="flex items-center gap-2 text-[10px] text-tech-gray tracking-widest">
                                    <svg className="w-4 h-4 text-tech-cyan opacity-80" viewBox="0 0 24 24" fill="currentColor">
                                        <rect x="3" y="10" width="2" height="4" rx="1" />
                                        <rect x="7" y="6" width="2" height="12" rx="1" />
                                        <rect x="11" y="2" width="2" height="20" rx="1" />
                                        <rect x="15" y="6" width="2" height="12" rx="1" />
                                        <rect x="19" y="10" width="2" height="4" rx="1" />
                                    </svg>
                                    <span>PERFORMANCE SCORE</span>
                                </div>
                            </div>
                            <div className="w-full max-w-[700px] flex flex-col gap-2 mt-4 relative">
                                <div className="flex justify-between text-[10px] text-tech-gray px-1">
                                    <span>0</span>
                                    <span>160</span>
                                </div>
                                <div className="absolute -top-3 left-[73.5%] flex flex-col items-center z-20">
                                    <span className="text-[10px] text-tech-orange tracking-wider mb-0.5" style={{ textShadow: '0 0 5px rgba(251, 146, 60, 0.5)' }}>PEAK</span>
                                    <div className="w-[2px] h-5 bg-tech-orange shadow-[0_0_8px_rgba(251,146,60,1)] rounded-full"></div>
                                </div>
                                <div className="metallic-border w-full h-[42px]">
                                    <div className="inner-pit w-full h-full rounded-[10px] p-1.5 flex gap-[3px] overflow-hidden">
                                        {Array(totalSegments).fill(0).map((_, i) => {
                                            const isActive = i < activeSegments;
                                            return (
                                                <div
                                                    key={i}
                                                    className={`flex-1 rounded-[3px] transition-all duration-300 ${isActive ? 'glass-segment-active' : 'glass-segment-inactive'}`}
                                                    style={{
                                                        backgroundColor: isActive ? segmentColors[i] : undefined,
                                                        color: isActive ? segmentColors[i] : undefined,
                                                        opacity: isActive ? 0.9 : 1
                                                    }}
                                                />
                                            );
                                        })}
                                    </div>
                                </div>
                                <div className="flex justify-between text-[10px] text-tech-gray px-1">
                                    <span>0</span>
                                    <span>DSP OUTPUT / INTEGRITY 78%</span>
                                    <span>100</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
