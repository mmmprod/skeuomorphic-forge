<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tube Compressor - Skeuomorphic VU Meter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
      font-family: 'Share Tech Mono', monospace;
    }

    /* ===== OUTER FRAME: thick machined housing ===== */
    .outer-frame {
      position: relative;
      padding: 14px;
      border-radius: 16px;
      background:
        linear-gradient(145deg, #44484e 0%, #363a3f 15%, #24272b 50%, #2a2d32 85%, #3d4147 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.18),
        inset 0 2px 2px rgba(255,255,255,0.06),
        inset 0 -1px 0 rgba(0,0,0,0.7),
        inset 0 -2px 3px rgba(0,0,0,0.3),
        inset 1px 0 1px rgba(255,255,255,0.06),
        inset -1px 0 1px rgba(0,0,0,0.4),
        inset 0 4px 6px rgba(0,0,0,0.08),
        inset 0 -4px 6px rgba(0,0,0,0.12),
        0 2px 0 rgba(255,255,255,0.04),
        0 -1px 0 rgba(0,0,0,0.9),
        0 0 0 1px rgba(0,0,0,0.5),
        0 10px 20px rgba(0,0,0,0.7),
        0 28px 56px rgba(0,0,0,0.5),
        0 56px 100px rgba(0,0,0,0.3);
      border-top: 1px solid rgba(255,255,255,0.1);
      border-left: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(0,0,0,0.6);
      border-right: 1px solid rgba(0,0,0,0.4);
    }

    .outer-frame::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      pointer-events: none; z-index: 15;
      background:
        repeating-linear-gradient(93deg,
          rgba(255,255,255,0.014) 0px, rgba(255,255,255,0.014) 1px,
          transparent 1px, transparent 3px);
    }

    .outer-frame::after {
      content: ''; position: absolute;
      top: 1px; left: 8%; right: 8%; height: 1px;
      pointer-events: none; z-index: 16;
      background: linear-gradient(90deg,
        transparent 0%, rgba(255,255,255,0.06) 15%, rgba(255,255,255,0.14) 40%,
        rgba(255,255,255,0.16) 50%, rgba(255,255,255,0.14) 60%,
        rgba(255,255,255,0.06) 85%, transparent 100%);
    }

    /* ===== DISPLAY CONTAINER: deep recessed well ===== */
    .display-container {
      position: relative;
      width: 500px; height: 320px;
      border-radius: 12px;
      overflow: hidden;
      background: radial-gradient(circle at 50% 120%, #442211 0%, #110d0c 70%);
      box-shadow:
        inset 0 1px 0 rgba(0,0,0,1),
        inset 0 2px 2px rgba(0,0,0,0.95),
        inset 0 4px 5px rgba(0,0,0,0.85),
        inset 0 7px 10px rgba(0,0,0,0.7),
        inset 0 12px 18px rgba(0,0,0,0.5),
        inset 0 20px 30px rgba(0,0,0,0.3),
        inset 0 -1px 0 rgba(0,0,0,0.9),
        inset 0 -2px 3px rgba(0,0,0,0.7),
        inset 0 -5px 10px rgba(0,0,0,0.4),
        inset 0 -10px 20px rgba(0,0,0,0.2),
        inset 3px 0 5px rgba(0,0,0,0.8),
        inset -3px 0 5px rgba(0,0,0,0.8),
        inset 6px 0 10px rgba(0,0,0,0.5),
        inset -6px 0 10px rgba(0,0,0,0.5),
        inset 5px 5px 12px rgba(0,0,0,0.4),
        inset -5px 5px 12px rgba(0,0,0,0.4);
      border: 2px solid #000;
    }

    .display-depth {
      position: absolute; inset: 0; pointer-events: none; z-index: 1;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 18%, transparent 88%, rgba(0,0,0,0.2) 100%),
        linear-gradient(90deg, rgba(0,0,0,0.35) 0%, transparent 10%, transparent 90%, rgba(0,0,0,0.35) 100%),
        radial-gradient(ellipse 100% 100% at 50% 50%, transparent 55%, rgba(0,0,0,0.2) 80%, rgba(0,0,0,0.4) 100%);
    }

    .glass-overlay {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 10;
      background:
        radial-gradient(ellipse 120% 45% at 50% -8%,
          rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 40%, transparent 55%),
        radial-gradient(ellipse 25% 20% at 18% 8%,
          rgba(255,255,255,0.06) 0%, transparent 70%),
        linear-gradient(128deg,
          transparent 18%,
          rgba(255,255,255,0.006) 22%,
          rgba(255,255,255,0.02) 26%,
          rgba(255,255,255,0.03) 30%,
          rgba(255,255,255,0.02) 34%,
          rgba(255,255,255,0.006) 38%,
          transparent 42%),
        radial-gradient(ellipse 40% 8% at 50% 100%,
          rgba(255,255,255,0.015) 0%, transparent 70%),
        linear-gradient(90deg, rgba(255,255,255,0.015) 0%, transparent 1.5%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(255,255,255,0.015);
    }

    .glass-edge {
      position: absolute; inset: 0; border-radius: 12px;
      pointer-events: none; z-index: 11; padding: 1px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.025) 25%,
        transparent 50%, rgba(255,255,255,0.015) 80%, rgba(255,255,255,0.04) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
    }

    .inner-bezel {
      position: absolute; inset: 0; border-radius: 12px;
      pointer-events: none; z-index: 2;
      border-top: 1px solid rgba(0,0,0,0.9);
      border-left: 1px solid rgba(0,0,0,0.7);
      border-bottom: 1px solid rgba(255,255,255,0.03);
      border-right: 1px solid rgba(255,255,255,0.02);
    }

    .needle {
      position: absolute;
      bottom: -50px; left: 50%;
      width: 2px; height: 240px;
      background: linear-gradient(to top, transparent 0%, #ff4d00 20%, #ff8844 100%);
      transform-origin: bottom center;
      transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 10px rgba(255, 77, 0, 0.6);
      z-index: 5;
    }
    .arc-line { fill: none; stroke: #632d1a; stroke-width: 1.5; stroke-dasharray: 2, 2; }
    .glow-text { color: #d17a4d; text-shadow: 0 0 8px rgba(209, 122, 77, 0.4); letter-spacing: 1px; }
    .bright-glow { color: #ff9d6e; text-shadow: 0 0 12px rgba(255, 157, 110, 0.8); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const VUMeter = () => {
      const [angle, setAngle] = useState(-25);
      const [inputValue, setInputValue] = useState(-1.03);

      useEffect(() => {
        const interval = setInterval(() => {
          const targetAngle = -25 + (Math.random() * 10 - 5);
          setAngle(targetAngle);
          setInputValue(-1.03 + (Math.random() * 0.05 - 0.025));
        }, 150);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="outer-frame">
          <div className="display-container">
            <div className="display-depth" />
            <div className="inner-bezel" />
            <div className="glass-overlay" />
            <div className="glass-edge" />
            <div className="absolute top-4 left-6 right-6 flex justify-between items-center text-[10px] uppercase font-bold text-gray-400 opacity-60" style={{ zIndex: 12 }}>
              <div className="flex items-center gap-2">
                <span className="text-[8px] cursor-pointer hover:text-white">&#10094;</span>
                <span className="tracking-widest">DEFAULT</span>
                <span className="text-[8px] cursor-pointer hover:text-white">&#10095;</span>
              </div>
              <div className="flex gap-4">
                <span>dB</span>
                <span>M</span>
                <span className="text-gray-600">S</span>
              </div>
            </div>
            <div className="absolute top-24 left-0 right-0 flex justify-center text-[#d17a4d] opacity-80 text-lg" style={{ zIndex: 4 }}>
              <div className="relative w-full h-full">
                <span className="absolute left-[15%] top-20">-30</span>
                <span className="absolute left-[30%] top-6">-20</span>
                <span className="absolute left-[50%] -translate-x-1/2 -top-4">-10</span>
                <span className="absolute right-[30%] top-6">-5</span>
                <span className="absolute right-[15%] top-20">0</span>
              </div>
            </div>
            <svg className="absolute top-10 left-0 w-full h-[200px]" viewBox="0 0 500 200" style={{ zIndex: 4 }}>
              <path d="M 100 180 Q 250 80 400 180" className="arc-line" />
            </svg>
            <div className="needle" style={{ transform: `translateX(-50%) rotate(${angle}deg)` }} />
            <div className="absolute bottom-16 left-0 right-0 flex flex-col items-center" style={{ zIndex: 5 }}>
              <span className="text-[10px] text-[#632d1a] uppercase mb-1">Tube</span>
              <span className="text-2xl font-bold bright-glow tracking-[0.2em] uppercase">Compressor</span>
              <span className="text-[9px] text-[#632d1a] uppercase mt-2 opacity-80">By Cerpow</span>
            </div>
            <div className="absolute bottom-6 left-6 text-left" style={{ zIndex: 5 }}>
              <div className="text-[9px] text-[#632d1a] uppercase mb-1">Input</div>
              <div className="text-xs glow-text">{inputValue.toFixed(2)} dB</div>
            </div>
            <div className="absolute bottom-6 right-6 text-right" style={{ zIndex: 5 }}>
              <div className="text-[9px] text-[#632d1a] uppercase mb-1">Output</div>
              <div className="text-xs glow-text">+0.00 dB</div>
            </div>
            <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-48 h-12 bg-[#ff4d00] blur-[40px] opacity-20" style={{ zIndex: 0 }} />
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<div className="p-10"><VUMeter /></div>);
  </script>
</body>
</html>
