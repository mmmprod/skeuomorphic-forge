<!--
  Fingerprint Button — SVG animated biometric button
  Source: Codepen
  Key techniques:
    - Neumorphic circle button with multi-layer radial gradients for dome illusion
    - 6-layer box-shadow: inset bevel + 3 outer darks + 2 outer lights
    - SVG fingerprint with stroke-dasharray/dashoffset animation (draw-on effect)
    - Dual SVG layers: --under (backlight glow, mix-blend-mode:lighten) + --over (engraved lines)
    - Drop-shadow filter chain for SVG bevel: dark top-left + light bottom-right + color glow
    - Hover reveals ::after (pressed state) + triggers stroke animation on SVG paths
    - Per-path staggered delays (@for $i from 1 through 5) with hue-shifted strokes
    - Breathing pulse animation on under-layer for idle state
    - Color transitions from cool blue (idle) to warm accent (hover/active)
    NOTE: This is a simplified vanilla CSS version. The original used SCSS functions
    (adjust-hue, lighten) for computed colors — here they are pre-computed.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fingerprint Button</title>
<style>
*, *:before, *:after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --size: 30vmin;
  --base: #d8dee8;
  --ease: cubic-bezier(.33,.45,.3,1);
}

body {
  position: absolute;
  height: 100%; width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--base);
  user-select: none;
}
body:before {
  content: '';
  position: absolute;
  width: 100%; height: 100%;
  background: radial-gradient(150% 150% at 0% 20%, #d8dee8 20%, #9ba4b4);
}

/* ═══ BUTTON — neumorphic circle with dome gradients ═════════════════════
   ::before = outer dome surface (blurred)
     - radial-gradient at 57.5% 60% = light from top-left
     - radial-gradient at 40% 17.5% = dark from bottom-right
     - 6-layer box-shadow: inset + 4 dark casts + 2 light catches
   ::after = pressed inner surface (appears on hover)
     - radial-gradient at 75% 75% = inverted light (concave)
     - Scales from 0.925 → 1.0 on hover (depression animation)
   ═════════════════════════════════════════════════════════════════════════ */
.button {
  appearance: none;
  border: none;
  outline: none;
  padding: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  font-size: var(--size);
  width: 1em; height: 1em;
  background: none;
  border-radius: 50%;
  opacity: 0;
  animation: buttonIn 2s var(--ease) forwards 2s;
}

@keyframes buttonIn {
  from { opacity: 0; transform: scale3d(1.1,1.15,1); }
  to   { opacity: 1; transform: none; }
}

.button:before, .button:after {
  content: '';
  border-radius: inherit;
}

/* Outer dome surface */
.button:before {
  filter: blur(.025em);
  position: absolute;
  top: 0; right: 0; bottom: 0; left: 0;
  background:
    radial-gradient(160% 160% at 57.5% 60%, rgba(222,228,238,0) 30%, #dee4ee 45%),
    radial-gradient(180% 200% at 40% 17.5%, rgba(164,170,180,0) 35%, #a4aab4 50%),
    radial-gradient(120% 120% at 45% 45%, rgba(190,196,206,0) 42%, rgba(164,170,180,.75) 50%);
  background-color: #c0c6d0;
  box-shadow:
    inset -.05em -.05em .025em -.025em #b0b6c0,
    .115em .15em .1em -.033em #a0a6b0,
    .15em .2em .25em #b0b6c0,
    .5em .33em .5em .1em #b0b6c0,
    -.1em -.1em .05em -.075em #dce2ec,
    -.2em -.2em .33em -.075em #d8dee8;
}

/* Pressed inner surface (hidden by default) */
.button:after {
  position: absolute;
  top: .025em; right: .025em; bottom: .025em; left: .025em;
  background:
    radial-gradient(150% 150% at 75% 75%, rgba(88,94,108,0) 30%, #585e6c),
    radial-gradient(150% 150% at -10% -10%, rgba(222,228,238,0) 50%, #dee4ee);
  background-color: #bec4ce;
  transition: .75s var(--ease);
  transition-delay: .25s;
  opacity: 0;
  filter: blur(.03em);
  transform: scale3d(.925,.94,1);
}

/* ═══ FINGERPRINT SVG — dual layer (under + over) ════════════════════════ */
.print {
  position: relative;
  width: 40%; height: 0;
  padding-bottom: 44.49%;
  display: inline-block;
  z-index: 1;
  transform: scale3d(1.05, 1.05, 1);
}
.print svg {
  position: absolute;
  top: 0; right: 0; bottom: 0; left: 0;
}
.print path {
  stroke-width: 4;
  fill: none;
  stroke-linecap: round;
  stroke-dasharray: 1;
  transition: 2s var(--ease);
  will-change: stroke-dashoffset, stroke, opacity;
}

/* Under layer — backlight glow */
.print--under {
  margin-right: -40%;
  mix-blend-mode: lighten;
  filter: drop-shadow(0 0 .033em currentColor);
  color: rgba(100,120,255,.5);
  animation: printPulse 2s linear infinite 6.25s;
}
@keyframes printPulse {
  0%   { opacity: 1; }
  50%  { opacity: .33; }
  100% { opacity: 1; }
}

.print--under path {
  opacity: 0;
  animation: printIn 2s var(--ease) forwards 3.2s;
}
@keyframes printIn {
  from { opacity: 0; stroke-dashoffset: .5; }
  to   { opacity: 1; stroke-dashoffset: 0; }
}

/* Per-path colors (under = lighter blues) */
.print--under path:nth-of-type(1) { stroke: hsl(225,80%,72%); }
.print--under path:nth-of-type(2) { stroke: hsl(227,80%,72%); }
.print--under path:nth-of-type(3) { stroke: hsl(229,80%,72%); }
.print--under path:nth-of-type(4) { stroke: hsl(231,80%,72%); }
.print--under path:nth-of-type(5) { stroke: hsl(233,80%,72%); }

/* Over layer — engraved lines with bevel */
.print--over {
  filter:
    drop-shadow(-0.0075em -0.0075em 0.005em rgba(0,0,51,0.1))
    drop-shadow(0.0075em 0.0075em 0.005em rgba(255,255,255,.25))
    drop-shadow(0 0 0.04em currentColor);
  opacity: 0;
  transition: transform 2s var(--ease), color 0s .4s, opacity .5s var(--ease);
  color: rgba(100,120,255,.5);
}

.print--over path {
  opacity: 0;
  stroke-dashoffset: 1;
  transition: stroke .5s var(--ease), opacity 0s .5s, stroke-dashoffset 0s .5s;
}

/* Per-path colors (over = saturated blues) */
.print--over path:nth-of-type(1) { stroke: hsl(225,80%,55%); }
.print--over path:nth-of-type(2) { stroke: hsl(227,80%,55%); }
.print--over path:nth-of-type(3) { stroke: hsl(229,80%,55%); }
.print--over path:nth-of-type(4) { stroke: hsl(231,80%,55%); }
.print--over path:nth-of-type(5) { stroke: hsl(233,80%,55%); }

/* ═══ HOVER STATE — press + reveal fingerprint ═══════════════════════════ */
.button:hover:after {
  opacity: 1;
  transform: none;
  transition-delay: 0s;
}

.button:hover .print { transform: scale3d(1,1,1) translateZ(0); }

.button:hover .print--over {
  color: rgba(60,80,220,.66);
  opacity: .66;
  transition: 1.5s var(--ease) 4.5s, opacity .25s var(--ease), transform 2s var(--ease);
}

.button:hover .print--over path {
  opacity: 1;
  stroke-dashoffset: 0;
}

/* Staggered per-path reveal with hue shift on hover */
.button:hover .print--over path:nth-of-type(1) {
  stroke: hsl(250,80%,50%);
  transition: opacity .25s var(--ease) .35s, stroke-dashoffset 4.2s var(--ease) .35s, stroke 1.2s var(--ease) 4.65s;
}
.button:hover .print--over path:nth-of-type(2) {
  stroke: hsl(254,80%,50%);
  transition: opacity .25s var(--ease) .45s, stroke-dashoffset 4.4s var(--ease) .45s, stroke 1.4s var(--ease) 4.55s;
}
.button:hover .print--over path:nth-of-type(3) {
  stroke: hsl(258,80%,50%);
  transition: opacity .25s var(--ease) .55s, stroke-dashoffset 4.6s var(--ease) .55s, stroke 1.6s var(--ease) 4.45s;
}
.button:hover .print--over path:nth-of-type(4) {
  stroke: hsl(262,80%,50%);
  transition: opacity .25s var(--ease) .65s, stroke-dashoffset 4.8s var(--ease) .65s, stroke 1.8s var(--ease) 4.35s;
}
.button:hover .print--over path:nth-of-type(5) {
  stroke: hsl(266,80%,50%);
  transition: opacity .25s var(--ease) .75s, stroke-dashoffset 5.0s var(--ease) .75s, stroke 2.0s var(--ease) 4.25s;
}
</style>
</head>
